DOCTYPE 
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px
}

.titolo{
text-align:center;
margin-bottom:15px
}

.card{
background:white;
padding:14px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,.2)
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-weight:bold;
margin-top:6px
}

input{
width:100%;
padding:10px;
margin-top:6px
}

video{
width:100%;
border-radius:8px;
margin-top:10px
}

.alert{
color:red;
font-size:12px
}

.footer{
text-align:center;
margin-top:30px;
font-size:12px;
color:gray
}

</style>
</head>

<body>

<div class="titolo">
<h1>🏢 Portineria Digitale</h1>
</div>

<div class="card">
<h3>📊 Dashboard</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📊 Pacchi mensili</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>📦 Scanner OCR</h3>
<button onclick="startScanner()">Scanner pacco</button>
</div>

<div class="card">
<h3>📦 Scanner Barcode</h3>
<button onclick="startBarcode()">Scanner barcode</button>
</div>

<div class="card">
<button onclick="avvisaPacchiOggi()">📦 Avvisa tutti i pacchi di oggi</button>
</div>

<video id="video" autoplay></video>

<div class="card">
<h3>📦 Inserisci pacco</h3>

<input id="nomePacco" placeholder="Nome destinatario">
<input id="corriere" placeholder="Corriere">
<input id="tracking" placeholder="Tracking">

<button onclick="registraPaccoManuale()">Registra</button>

</div>

<div class="card">
<h3>📬 Inserisci raccomandata</h3>

<input id="nomeRacc" placeholder="Nome destinatario">
<input id="numeroRacc" placeholder="Numero raccomandata">

<button onclick="registraRaccManuale()">Registra</button>

</div>

<div class="card">
<h3>📦 Pacchi</h3>

<input id="searchPacchi" placeholder="Cerca pacco" oninput="mostraPacchi()">

<div id="pacchi"></div>

</div>

<div class="card">
<h3>📬 Raccomandate</h3>

<div id="racc"></div>

</div>

<div class="card">
<h3>📜 Storico consegne</h3>

<div id="storico"></div>

</div>

<div class="card">

<h3>👥 Rubrica condomini</h3>

<input id="searchCondomino" placeholder="Cerca condomino" oninput="caricaCondomini()">

<input id="nome" placeholder="Nome e cognome">
<input id="telefono" placeholder="Telefono">
<input id="scala" placeholder="Scala">
<input id="piano" placeholder="Piano">
<input id="interno" placeholder="Interno">

<button onclick="aggiungiCondomino()">Aggiungi</button>

<div id="condomini"></div>

</div>

<div class="card">

<h3>💾 Backup dati</h3>

<button onclick="esporta()">Esporta</button>

<input type="file" onchange="importa(event)">

</div>

<div class="footer">
Portineria Digitale<br>
Creato da Rosario Bossis
</div>

<script>

let scannerAttivo=false
let streamCamera=null
let chart=null
let scannerLock=false

function safeParse(k){
try{
return JSON.parse(localStorage.getItem(k))||[]
}catch{
return[]
}
}

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

function avvisaWhatsApp(nome,tipo){

let db=safeParse("condomini")

let condomino=db.find(c=>c.nome && c.nome.toLowerCase()===nome.toLowerCase())

if(!condomino)return
if(!condomino.telefono)return

let telefono=condomino.telefono.replace(/\D/g,'')

let messaggio="Salve, è arrivato "+tipo+" per: "+condomino.nome+". Può ritirarlo in portineria."

let url="https://wa.me/"+telefono+"?text="+encodeURIComponent(messaggio)

window.open(url)

}

function avvisaPacchiOggi(){

let pacchi=safeParse("pacchi")

let oggi=new Date().toDateString()

pacchi.forEach(p=>{

if(!p.data)return

let d=new Date(p.data).toDateString()

if(d===oggi){

avvisaWhatsApp(p.nome,"un pacco")

}

})

}

function normalizza(t){

return (t||"")
.toLowerCase()
.replace(/0/g,"o")
.replace(/1/g,"i")
.replace(/5/g,"s")
.replace(/[^a-z]/g,"")

}

function similar(a,b){

if(!a||!b)return false

a=normalizza(a)
b=normalizza(b)

return a.includes(b) || b.includes(a)

}

function riconosciCorriere(tracking){

if(!tracking)return""

if(tracking.startsWith("TBA"))return"Amazon"
if(tracking.startsWith("1Z"))return"UPS"
if(tracking.startsWith("JD"))return"DHL"
if(tracking.startsWith("GLS"))return"GLS"

return""

}

async function startScanner(){

scannerAttivo=true
scannerLock=false

let video=document.getElementById("video")

try{

streamCamera=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=streamCamera

scanLoop()

}catch{

alert("Fotocamera non disponibile")

}

}

async function scanLoop(){

if(!scannerAttivo)return
if(scannerLock)return

let video=document.getElementById("video")

if(!video.videoWidth){
setTimeout(scanLoop,1500)
return
}

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let result=await Tesseract.recognize(canvas,'ita')

trovaDestinatario(result.data.text||"")

setTimeout(scanLoop,2000)

}

function stopScanner(){

scannerAttivo=false

if(streamCamera)
streamCamera.getTracks().forEach(t=>t.stop())

}

function trovaDestinatario(testo){

let db=safeParse("condomini")

for(let c of db){

let cognome=c.nome.split(" ").pop()

if(similar(testo,cognome)){

if(scannerLock)return

scannerLock=true

beep()

stopScanner()

registraPaccoAuto(c.nome)

avvisaWhatsApp(c.nome,"un pacco")

}

}

}

function startBarcode(){

const reader=new ZXing.BrowserBarcodeReader()

reader.decodeFromVideoDevice(null,'video',(result)=>{

if(result){

let tracking=result.text

document.getElementById("tracking").value=tracking

let corriere=riconosciCorriere(tracking)

if(corriere){
document.getElementById("corriere").value=corriere
}

alert("Tracking rilevato: "+tracking)

reader.reset()

stopScanner()

}

})

}

function registraPaccoManuale(){

let nome=document.getElementById("nomePacco").value
if(!nome)return

let corriere=document.getElementById("corriere").value
let tracking=document.getElementById("tracking").value

let pacchi=safeParse("pacchi")

pacchi.unshift({
nome,
corriere,
tracking,
data:new Date().toISOString()
})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

avvisaWhatsApp(nome,"un pacco")

document.getElementById("nomePacco").value=""
document.getElementById("corriere").value=""
document.getElementById("tracking").value=""

mostraPacchi()
stats()
grafico()

}

function registraPaccoAuto(nome){

let pacchi=safeParse("pacchi")

pacchi.unshift({
nome,
data:new Date().toISOString()
})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()
stats()
grafico()

}

function registraRaccManuale(){

let nome=document.getElementById("nomeRacc").value
let numero=document.getElementById("numeroRacc").value

if(!nome)return

let racc=safeParse("raccomandate")

racc.unshift({
nome,
numero,
data:new Date().toISOString()
})

localStorage.setItem("raccomandate",JSON.stringify(racc))

avvisaWhatsApp(nome,"una raccomandata")

document.getElementById("nomeRacc").value=""
document.getElementById("numeroRacc").value=""

mostraRacc()

}

function mostraPacchi(){

let filtro=(document.getElementById("searchPacchi").value||"").toLowerCase()

let pacchi=safeParse("pacchi")

let div=document.getElementById("pacchi")

div.innerHTML=""

pacchi.forEach((p,i)=>{

if(!p || !p.nome)return
if(!p.nome.toLowerCase().includes(filtro))return

let giorni=0

if(p.data){

let d=new Date(p.data)

if(!isNaN(d)){
giorni=(Date.now()-d)/86400000
}

}

div.innerHTML+=`
<div>
<b>${p.nome}</b>
${giorni>7?'<div class="alert">⚠ pacco oltre 7 giorni</div>':''}
<button onclick="consegnaPacco(${i})">Consegnato</button>
</div>
`

})

}

function mostraRacc(){

let racc=safeParse("raccomandate")

let div=document.getElementById("racc")

div.innerHTML=""

racc.forEach((r,i)=>{

if(!r.nome)return

div.innerHTML+=`
<div>
<b>${r.nome}</b>
<button onclick="consegnaRacc(${i})">Consegnato</button>
</div>
`

})

}

function consegnaPacco(i){

let pacchi=safeParse("pacchi")
let storico=safeParse("storico")

if(pacchi[i]){

pacchi[i].consegnato=new Date().toISOString()

storico.unshift(pacchi[i])

pacchi.splice(i,1)

}

localStorage.setItem("pacchi",JSON.stringify(pacchi))
localStorage.setItem("storico",JSON.stringify(storico))

mostraPacchi()
mostraStorico()
stats()
grafico()

}

function consegnaRacc(i){

let racc=safeParse("raccomandate")
let storico=safeParse("storico")

if(racc[i]){

racc[i].consegnato=new Date().toISOString()

storico.unshift(racc[i])

racc.splice(i,1)

}

localStorage.setItem("raccomandate",JSON.stringify(racc))
localStorage.setItem("storico",JSON.stringify(storico))

mostraRacc()
mostraStorico()
stats()

}

function mostraStorico(){

let storico=safeParse("storico")

let div=document.getElementById("storico")

div.innerHTML=""

storico.forEach(s=>{

if(!s.nome)return

let data=""

if(s.consegnato){

let d=new Date(s.consegnato)

data=" - consegnato "+d.toLocaleString()

}

div.innerHTML+=`<div><b>${s.nome}</b>${data}</div>`

})

}

function aggiungiCondomino(){

let nome=document.getElementById("nome").value

if(!nome)return

let db=safeParse("condomini")

db.push({
nome,
telefono:document.getElementById("telefono").value,
scala:document.getElementById("scala").value,
piano:document.getElementById("piano").value,
interno:document.getElementById("interno").value
})

localStorage.setItem("condomini",JSON.stringify(db))

caricaCondomini()

}

function caricaCondomini(){

let filtro=(document.getElementById("searchCondomino").value||"").toLowerCase()

let db=safeParse("condomini")

let div=document.getElementById("condomini")

div.innerHTML=""

db.forEach((c,i)=>{

if(!c.nome)return
if(!c.nome.toLowerCase().includes(filtro))return

div.innerHTML+=`
<div>
${c.nome}
<button onclick="eliminaCondomino(${i})">❌</button>
</div>
`

})

}

function eliminaCondomino(i){

if(!confirm("Eliminare condomino?"))return

let db=safeParse("condomini")

db.splice(i,1)

localStorage.setItem("condomini",JSON.stringify(db))

caricaCondomini()

}

function esporta(){

let data=JSON.stringify(localStorage)

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_portineria.json"

a.click()

}

function importa(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

for(let k in data)
localStorage.setItem(k,data[k])

location.reload()

}

reader.readAsText(file)

}

function stats(){

let pacchi=safeParse("pacchi")
let storico=safeParse("storico")

document.getElementById("stats").innerHTML=
"Pacchi presenti: "+pacchi.length+
"<br>Consegnati: "+storico.length

}

function grafico(){

let storico=safeParse("storico")

let mesi=new Array(12).fill(0)

storico.forEach(s=>{

if(!s.data)return

let d=new Date(s.data)

if(isNaN(d))return

let m=d.getMonth()

mesi[m]++

})

if(chart)chart.destroy()

chart=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels:["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"],
datasets:[{label:"Pacchi",data:mesi}]
}
})

}

mostraPacchi()
mostraRacc()
mostraStorico()
stats()
grafico()

</script>

</body>
</html>
