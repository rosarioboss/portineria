<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:6px;
}

.verde{background:#b9f6ca}
.giallo{background:#fff59d}
.rosso{background:#ff8a80}

.riga{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>📦 Nuovo pacco</h2>

<select id="rubrica"></select>

<button onclick="inviaPacco()">Avviso pacco</button>

<button onclick="scansionaEtichetta()">📷 Scansiona etichetta</button>

<video id="camera" autoplay playsinline style="width:100%;display:none;"></video>

<button id="scattaBtn" onclick="catturaFoto()" style="display:none;">Scatta foto</button>

<canvas id="canvas" style="display:none;"></canvas>

</div>

<div class="card">

<h2>📦 Pacchi in giacenza</h2>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h2>👥 Rubrica</h2>

<input type="file" onchange="importaFile(event)">

</div>

</div>

<script>

function caricaRubrica(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let rubrica=document.getElementById("rubrica")

rubrica.innerHTML=""

db.forEach(c=>{

rubrica.innerHTML+=`<option value="${c.tel}">${c.nome}</option>`

})

}

function importaFile(event){

let file=event.target.files[0]

let reader=new FileReader()

reader.onload=function(e){

let dati=JSON.parse(e.target.result)

localStorage.setItem("condomini",JSON.stringify(dati.condomini))

alert("Rubrica caricata")

caricaRubrica()

}

reader.readAsText(file)

}

function mostraPacchi(){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("listaPacchi")

div.innerHTML=""

lista.forEach((p,i)=>{

let data=new Date(p.data)

let giorni=Math.floor((Date.now()-data)/(1000*60*60*24))

let r=document.createElement("div")

r.className="riga"

r.innerHTML=p.nome+" <button onclick='ritirato("+i+")'>Ritirato</button>"

if(giorni==0)r.classList.add("verde")
else if(giorni<=3)r.classList.add("giallo")
else r.classList.add("rosso")

div.appendChild(r)

})

}

function inviaPacco(){

let sel=document.getElementById("rubrica")

let tel=sel.value

let nome=sel.options[sel.selectedIndex].text

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome:nome,data:new Date().toISOString()})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent("È arrivato un pacco per "+nome))

}

function ritirato(i){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

lista.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(lista))

mostraPacchi()

}

async function scansionaEtichetta(){

let video=document.getElementById("camera")

let btn=document.getElementById("scattaBtn")

video.style.display="block"

btn.style.display="block"

let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

video.srcObject=stream

}

function catturaFoto(){

let video=document.getElementById("camera")

let canvas=document.getElementById("canvas")

let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth

canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

video.srcObject.getTracks().forEach(t=>t.stop())

video.style.display="none"

document.getElementById("scattaBtn").style.display="none"

let img=canvas.toDataURL()

leggiTesto(img)

}

async function leggiTesto(img){

let r=await Tesseract.recognize(img,"ita")

trovaCondomino(r.data.text)

}

function trovaCondomino(testo){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

testo=testo.toLowerCase()

let trovato=null

db.forEach(c=>{

let nome=c.nome.toLowerCase()

if(testo.includes(nome)||testo.includes(nome.split(" ")[0])){

trovato=c

}

})

if(trovato){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

audio.play()

window.open("https://wa.me/"+trovato.tel+"?text="+encodeURIComponent("È arrivato un pacco per "+trovato.nome))

}else{

alert("Condomino non trovato")

}

}

window.onload=function(){

caricaRubrica()

mostraPacchi()

}

</script>

</body>
</html>
