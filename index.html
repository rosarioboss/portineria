<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portineria Digitale PRO</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
        :root { --primary: #1a73e8; --success: #25D366; --danger: #e74c3c; --dark: #2c3e50; --light: #f8f9fa; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: var(--dark); }
        h1 { text-align: center; color: var(--primary); font-weight: 800; }
        .card { background: white; padding: 18px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        button, .btn-link { 
            width: 100%; padding: 16px; border: none; border-radius: 14px; 
            background: var(--primary); color: white; font-size: 17px; font-weight: 700;
            margin-top: 10px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box;
        }
        .btn-wa { background: var(--success) !important; }
        .btn-sec { background: #3498db; }
        .btn-del { background: var(--danger) !important; width: auto; padding: 8px 15px; font-size: 13px; }

        input, textarea { width: 100%; padding: 14px; margin-top: 8px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: var(--light); }
        
        .video-wrapper { position: relative; width: 100%; display: none; margin-top: 10px; border-radius: 20px; overflow: hidden; background: #000; }
        .video-wrapper.active { display: block; }
        video { width: 100%; display: block; }
        .scanner-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75%; height: 100px; border: 3px solid var(--success); border-radius: 15px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); pointer-events: none; }

        .pacco-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .img-preview { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; margin-right: 12px; }
        .flex-row { display: flex; align-items: center; justify-content: space-between; }
        .semaforo { font-weight: bold; text-align: center; padding: 15px; border-radius: 15px; margin-bottom: 15px; color: white; }
    </style>
</head>
<body>

<h1>🏢 Portineria Digitale</h1>

<div class="card">
    <div id="semaforo" class="semaforo" style="background: #95a5a6;">Caricamento...</div>
</div>

<div class="card">
    <button onclick="startScanner('ocr')">📄 Scansiona Nome (OCR)</button>
    <button onclick="startScanner('barcode')" style="background:#8e44ad">🔍 Scansiona Barcode</button>
    <button onclick="stopCamera()" id="btnStop" style="display:none; background:#7f8c8d">Chiudi Camera</button>
    <div id="videoWrapper" class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="scanner-box"></div>
    </div>
</div>

<div class="card">
    <h3>📦 Nuovo Pacco</h3>
    <input type="file" id="fotoInput" accept="image/*" capture="environment" style="margin-bottom:10px;">
    <input id="nomePacco" placeholder="Nome destinatario...">
    <button onclick="registraPacco()">Registra Pacco</button>
</div>

<div class="card">
    <h3>📋 Pacchi in Attesa</h3>
    <input id="searchPacchi" placeholder="Cerca..." oninput="renderPacchi()">
    <div id="lista-pacchi"></div>
</div>

<div class="card">
    <h3>👥 Gestione Condomini</h3>
    
    <input type="file" id="fileCondomini" accept=".json,.txt" style="display: none;" onchange="importaFileCondomini(event)">
    
    <button onclick="document.getElementById('fileCondomini').click()" style="background:#2c3e50">📥 Importa File Condomini (JSON/TXT)</button>
    
    <div style="margin-top:20px;">
        <p style="font-size:12px; color:#666;">Oppure incolla testo dalle Note:</p>
        <textarea id="testoMassivo" placeholder="Mario Rossi, 3331234567"></textarea>
        <button onclick="importaDaTesto()" class="btn-sec">Carica da Testo</button>
    </div>
    
    <div id="lista-rubrica" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
</div>

<div class="card">
    <h3>📊 Statistiche e Backup</h3>
    <canvas id="graficoStorico"></canvas>
    <button onclick="esportaTutto()" style="background:#607d8b">Esporta Backup Totale</button>
    <button onclick="svuotaTutto()" style="background:transparent; color:red; border:none; font-size:11px; margin-top:20px;">⚠️ Cancella tutto</button>
</div>

<script>
let streamCamera = null;
let myChart = null;

// Database locale
const DB = {
    get: (k) => JSON.parse(localStorage.getItem(k)) || [],
    set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

window.onload = () => { renderTutto(); initChart(); };

function renderTutto() { renderPacchi(); renderRubrica(); aggiornaSemaforo(); if(myChart) aggiornaGrafico(); }

// --- FUNZIONI DI IMPORTAZIONE (FIXED) ---

// 1. Carica da FILE (JSON o TXT)
function importaFileCondomini(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            // Prova a leggere come JSON (backup)
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data)) {
                DB.set('condomini', data);
            } else if (data.condomini) {
                DB.set('condomini', data.condomini);
            }
            alert("Rubrica aggiornata con successo!");
            renderTutto();
        } catch (err) {
            // Se non è JSON, prova a leggere riga per riga (TXT)
            const righe = e.target.result.split('\n');
            processaRighe(righe);
        }
    };
    reader.readAsText(file);
}

// 2. Carica da TESTO INCOLLATO
function importaDaTesto() {
    const testo = document.getElementById('testoMassivo').value;
    if (!testo) return alert("Incolla prima la lista!");
    const righe = testo.split('\n');
    processaRighe(righe);
    document.getElementById('testoMassivo').value = "";
}

// Logica per trasformare le righe in condomini
function processaRighe(righe) {
    let condomini = DB.get('condomini');
    let aggiunti = 0;
    righe.forEach(riga => {
        const parti = riga.split(/[,;-]/);
        if (parti.length >= 2) {
            const nome = parti[0].trim();
            const tel = parti[1].trim().replace(/\s/g, '');
            if (nome && tel) {
                condomini.push({ nome, telefono: tel });
                aggiunti++;
            }
        }
    });
    DB.set('condomini', condomini);
    renderTutto();
    alert("Aggiunti " + aggiunti + " condomini!");
}

// --- WHATSAPP ---
function getWALink(nome) {
    const rubrica = DB.get('condomini');
    const cerca = nome.toLowerCase().trim();
    const u = rubrica.find(c => cerca.includes(c.nome.toLowerCase().trim()) || c.nome.toLowerCase().trim().includes(cerca));
    if (!u) return null;
    let tel = u.telefono.replace(/\D/g, '');
    if (tel.length === 10) tel = "39" + tel;
    return `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent("Ciao " + u.nome + ", c'è un pacco per te! 📦")}`;
}

// --- FOTOCAMERA ---
async function startScanner(tipo) {
    stopCamera();
    try {
        streamCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = streamCamera;
        document.getElementById('videoWrapper').classList.add('active');
        document.getElementById('btnStop').style.display = "block";
        if(tipo === 'ocr') loopOCR(); else loopBarcode();
    } catch (e) { alert("Attiva fotocamera!"); }
}

function stopCamera() {
    if (streamCamera) {
        streamCamera.getTracks().forEach(t => t.stop());
        document.getElementById('videoWrapper').classList.remove('active');
        document.getElementById('btnStop').style.display = "none";
        streamCamera = null;
    }
}

async function loopOCR() {
    if(!streamCamera) return;
    const v = document.getElementById('video');
    const canvas = document.createElement('canvas');
    canvas.width = v.videoWidth * 0.8; canvas.height = v.videoHeight * 0.2;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(v, v.videoWidth*0.1, v.videoHeight*0.4, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
    try {
        const res = await Tesseract.recognize(canvas, 'ita');
        const txt = res.data.text.toLowerCase();
        DB.get('condomini').forEach(c => {
            if (txt.includes(c.nome.toLowerCase()) && c.nome.length > 3) {
                document.getElementById('nomePacco').value = c.nome.toUpperCase();
                stopCamera();
            }
        });
    } catch (e) {}
    if(streamCamera) setTimeout(loopOCR, 2000);
}

function loopBarcode() {
    const reader = new ZXing.BrowserBarcodeReader();
    reader.decodeFromVideoDevice(null, 'video', (res) => {
        if (res) { document.getElementById('nomePacco').value = res.text; stopCamera(); }
    });
}

// --- PACCHI ---
async function registraPacco() {
    const nome = document.getElementById('nomePacco').value.trim();
    if (!nome) return;
    let fotoData = null;
    const file = document.getElementById('fotoInput').files[0];
    if (file) {
        fotoData = await new Promise(r => {
            const rd = new FileReader();
            rd.readAsDataURL(file);
            rd.onload = e => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const cv = document.createElement('canvas');
                    cv.width = 400; cv.height = img.height * (400/img.width);
                    cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
                    r(cv.toDataURL('image/jpeg', 0.7));
                }
            }
        });
    }
    const pacchi = DB.get('pacchi');
    pacchi.unshift({ id: Date.now(), nome, data: new Date().toISOString(), foto: fotoData });
    DB.set('pacchi', pacchi);
    document.getElementById('nomePacco').value = "";
    document.getElementById('fotoInput').value = "";
    renderTutto();
}

function renderPacchi() {
    const f = document.getElementById('searchPacchi').value.toLowerCase();
    const container = document.getElementById('lista-pacchi');
    container.innerHTML = "";
    DB.get('pacchi').forEach(p => {
        if (!p.nome.toLowerCase().includes(f)) return;
        const wa = getWALink(p.nome);
        const div = document.createElement('div');
        div.className = 'pacco-item';
        div.innerHTML = `
            <div class="flex-row">
                <div style="display:flex; align-items:center;">
                    <img src="${p.foto || 'https://via.placeholder.com/60'}" class="img-preview">
                    <div><b>${p.nome}</b><br><small>${new Date(p.data).toLocaleString()}</small></div>
                </div>
                <button class="btn-del" onclick="consegna(${p.id})">RITIRO</button>
            </div>
            ${wa ? `<a href="${wa}" target="_blank" class="btn-link btn-wa">📲 AVVISA</a>` : ''}
        `;
        container.appendChild(div);
    });
}

function consegna(id) {
    let p = DB.get('pacchi'); let s = DB.get('storico');
    const i = p.findIndex(x => x.id === id);
    if (i > -1) {
        s.push({...p[i], dataFine: new Date().toISOString()});
        p.splice(i, 1);
        DB.set('pacchi', p); DB.set('storico', s);
        renderTutto();
    }
}

// --- RUBRICA ---
function renderRubrica() {
    const c = document.getElementById('lista-rubrica');
    c.innerHTML = "";
    DB.get('condomini').forEach((u, i) => {
        const d = document.createElement('div');
        d.style = "display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;";
        d.innerHTML = `<span>${u.nome}</span><button onclick="rimuoviC(${i})" style="color:red; background:none; border:none;">X</button>`;
        c.appendChild(d);
    });
}
function rimuoviC(i) { let c = DB.get('condomini'); c.splice(i,1); DB.set('condomini', c); renderRubrica(); }

// --- DASHBOARD ---
function aggiornaSemaforo() {
    const n = DB.get('pacchi').length;
    const s = document.getElementById('semaforo');
    s.style.background = n > 0 ? "var(--info)" : "var(--success)";
    s.innerText = n > 0 ? n + " PACCHI IN GIACENZA" : "NESSUN PACCO";
}

function initChart() {
    const ctx = document.getElementById('graficoStorico').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Ritiro', data: [], borderColor: '#1a73e8' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function aggiornaGrafico() {
    const s = DB.get('storico');
    const counts = {};
    s.forEach(x => { const d = new Date(x.dataFine).toLocaleDateString(); counts[d] = (counts[d] || 0) + 1; });
    myChart.data.labels = Object.keys(counts);
    myChart.data.datasets[0].data = Object.values(counts);
    myChart.update();
}

function esportaTutto() { const blob = new Blob([JSON.stringify(localStorage)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="backup_completo.json"; a.click(); }
function svuotaTutto() { if(confirm("Cancellare tutto?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
