<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Portineria OK</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 10px 0; font-size: 18px; }
        input { width: 100%; padding: 15px; font-size: 18px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .suggerimento { padding: 15px; border-bottom: 1px solid #eee; background: #fff; font-weight: bold; color: #007aff; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; text-align: center; display: block; text-decoration: none; }
        .btn-pacco { background: #007aff; }
        .btn-rac { background: #5856d6; }
        .btn-ritiro { background: #ff3b30; padding: 8px 12px; font-size: 12px; width: auto; margin: 0; }
        .item { background: white; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 1. Cerca Condomino</h2>
    <input id="cercaInput" placeholder="Scrivi il cognome..." oninput="cerca()">
    <div id="risultati"></div>
</div>

<div id="sezioneAzioni" class="card hidden">
    <h2 id="nomeDisplay">---</h2>
    <button class="btn btn-pacco" onclick="eseguiRegistrazione('PACCO')">AVVISA PER PACCO ➔</button>
    <button class="btn btn-rac" onclick="eseguiRegistrazione('RACCOMANDATA')">AVVISA PER RACCOMANDATA ➔</button>
    <button class="btn" style="background:#8e8e93" onclick="annulla()">ANNULLA</button>
</div>

<div class="card">
    <h2>📥 In Giacenza</h2>
    <div id="listaGiacenza"></div>
</div>

<button onclick="document.getElementById('admin').classList.toggle('hidden')" style="width:100%; background:none; border:none; color:gray; padding:10px;">⚙️ Gestisci Rubrica</button>

<div id="admin" class="card hidden">
    <h3>Aggiungi Contatto</h3>
    <input id="rNome" placeholder="Nome Cognome" style="margin-bottom:10px">
    <input id="rTel" placeholder="3331234567" style="margin-bottom:10px">
    <button class="btn btn-pacco" onclick="aggiungiRubrica()">SALVA IN RUBRICA</button>
    <div id="listaRubrica" style="margin-top:10px; font-size:12px;"></div>
</div>

<script>
const STORAGE = {
    save: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
    load: k => JSON.parse(localStorage.getItem(k)) || []
};

let selezionato = null;

function cerca() {
    let q = document.getElementById("cercaInput").value.toUpperCase();
    let res = document.getElementById("risultati");
    if (q.length < 1) { res.innerHTML = ""; return; }
    let rubrica = STORAGE.load("rubrica");
    let trovati = rubrica.filter(u => u.nome.includes(q));
    res.innerHTML = trovati.map(u => `<div class="suggerimento" onclick="selezionaCondomino('${u.nome}', '${u.tel}')">${u.nome}</div>`).join("");
}

function selezionaCondomino(nome, tel) {
    selezionato = { nome, tel };
    document.getElementById("nomeDisplay").innerText = nome;
    document.getElementById("sezioneAzioni").classList.remove("hidden");
    document.getElementById("risultati").innerHTML = "";
    document.getElementById("cercaInput").value = "";
}

function eseguiRegistrazione(tipo) {
    if (!selezionato) return;

    // 1. REGISTRA IN GIACENZA
    let g = STORAGE.load("giacenza");
    g.unshift({ nome: selezionato.nome, tipo: tipo, data: new Date().toLocaleDateString('it-IT') });
    STORAGE.save("giacenza", g);

    // 2. APRI WHATSAPP
    let tel = selezionato.tel;
    let pref = tel.startsWith("39") ? "" : "39";
    let msg = `Buongiorno ${selezionato.nome}, ti avviso che è arrivato un ${tipo} per te in portineria.`;
    
    // Reset interfaccia prima di aprire WA per evitare blocchi
    annulla();
    renderGiacenza();

    // Apertura forzata WhatsApp
    window.location.href = `https://wa.me/${pref}${tel}?text=${encodeURIComponent(msg)}`;
}

function renderGiacenza() {
    let g = STORAGE.load("giacenza");
    document.getElementById("listaGiacenza").innerHTML = g.map((x, i) => `
        <div class="item">
            <div><b>${x.nome}</b><br><small>${x.tipo} - ${x.data}</small></div>
            <button class="btn btn-ritiro" onclick="ritira(${i})">RITIRATO</button>
        </div>
    `).join("") || "Nessun pacco";
}

function ritira(i) {
    let g = STORAGE.load("giacenza");
    g.splice(i, 1);
    STORAGE.save("giacenza", g);
    renderGiacenza();
}

function aggiungiRubrica() {
    let n = document.getElementById("rNome").value.toUpperCase().trim();
    let t = document.getElementById("rTel").value.trim();
    if (!n || !t) return alert("Inserisci tutti i dati!");
    let r = STORAGE.load("rubrica");
    r.push({ nome: n, tel: t });
    STORAGE.save("rubrica", r);
    alert("Salvato!");
    document.getElementById("rNome").value = "";
    document.getElementById("rTel").value = "";
}

function annulla() {
    selezionato = null;
    document.getElementById("sezioneAzioni").classList.add("hidden");
}

window.onload = renderGiacenza;
</script>
</body>
</html>
