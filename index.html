<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portineria Digitale PRO - Full Edition</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
        :root {
            --primary: #1a73e8;
            --success: #25D366;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --info: #3498db;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        h1 { text-align: center; color: var(--primary); font-size: 26px; margin: 15px 0; font-weight: 800; }
        h3 { margin-top: 0; color: var(--dark); font-size: 18px; border-bottom: 2px solid var(--light); padding-bottom: 8px; }

        .card {
            background: white;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.03);
        }

        button, .btn-link {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background-color: var(--primary);
            color: white;
            font-size: 17px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-block;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.97); opacity: 0.8; }

        .btn-wa { background-color: var(--success) !important; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3); }
        .btn-sec { background-color: var(--info); }
        .btn-del { background-color: var(--danger) !important; width: auto; padding: 10px 18px; font-size: 14px; margin: 0; }
        .btn-outline { background: transparent; border: 2px solid #ccc; color: #666; margin-top: 15px; }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            background: var(--light);
            transition: border 0.3s;
        }

        textarea { height: 100px; font-family: monospace; font-size: 13px; }

        .video-wrapper {
            position: relative;
            width: 100%;
            display: none;
            margin-top: 10px;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper.active { display: block; }
        video { width: 100%; display: block; }

        .scanner-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            height: 100px;
            border: 3px solid var(--success);
            border-radius: 15px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--success);
            top: 0;
            animation: scan 2s infinite linear;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .pacco-item { border-bottom: 1px solid #eee; padding: 18px 0; }
        .flex-row { display: flex; align-items: center; justify-content: space-between; }
        .pacco-info { display: flex; align-items: center; gap: 15px; }
        
        .img-preview {
            width: 65px;
            height: 65px;
            border-radius: 12px;
            object-fit: cover;
            background: #eee;
            border: 1px solid #ddd;
        }

        .pacco-text b { font-size: 18px; text-transform: uppercase; display: block; color: var(--dark); }
        .pacco-text small { color: #888; font-size: 13px; }

        .semaforo {
            font-weight: 800;
            text-align: center;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            color: white;
            text-transform: uppercase;
        }

        .rubrica-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
            background: var(--light);
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: var(--light); padding: 12px; border-radius: 12px; text-align: center; }
        .stat-box span { font-size: 20px; font-weight: bold; color: var(--primary); display: block; }

        canvas { margin-top: 20px; max-height: 250px; }

        #loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.8); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="loading-overlay">⌛ Elaborazione...</div>

<h1>🏢 Portineria Digitale</h1>

<div class="card">
    <div id="semaforo" class="semaforo" style="background: #95a5a6;">Inizializzazione...</div>
    <div class="stats-grid">
        <div class="stat-box"><span id="count-oggi">0</span><label>PACCHI OGGI</label></div>
        <div class="stat-box"><span id="count-totale">0</span><label>IN GIACENZA</label></div>
    </div>
</div>

<div class="card">
    <h3>📷 Acquisizione Rapida</h3>
    <button onclick="startScanner('ocr')">📄 Leggi Etichetta (OCR)</button>
    <button onclick="startScanner('barcode')" style="background:#8e44ad">🔍 Scansiona Barcode</button>
    <button onclick="stopCamera()" id="btnStop" style="display:none; background:#7f8c8d">Chiudi Fotocamera</button>
    
    <div id="videoWrapper" class="video-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <div class="scanner-box"><div class="scanner-line"></div></div>
    </div>
</div>

<div class="card">
    <h3>📦 Nuovo Ingresso</h3>
    <input type="file" id="fotoInput" accept="image/*" capture="environment" style="margin-bottom:10px;">
    <input id="nomePacco" placeholder="Nome del destinatario...">
    <button onclick="registraPacco()">Registra e Salva</button>
</div>

<div class="card">
    <h3>📋 Lista Giacenze</h3>
    <input id="searchPacchi" placeholder="Cerca tra i pacchi..." oninput="renderPacchi()">
    <div id="lista-pacchi"></div>
</div>

<div class="card">
    <h3>👥 Importazione Condomini</h3>
    <p style="font-size:12px; color:#666;">Incolla qui la lista (es: Mario Rossi, 3331234567) una per riga:</p>
    <textarea id="importMassivo" placeholder="Nome Cognome, 393331234567"></textarea>
    <button onclick="importazioneMassiva()" style="background:#2c3e50">Carica Lista Completa</button>
    <hr>
    <h3>➕ Aggiungi Singolo</h3>
    <input id="nomeCondomino" placeholder="Nome e Cognome">
    <input id="telefonoCondomino" type="tel" placeholder="Cellulare">
    <button onclick="aggiungiCondomino()" class="btn-sec">Salva Singolo</button>
    <div id="lista-rubrica" style="margin-top: 15px; max-height: 200px; overflow-y: auto;"></div>
</div>

<div class="card">
    <h3>📊 Statistiche</h3>
    <canvas id="graficoStorico"></canvas>
    <hr>
    <button onclick="esportaDati()" style="background:#607d8b">Scarica Backup Database</button>
    <button onclick="cancellaTutto()" style="background:transparent; color:red; font-size:11px; border:none; margin-top:20px;">⚠️ Svuota tutto</button>
</div>

<script>
let streamCamera = null;
let myChart = null;

const DB = {
    pacchi: () => JSON.parse(localStorage.getItem('pacchi')) || [],
    condomini: () => JSON.parse(localStorage.getItem('condomini')) || [],
    storico: () => JSON.parse(localStorage.getItem('storico')) || [],
    save: (key, data) => localStorage.setItem(key, JSON.stringify(data))
};

window.onload = () => { renderTutto(); initChart(); };

function renderTutto() { renderPacchi(); renderRubrica(); aggiornaDashboard(); if(myChart) aggiornaGrafico(); }

// --- WHATSAPP FIX IPHONE ---
function getWhatsAppLink(nomeDestinatario) {
    const rubrica = DB.condomini();
    const cerca = nomeDestinatario.toLowerCase().trim();
    const utente = rubrica.find(u => cerca.includes(u.nome.toLowerCase().trim()) || u.nome.toLowerCase().trim().includes(cerca));
    if (!utente) return null;
    let tel = utente.telefono.replace(/\D/g, '');
    if (tel.length === 10) tel = "39" + tel;
    return `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent("Ciao " + utente.nome + ", c'è un pacco per te! 📦")}`;
}

// --- IMPORTAZIONE MASSIVA ---
function importazioneMassiva() {
    const testo = document.getElementById('importMassivo').value;
    if(!testo) return;
    const righe = testo.split('\n');
    let condomini = DB.condomini();
    let contatore = 0;

    righe.forEach(riga => {
        let parti = riga.split(/[,;-]/); // Separa per virgola, punto e virgola o trattino
        if(parti.length >= 2) {
            let nome = parti[0].trim();
            let tel = parti[1].trim().replace(/\s/g, '');
            if(nome && tel) {
                condomini.push({ nome, telefono: tel });
                contatore++;
            }
        }
    });

    DB.save('condomini', condomini);
    document.getElementById('importMassivo').value = "";
    renderTutto();
    alert("Caricati " + contatore + " condomini con successo!");
}

// --- FOTOCAMERA ---
async function startScanner(modalita) {
    stopCamera();
    try {
        streamCamera = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = streamCamera;
        document.getElementById('videoWrapper').classList.add('active');
        document.getElementById('btnStop').style.display = "block";
        if(modalita === 'ocr') loopOCR(); else loopBarcode();
    } catch (err) { alert("Attiva fotocamera!"); }
}

function stopCamera() {
    if (streamCamera) {
        streamCamera.getTracks().forEach(t => t.stop());
        document.getElementById('videoWrapper').classList.remove('active');
        document.getElementById('btnStop').style.display = "none";
        streamCamera = null;
    }
}

async function loopOCR() {
    if(!streamCamera) return;
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth * 0.8; canvas.height = video.videoHeight * 0.2;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, video.videoWidth*0.1, video.videoHeight*0.4, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
    try {
        const result = await Tesseract.recognize(canvas, 'ita');
        const testo = result.data.text.toLowerCase();
        DB.condomini().forEach(c => {
            if (testo.includes(c.nome.toLowerCase()) && c.nome.length > 3) {
                document.getElementById('nomePacco').value = c.nome.toUpperCase();
                stopCamera();
            }
        });
    } catch (e) {}
    if(streamCamera) setTimeout(loopOCR, 2000);
}

function loopBarcode() {
    const codeReader = new ZXing.BrowserBarcodeReader();
    codeReader.decodeFromVideoDevice(null, 'video', (result) => {
        if (result) { document.getElementById('nomePacco').value = result.text; stopCamera(); }
    });
}

// --- LOGICA PACCHI ---
async function registraPacco() {
    const nome = document.getElementById('nomePacco').value.trim();
    if(!nome) return;
    showLoading(true);
    const fotoFile = document.getElementById('fotoInput').files[0];
    let fotoData = null;
    if(fotoFile) fotoData = await compressImage(fotoFile);
    const pacchi = DB.pacchi();
    pacchi.unshift({ id: Date.now(), nome, data: new Date().toISOString(), foto: fotoData });
    DB.save('pacchi', pacchi);
    document.getElementById('nomePacco').value = "";
    document.getElementById('fotoInput').value = "";
    showLoading(false);
    renderTutto();
}

function renderPacchi() {
    const filtro = document.getElementById('searchPacchi').value.toLowerCase();
    const container = document.getElementById('lista-pacchi');
    container.innerHTML = "";
    DB.pacchi().forEach(p => {
        if(!p.nome.toLowerCase().includes(filtro)) return;
        const wa = getWhatsAppLink(p.nome);
        const div = document.createElement('div');
        div.className = 'pacco-item';
        div.innerHTML = `
            <div class="flex-row">
                <div class="pacco-info">
                    <img src="${p.foto || 'https://via.placeholder.com/60'}" class="img-preview">
                    <div class="pacco-text"><b>${p.nome}</b><small>${new Date(p.data).toLocaleString()}</small></div>
                </div>
                <button class="btn-del" onclick="consegnaPacco(${p.id})">RITIRO</button>
            </div>
            ${wa ? `<a href="${wa}" target="_blank" class="btn-link btn-wa">📲 AVVISA</a>` : ''}
        `;
        container.appendChild(div);
    });
}

function consegnaPacco(id) {
    let pacchi = DB.pacchi();
    let storico = DB.storico();
    const index = pacchi.findIndex(p => p.id === id);
    if(index > -1) {
        storico.push({...pacchi[index], dataConsegna: new Date().toISOString()});
        pacchi.splice(index, 1);
        DB.save('pacchi', pacchi); DB.save('storico', storico);
        renderTutto();
    }
}

// --- RUBRICA ---
function aggiungiCondomino() {
    const nome = document.getElementById('nomeCondomino').value;
    const tel = document.getElementById('telefonoCondomino').value;
    if(!nome || !tel) return;
    let c = DB.condomini(); c.push({nome, telefono: tel}); DB.save('condomini', c);
    renderTutto();
}

function renderRubrica() {
    const container = document.getElementById('lista-rubrica');
    container.innerHTML = "";
    DB.condomini().forEach((c, i) => {
        const div = document.createElement('div');
        div.className = 'rubrica-item';
        div.innerHTML = `<span>${c.nome}</span><button onclick="rimuoviCondomino(${i})" style="color:red; background:none; width:auto;">X</button>`;
        container.appendChild(div);
    });
}

function rimuoviCondomino(i) { let c = DB.condomini(); c.splice(i, 1); DB.save('condomini', c); renderTutto(); }

// --- DASHBOARD & GRAFICO ---
function aggiornaDashboard() {
    const pacchi = DB.pacchi();
    document.getElementById('count-totale').innerText = pacchi.length;
    const s = document.getElementById('semaforo');
    s.style.background = pacchi.length > 0 ? "var(--info)" : "var(--success)";
    s.innerText = pacchi.length > 0 ? "Giacenza attiva" : "Tutto consegnato";
}

function initChart() {
    const ctx = document.getElementById('graficoStorico').getContext('2d');
    myChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Consegne', data: [], borderColor: '#1a73e8' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
    aggiornaGrafico();
}

function aggiornaGrafico() {
    const storico = DB.storico();
    const stats = {};
    storico.forEach(s => { const d = new Date(s.dataConsegna).toLocaleDateString(); stats[d] = (stats[d] || 0) + 1; });
    myChart.data.labels = Object.keys(stats);
    myChart.data.datasets[0].data = Object.values(stats);
    myChart.update();
}

function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 400 / img.width;
                canvas.width = 400; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            }
        }
    });
}

function showLoading(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }
function esportaDati() { const blob = new Blob([JSON.stringify(localStorage)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click(); }
function cancellaTutto() { if(confirm("Cancelli tutto?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
