<<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portineria PRO</title>

<style>
body{font-family:sans-serif;background:#f2f2f7;margin:0;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
input{width:100%;padding:18px;font-size:20px;border-radius:10px;border:1px solid #ccc}

.mode{
display:flex;
gap:10px;
margin-bottom:10px;
}

.mode button{
flex:1;
padding:15px;
border:none;
border-radius:10px;
font-weight:bold;
color:#fff;
font-size:16px;
opacity:0.5;
}

.active{opacity:1}

.pacco{background:#007aff}
.rac{background:#5856d6}

.item{
padding:15px;
border-bottom:1px solid #eee;
font-size:18px;
}

.item:active{background:#ddd}

.del{
background:#ff3b30;
color:#fff;
border:none;
padding:5px 10px;
border-radius:6px;
}

.small{font-size:13px;color:#666}
</style>

</head>

<body>

<div class="card">
<h2>⚡ Ricerca veloce</h2>

<div class="mode">
<button id="btnPacco" class="pacco active" onclick="setMode('PACCO')">PACCO</button>
<button id="btnRac" class="rac" onclick="setMode('RACCOMANDATA')">RACCOMANDATA</button>
</div>

<input id="q" placeholder="Scrivi nome..." oninput="cerca()">
<div id="res"></div>
</div>

<div class="card">
<h2>👥 Condomini</h2>
<div id="lista"></div>
</div>

<div class="card">
<h2>📥 Giacenza</h2>
<div id="g"></div>
</div>

<script>

// DATI
let rubrica=[
 {nome:"ROSSI MARIO",tel:"3331234567"},
 {nome:"BIANCHI LUCA",tel:"3339999999"},
 {nome:"VERDI ANNA",tel:"3331111111"}
]

let giacenza=[]
let mode="PACCO"

// NORMALIZZA
function norm(t){
return (t||"").toUpperCase().trim()
}

// CAMBIO MODALITÀ
function setMode(m){
mode=m

btnPacco.classList.remove("active")
btnRac.classList.remove("active")

if(m==="PACCO") btnPacco.classList.add("active")
if(m==="RACCOMANDATA") btnRac.classList.add("active")
}

// CERCA ISTANTANEA
function cerca(){
let val=norm(q.value)

if(!val){
res.innerHTML=""
return
}

let trovati=rubrica.filter(x=>norm(x.nome).includes(val))

res.innerHTML=trovati.map(x=>
`<div class="item" onclick="invia('${x.nome}','${x.tel}')">${x.nome}</div>`
).join("")

// AUTO INVIO
if(trovati.length===1){
invia(trovati[0].nome,trovati[0].tel)
reset()
}
}

// INVIO
function invia(nome,tel){
let numero=tel.replace(/\D/g,'')
let pref=numero.startsWith("39")?"":"39"

let msg=`Buongiorno ${nome}, è arrivata una ${mode} in portineria`

if(mode==="PACCO"){
msg=`Buongiorno ${nome}, è arrivato un pacco in portineria`
}

window.open(`https://wa.me/${pref}${numero}?text=${encodeURIComponent(msg)}`)

giacenza.unshift({
nome,
tipo:mode,
data:new Date().toLocaleDateString('it-IT')
})

render()
}

// RESET VELOCE
function reset(){
q.value=""
res.innerHTML=""
}

// RENDER
function render(){
lista.innerHTML=rubrica.map(x=>
`<div class="item" onclick="invia('${x.nome}','${x.tel}')">${x.nome}</div>`
).join("")

g.innerHTML=giacenza.map((x,i)=>`
<div class="item">
<b>${x.nome}</b><br>
<span class="small">${x.tipo} - ${x.data}</span>
<button class="del" onclick="event.stopPropagation(); rimuovi(${i})">OK</button>
</div>
`).join("")||"<div class='small'>Vuoto</div>"
}

// RIMUOVI
function rimuovi(i){
giacenza.splice(i,1)
render()
}

window.onload=render

</script>

</body>
</html>
