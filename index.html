<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portineria PRO v3.8 - Integrale</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
        :root {
            --primary: #007aff; --success: #34c759; --danger: #ff3b30;
            --dark: #1c1c1e; --light: #f2f2f7; --white: #ffffff; --gray: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--light); margin: 0; padding: 15px;
            color: var(--dark); -webkit-font-smoothing: antialiased;
        }

        .card {
            background: var(--white); padding: 20px; border-radius: 24px;
            margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
        }

        h1 { font-size: 26px; font-weight: 800; text-align: center; margin: 15px 0; letter-spacing: -1px; }
        h3 { margin-top: 0; font-size: 18px; color: var(--gray); display: flex; align-items: center; gap: 8px; }

        button {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            background-color: var(--primary); color: var(--white);
            font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 10px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.96); opacity: 0.8; }
        .btn-wa { background-color: var(--success) !important; }
        .btn-dark { background-color: var(--dark) !important; }
        .btn-outline { background: none; border: 2px solid var(--primary); color: var(--primary); }
        .btn-ritiro { background-color: var(--danger) !important; width: auto; padding: 8px 15px; font-size: 13px; margin: 0; }

        input, textarea {
            width: 100%; padding: 14px; margin-top: 10px; border: 2px solid #e5e5ea;
            border-radius: 12px; font-size: 16px; box-sizing: border-box; background: var(--light);
        }

        .video-container {
            position: relative; width: 100%; display: none; border-radius: 20px;
            overflow: hidden; background: #000; margin-top: 15px; aspect-ratio: 4/3;
        }
        .video-container.active { display: block; border: 3px solid var(--success); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .pacco-card {
            padding: 15px; background: var(--light); border-radius: 16px;
            margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px;
        }

        .status-pill {
            text-align: center; padding: 12px; border-radius: 14px;
            font-weight: 800; color: white; margin-bottom: 15px;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .loader-spin { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="loader-spin"></div><p>Eseguendo...</p></div>

<div class="container">
    <h1>Portineria PRO</h1>

    <div class="card">
        <div id="status-display" class="status-pill" style="background: var(--primary);">ATTIVO</div>
        <div style="display: flex; justify-content: space-around; text-align: center;">
            <div><small>OGGI</small><br><b id="stat-oggi" style="font-size: 22px;">0</b></div>
            <div><small>IN DEPOSITO</small><br><b id="stat-totale" style="font-size: 22px;">0</b></div>
        </div>
        <button onclick="mandaSollecitoTutti()" class="btn-wa">📢 SOLLECITO A TUTTI</button>
    </div>

    <div class="card">
        <h3>📷 Scanner</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="toggleScanner('ocr')" class="btn-dark">📄 Etichetta</button>
            <button onclick="toggleScanner('barcode')" style="background:#5856d6">🔍 Barcode</button>
        </div>
        <div id="videoContainer" class="video-container">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        <button id="btnStopCam" style="display:none; background: var(--gray);" onclick="stopTutto()">Chiudi Camera</button>
    </div>

    <div class="card">
        <h3>📦 Nuovo Pacco</h3>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <input type="text" id="destinatarioNome" placeholder="Nome destinatario...">
        <button onclick="salvaPaccoEInvia()" class="btn-wa">REGISTRA E AVVISA</button>
    </div>

    <div class="card">
        <h3>📋 Giacenze</h3>
        <div id="lista-pacchi"></div>
    </div>

    <div class="card">
        <h3>👥 Rubrica Condomini</h3>
        <input type="file" id="importFile" style="display:none" onchange="handleFileImport(this)">
        <button onclick="document.getElementById('importFile').click()" class="btn-dark">📥 Importa File (.json / .txt)</button>
        
        <textarea id="testoNote" placeholder="Incolla qui: Nome, Telefono" style="height:100px; margin-top:10px;"></textarea>
        <button onclick="importaDaTesto()" class="btn-outline">Carica da Testo</button>
        
        <div id="rubrica-list" style="max-height: 250px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 12px;"></div>
    </div>
    
    <button onclick="fullReset()" style="background:none; color:red; font-size:10px; border:none; margin-bottom:40px;">⚠️ RESET TOTALE</button>
</div>

<script>
/* --- CORE LOGIC --- */
let camStream = null;

const DB = {
    fetch: (key) => JSON.parse(localStorage.getItem(key)) || [],
    save: (key, data) => localStorage.setItem(key, JSON.stringify(data))
};

window.onload = () => updateUI();

/* --- WHATSAPP --- */
function launchWhatsApp(targetName, isRemind = false) {
    const rubrica = DB.fetch('condomini');
    const searchKey = targetName.toLowerCase().trim();
    const user = rubrica.find(u => searchKey.includes(u.nome.toLowerCase().trim()) || u.nome.toLowerCase().trim().includes(searchKey));

    if (user) {
        let phone = user.telefono.replace(/\D/g, '');
        if (phone.length === 10) phone = "39" + phone;
        const msg = isRemind ? `Reminder: hai un pacco da ritirare! 📦` : `Ciao ${user.nome}, c'è un pacco per te in portineria! 📦`;
        window.location.href = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    } else if (!isRemind) alert("Nome non in rubrica.");
}

/* --- RUBRICA & IMPORT (LA PARTE CHE TI SERVE) --- */
function importaDaTesto() {
    const area = document.getElementById('testoNote');
    const righe = area.value.trim().split(/\n/);
    let rubricaAttuale = DB.fetch('condomini');
    let aggiunti = 0;

    righe.forEach(riga => {
        const parti = riga.split(/[,;\t\-]/);
        if (parti.length >= 2) {
            const nome = parti[0].trim();
            const tel = parti[1].trim().replace(/\D/g, '');
            if (nome.length > 2 && tel.length >= 8) {
                rubricaAttuale.push({ nome: nome, telefono: tel });
                aggiunti++;
            }
        }
    });

    if (aggiunti > 0) {
        DB.save('condomini', rubricaAttuale);
        area.value = "";
        updateUI();
        alert("Aggiunti " + aggiunti + " nomi!");
    } else alert("Formato non valido. Usa: Nome, Telefono");
}

function handleFileImport(input) {
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
        const contenuto = e.target.result;
        try {
            const data = JSON.parse(contenuto);
            DB.save('condomini', Array.isArray(data) ? data : (data.condomini || []));
            alert("File caricato!");
        } catch {
            const righe = contenuto.split(/\n/);
            document.getElementById('testoNote').value = contenuto;
            importaDaTesto();
        }
        updateUI();
    };
    reader.readAsText(file);
}

function updateRubricaUI() {
    const container = document.getElementById('rubrica-list');
    const rubrica = DB.fetch('condomini');
    if (rubrica.length === 0) {
        container.innerHTML = "<p style='padding:20px; text-align:center; color:#999;'>Rubrica vuota</p>";
        return;
    }
    container.innerHTML = rubrica.sort((a,b) => a.nome.localeCompare(b.nome)).map((c, i) => `
        <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; background:white;">
            <span><b>${c.nome.toUpperCase()}</b><br><small>${c.telefono}</small></span>
            <button onclick="deleteContact(${i})" style="width:auto; padding:5px 10px; background:#fff0f0; color:red; margin:0; font-size:11px;">X</button>
        </div>
    `).join('');
}

/* --- GESTIONE PACCHI --- */
async function salvaPaccoEInvia() {
    const nome = document.getElementById('destinatarioNome').value.trim();
    if (!nome) return alert("Manca il nome!");
    setLoader(true);
    const photoFile = document.getElementById('cameraInput').files[0];
    let photoBase64 = null;
    if (photoFile) photoBase64 = await processImage(photoFile);

    const pacchi = DB.fetch('pacchi');
    pacchi.unshift({ id: Date.now(), nome: nome, time: new Date().toISOString(), foto: photoBase64 });
    DB.save('pacchi', pacchi);

    document.getElementById('destinatarioNome').value = "";
    document.getElementById('cameraInput').value = "";
    setLoader(false);
    updateUI();
    launchWhatsApp(nome);
}

function ritiraPacco(idx) {
    let p = DB.fetch('pacchi');
    p.splice(idx, 1);
    DB.save('pacchi', p);
    updateUI();
}

function updatePacchiUI() {
    const list = document.getElementById('lista-pacchi');
    const data = DB.fetch('pacchi');
    list.innerHTML = data.map((p, i) => `
        <div class="pacco-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${p.foto || 'https://via.placeholder.com/60?text=📦'}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;">
                    <span><b>${p.nome.toUpperCase()}</b></span>
                </div>
                <button class="btn-ritiro" onclick="ritiraPacco(${i})">RITIRATO</button>
            </div>
        </div>
    `).join('');
}

/* --- UTILS --- */
function updateUI() {
    updatePacchiUI();
    updateRubricaUI();
    const p = DB.fetch('pacchi');
    document.getElementById('stat-totale').innerText = p.length;
    document.getElementById('stat-oggi').innerText = p.filter(x => new Date(x.time).toDateString() === new Date().toDateString()).length;
}

function processImage(file) {
    return new Promise(res => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const cvs = document.createElement('canvas');
                cvs.width = 400; cvs.height = img.height * (400/img.width);
                cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                res(cvs.toDataURL('image/jpeg', 0.6));
            }
        }
    });
}

async function toggleScanner(mode) {
    const v = document.getElementById('webcam');
    document.getElementById('videoContainer').classList.add('active');
    document.getElementById('btnStopCam').style.display = "block";
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    v.srcObject = camStream;
    if(mode === 'ocr') {
        const t = setInterval(async () => {
            if(!camStream) { clearInterval(t); return; }
            const cvs = document.createElement('canvas');
            cvs.width = v.videoWidth; cvs.height = v.videoHeight;
            cvs.getContext('2d').drawImage(v, 0, 0);
            const res = await Tesseract.recognize(cvs, 'ita');
            DB.fetch('condomini').forEach(c => {
                if(res.data.text.toLowerCase().includes(c.nome.toLowerCase())) {
                    document.getElementById('destinatarioNome').value = c.nome;
                    stopTutto();
                }
            });
        }, 2000);
    }
}

function stopTutto() {
    if(camStream) camStream.getTracks().forEach(t => t.stop());
    camStream = null;
    document.getElementById('videoContainer').classList.remove('active');
    document.getElementById('btnStopCam').style.display = "none";
}

function deleteContact(i) { let r = DB.fetch('condomini'); r.splice(i,1); DB.save('condomini', r); updateUI(); }
function setLoader(v) { document.getElementById('loading-overlay').style.display = v ? 'flex' : 'none'; }
function mandaSollecitoTutti() { DB.fetch('pacchi').forEach((p, i) => setTimeout(() => launchWhatsApp(p.nome, true), i*1000)); }
function fullReset() { if(confirm("CANCELLARE TUTTO?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
