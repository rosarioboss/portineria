<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portineria</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{font-family:sans-serif;background:#f2f2f7;margin:0;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
h2{margin:0 0 10px}
input{width:100%;padding:14px;margin:6px 0;font-size:18px;border-radius:10px;border:1px solid #ccc}
button{width:100%;padding:14px;margin-top:6px;border:none;border-radius:10px;color:#fff;font-weight:bold}
.row{display:flex;gap:10px}
.row button{flex:1}
.pacco{background:#007aff}
.rac{background:#5856d6}
.gray{background:#8e8e93}
.del{background:#ff3b30}
.item{padding:10px;border-bottom:1px solid #eee}
.small{font-size:12px;color:#666}
.mode{display:flex;gap:10px;margin-bottom:10px}
.mode button{flex:1;opacity:.5}
.active{opacity:1}

#reader{
position:relative;
width:100%;
margin-top:10px;
}

/* 🔴 MIRINO */
#reader::after{
content:"";
position:absolute;
top:50%;
left:50%;
width:200px;
height:200px;
transform:translate(-50%,-50%);
border:3px solid red;
border-radius:12px;
pointer-events:none;
}
</style>
</head>

<body>

<div class="card">
<h2>⚡ Ricerca</h2>

<div class="mode">
<button id="btnPacco" class="pacco active" onclick="setMode('PACCO')">PACCO</button>
<button id="btnRac" class="rac" onclick="setMode('RACCOMANDATA')">RACCOMANDATA</button>
</div>

<input id="q" placeholder="Scrivi nome..." oninput="cerca()">

<button class="pacco" onclick="startQR()">📷 SCANNER</button>
<button class="gray" onclick="stopQR()">⛔ STOP</button>

<div id="reader"></div>

<div id="res"></div>
</div>

<div class="card">
<h2>✉️ Invio manuale</h2>
<input id="nomeManuale" placeholder="Nome Cognome">
<input id="telManuale" placeholder="Telefono">
<button class="pacco" onclick="inviaManuale()">INVIA</button>
</div>

<div class="card">
<h2 onclick="toggleRubrica()" style="cursor:pointer">
👥 Rubrica (tocca per aprire/chiudere)
</h2>
<input id="nomeNew" placeholder="Nome Cognome">
<input id="telNew" placeholder="Telefono">
<button class="pacco" onclick="aggiungi()">AGGIUNGI</button>

<div class="row">
<button class="gray" onclick="esporta()">📤 Backup</button>
<input type="file" id="fileImport" style="display:none" onchange="importa(event)">
<button class="gray" onclick="document.getElementById('fileImport').click()">📥 Import</button>
</div>

<div id="lista" style="display:none"></div>
</div>

<div class="card">
<h2>📥 Giacenza</h2>
<div id="g"></div>
</div>

<script>

// ===== SCANNER QR =====
let qr

function startQR(){

qr = new Html5Qrcode("reader")

let letto = false

Html5Qrcode.getCameras().then(devices => {

if(devices && devices.length){

let cameraId = devices[0].id

qr.start(
cameraId,
{
fps: 10,
qrbox: { width:200, height:200 }
},
msg => {

if(letto) return

let codice = (msg || "").toUpperCase().trim()

let trovato = rubrica.find(x => {
let nome = (x.nome || "").toUpperCase().trim()
return codice.includes(nome) || nome.includes(codice)
})

if(trovato){

letto = true

// 🔊 BEEP
try{
let audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
audio.play()
}catch(e){}

// 📳 vibrazione
if(navigator.vibrate) navigator.vibrate(200)

stopQR()
invia(trovato.nome, trovato.tel)

}else{
console.log("QR non trovato:", codice)
}

}
)

}else{
alert("Nessuna fotocamera trovata")
}

})

}

function stopQR(){
if(qr){
qr.stop()
}
}

// ===== RESTO IDENTICO =====
let rubrica=JSON.parse(localStorage.getItem("rubrica"))||[
{nome:"ROSSI MARIO",tel:"3331234567"}
]

let giacenza=JSON.parse(localStorage.getItem("giacenza"))||[]
let mode="PACCO"

function norm(t){return(t||"").toUpperCase().trim()}

function setMode(m){
mode=m
btnPacco.classList.toggle("active",m==="PACCO")
btnRac.classList.toggle("active",m==="RACCOMANDATA")
}

function cerca(){
let val=norm(q.value)
if(!val){res.innerHTML="";return}

let parole=val.split(" ")

let trovati=rubrica.filter(x=>{
let nome=norm(x.nome)
return parole.every(p=>nome.includes(p))
})

if(trovati.length===1){
invia(trovati[0].nome,trovati[0].tel)
q.value=""
res.innerHTML=""
return
}

res.innerHTML=trovati.map(x=>
`<div class="item" onclick="invia('${x.nome}','${x.tel}')">${x.nome}</div>`
).join("") || "<div class='small'>Nessun risultato</div>"
}

function invia(nome,tel){
let numero=tel.replace(/\D/g,'')
if(numero.length<8)return alert("Numero non valido")
let pref=numero.startsWith("39")?"":"39"

let msg=mode==="PACCO"
?`Buongiorno ${nome}, è arrivato un pacco in portineria`
:`Buongiorno ${nome}, è arrivata una raccomandata in portineria`

window.location.href=`https://wa.me/${pref}${numero}?text=${encodeURIComponent(msg)}`

giacenza.unshift({nome,tipo:mode,data:new Date().toLocaleDateString('it-IT')})
localStorage.setItem("giacenza",JSON.stringify(giacenza))

render()
}

function inviaManuale(){
let n=nomeManuale.value.trim()
let t=telManuale.value.trim()
if(!n||!t)return alert("Inserisci dati")
invia(n,t)
nomeManuale.value=""
telManuale.value=""
}

function aggiungi(){
let n=nomeNew.value.trim()
let t=telNew.value.trim()
if(!n||!t)return alert("Inserisci dati")
rubrica.push({nome:n.toUpperCase(),tel:t})
localStorage.setItem("rubrica",JSON.stringify(rubrica))
nomeNew.value=""
telNew.value=""
render()
}

function toggleRubrica(){
lista.style.display=lista.style.display==="none"?"block":"none"
}

function esporta(){
let blob=new Blob([JSON.stringify(rubrica,null,2)],{type:"application/json"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="rubrica.json"
a.click()
}

function importa(e){
let file=e.target.files[0]
let reader=new FileReader()
reader.onload=x=>{
try{
rubrica=JSON.parse(x.target.result)
localStorage.setItem("rubrica",JSON.stringify(rubrica))
render()
}catch{alert("File non valido")}
}
reader.readAsText(file)
}

function rimuovi(i){
giacenza.splice(i,1)
localStorage.setItem("giacenza",JSON.stringify(giacenza))
render()
}

function render(){
lista.innerHTML=rubrica.map((x,i)=>
`<div class="item">
<b onclick="invia('${x.nome}','${x.tel}')">${x.nome}</b>
<button class="del" onclick="event.stopPropagation();rimuovi(${i})">ELIMINA</button>
</div>`).join("")

g.innerHTML=giacenza.map((x,i)=>
`<div class="item">
<b>${x.nome}</b><br>
<span class="small">${x.tipo}</span>
<button class="del" onclick="event.stopPropagation();rimuovi(${i})">OK</button>
</div>`).join("")
}

window.onload=render

</script>

</body>
</html>
