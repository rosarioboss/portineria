<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f0;
margin:0;
padding:10px;
}

.dark{
background:#1e1e1e;
color:white;
}

.card{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.dark .card{
background:#2a2a2a;
}

button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

video{
width:100%;
border-radius:10px;
}

.overlay{
position:absolute;
border:3px solid red;
width:60%;
height:25%;
top:40%;
left:20%;
pointer-events:none;
}

.riga{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #eee;
}

.verde{background:#c8f7c5}
.giallo{background:#fff59d}
.rosso{background:#ff8a80}

footer{
text-align:center;
font-size:12px;
color:gray;
margin-top:20px;
}

</style>

</head>

<body>

<div id="login">

<h2>🔐 Portineria Digitale</h2>

<input type="password" id="password">

<button onclick="login()">Accedi</button>

</div>

<div id="app" style="display:none">

<div class="card">

<h3>📷 Scanner</h3>

<button onclick="startScanner()">Apri Scanner</button>

<button onclick="toggleTorch()">🔦 Torcia</button>

<div style="position:relative">

<video id="video" autoplay playsinline style="display:none"></video>

<div class="overlay"></div>

</div>

</div>

<div class="card">

<h3>📦 Pacchi in giacenza</h3>

<div id="pacchi"></div>

</div>

<div class="card">

<h3>📜 Registro</h3>

<div id="registro"></div>

</div>

<div class="card">

<h3>👥 Condomini</h3>

<button onclick="toggleLista()">Mostra / Nascondi</button>

<input id="cerca" placeholder="Cerca..." onkeyup="cerca()">

<div id="lista" style="display:none"></div>

<input id="nome" placeholder="Nome">

<input id="telefono" placeholder="Telefono">

<button onclick="aggiungi()">Aggiungi</button>

</div>

<div class="card">

<button onclick="toggleNight()">🌙 Modalità notte</button>

</div>

<footer>

<hr>
Portineria Digitale<br>
Sviluppata da Rosario Bossis

</footer>

</div>

<script>

let pass="portiere123"

let stream=null

function login(){

if(document.getElementById("password").value===pass){

document.getElementById("login").style.display="none"

document.getElementById("app").style.display="block"

carica()

}else{

alert("Password errata")

}

}

function toggleNight(){

document.body.classList.toggle("dark")

}

function toggleLista(){

let l=document.getElementById("lista")

l.style.display=l.style.display==="none"?"block":"none"

}

function carica(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let lista=document.getElementById("lista")

lista.innerHTML=""

db.forEach(c=>{

lista.innerHTML+=`<div class="riga">${c.nome}</div>`

})

mostraPacchi()

mostraRegistro()

}

function aggiungi(){

let nome=document.getElementById("nome").value

let tel=document.getElementById("telefono").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({nome:nome,tel:tel})

localStorage.setItem("condomini",JSON.stringify(db))

carica()

}

function startScanner(){

let video=document.getElementById("video")

video.style.display="block"

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

.then(s=>{

stream=s

video.srcObject=s

setInterval(scanFrame,2000)

})

}

function scanFrame(){

let video=document.getElementById("video")

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth

canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let img=canvas.toDataURL()

Tesseract.recognize(img,"ita")

.then(r=>{

let text=r.data.text.toLowerCase()

text=text.replace(/0/g,"o").replace(/1/g,"i").replace(/5/g,"s")

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.forEach(c=>{

let nome=c.nome.toLowerCase()

let parti=nome.split(" ")

if(text.includes(nome)||text.includes(parti[0])||text.includes(parti[1])){

beep()

window.open("https://wa.me/"+c.tel+"?text=Buongiorno è arrivato un pacco per lei in portineria")

registraPacco(c.nome)

}

})

})

}

function beep(){

new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()

}

function registraPacco(nome){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome:nome,data:new Date().toISOString()})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

salvaRegistro("Pacco",nome)

mostraPacchi()

}

function mostraPacchi(){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("pacchi")

div.innerHTML=""

pacchi.forEach((p,i)=>{

let giorni=Math.floor((Date.now()-new Date(p.data))/(86400000))

let colore="verde"

if(giorni>3)colore="rosso"

else if(giorni>1)colore="giallo"

div.innerHTML+=`<div class="riga ${colore}">
${p.nome}
<button onclick="ritira(${i})">Ritirato</button>
</div>`

})

}

function ritira(i){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))

pacchi.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()

}

function salvaRegistro(tipo,nome){

let reg=JSON.parse(localStorage.getItem("registro"))||[]

reg.push({

tipo:tipo,

nome:nome,

data:new Date().toLocaleString()

})

localStorage.setItem("registro",JSON.stringify(reg))

mostraRegistro()

}

function mostraRegistro(){

let reg=JSON.parse(localStorage.getItem("registro"))||[]

let div=document.getElementById("registro")

div.innerHTML=""

reg.slice().reverse().forEach(r=>{

div.innerHTML+=`<div class="riga">
${r.tipo} ${r.nome} ${r.data}
</div>`

})

}

function cerca(){

let t=document.getElementById("cerca").value.toLowerCase()

let righe=document.querySelectorAll("#lista .riga")

righe.forEach(r=>{

r.style.display=r.innerText.toLowerCase().includes(t)?"flex":"none"

})

}

</script>

</body>
</html>
