<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
font-size:18px;
background:#f2f2f2;
margin:0;
padding:10px
}

h1{text-align:center}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,.2)
}

button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
background:#27ae60;
color:white;
margin-top:8px
}

input{
width:100%;
padding:12px;
font-size:18px;
margin-top:6px
}

video{
width:100%;
border-radius:10px
}

img{
max-width:100%;
border-radius:10px;
margin-top:5px
}

.alert{color:red}

.semaforo{
font-size:22px;
font-weight:bold
}

</style>

</head>

<body>

<h1>🏢 Portineria Digitale</h1>

<div class="card">
<h3>🚦 Stato pacchi</h3>
<div id="semaforo"></div>
</div>

<div class="card">

<button onclick="startScanner()">📦 Scanner pacco</button>

<button onclick="startBarcode()">📦 Scanner barcode</button>

<button onclick="startScannerRacc()">📬 Scanner raccomandata</button>

<button onclick="avvisaPacchiOggi()">📢 Avvisa pacchi oggi</button>

</div>

<video id="video" autoplay></video>

<div class="card">
<h3>📷 Foto pacco</h3>
<input type="file" id="fotoPacco" accept="image/*">
</div>

<div class="card">
<h3>📦 Inserisci pacco</h3>
<input id="nomePacco">
<button onclick="registraPaccoManuale()">Registra</button>
</div>

<div class="card">
<h3>📦 Pacchi</h3>
<input id="searchPacchi" placeholder="Cerca" oninput="mostraPacchi()">
<div id="pacchi"></div>
</div>

<div class="card">
<h3>📬 Raccomandate</h3>
<input id="nomeRacc">
<button onclick="registraRacc()">Registra</button>
<div id="racc"></div>
</div>

<div class="card">
<h3>👥 Rubrica</h3>

<input id="nomeCondomino">
<input id="telefonoCondomino">

<button onclick="aggiungiCondomino()">Aggiungi</button>

<input id="searchRubrica" placeholder="Cerca" oninput="mostraRubrica()">

<div id="rubrica"></div>

</div>

<div class="card">
<h3>💾 Backup</h3>

<button onclick="esporta()">Esporta dati</button>

<input type="file" onchange="importa(event)">

</div>

<div class="card">
<h3>📊 Statistiche</h3>
<canvas id="grafico"></canvas>
</div>

<script>

let chart=null
let scannerLock=false
let streamCamera=null

function safeParse(k){
try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}
}

function salva(k,v){
localStorage.setItem(k,JSON.stringify(v))
}

function giorni(data){
return Math.floor((Date.now()-new Date(data))/86400000)
}

function aggiornaSemaforo(){

let pacchi=safeParse("pacchi")

let max=0

pacchi.forEach(p=>{
let g=giorni(p.data)
if(g>max)max=g
})

let s=document.getElementById("semaforo")

if(max>7)s.innerHTML="🔴 Pacchi oltre 7 giorni"
else if(max>3)s.innerHTML="🟡 Pacchi da ritirare"
else s.innerHTML="🟢 Situazione regolare"

}

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

function avvisaWhatsApp(nome){

let rubrica=safeParse("condomini")

let c=rubrica.find(x=>x.nome && x.nome.toLowerCase()==nome.toLowerCase())

if(!c)return

let tel=(c.telefono||"").replace(/\D/g,'')

let msg="È arrivato un pacco per "+c.nome+" in portineria."

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg))

}

async function startScanner(){

let video=document.getElementById("video")

streamCamera=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=streamCamera

scanLoop()

}

async function scanLoop(){

let video=document.getElementById("video")

if(!video.videoWidth){
setTimeout(scanLoop,1000)
return
}

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth/2
canvas.height=video.videoHeight/2

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0,canvas.width,canvas.height)

let result=await Tesseract.recognize(canvas,'ita')

let testo=result.data.text.toLowerCase()

let rubrica=safeParse("condomini")

rubrica.forEach(c=>{

let nome=c.nome.toLowerCase()
let parti=nome.split(" ")

if(scannerLock)return

if(testo.includes(parti[0])||(parti[1]&&testo.includes(parti[1]))){

scannerLock=true

beep()

registraPaccoAuto(c.nome)

avvisaWhatsApp(c.nome)

setTimeout(()=>scannerLock=false,4000)

}

})

setTimeout(scanLoop,3000)

}

function startBarcode(){

const reader=new ZXing.BrowserBarcodeReader()

reader.decodeFromVideoDevice(null,'video',(result)=>{

if(result){

document.getElementById("nomePacco").value=result.text

reader.reset()

}

})

}

function startScannerRacc(){
startBarcode()
}

function registraPaccoManuale(){

let nome=document.getElementById("nomePacco").value

if(!nome)return

let pacchi=safeParse("pacchi")

pacchi.unshift({
nome,
data:new Date().toISOString()
})

salva("pacchi",pacchi)

mostraPacchi()
aggiornaSemaforo()

}

function registraPaccoAuto(nome){

let pacchi=safeParse("pacchi")

pacchi.unshift({
nome,
data:new Date().toISOString()
})

salva("pacchi",pacchi)

mostraPacchi()

}

function mostraPacchi(){

let pacchi=safeParse("pacchi")

let div=document.getElementById("pacchi")

let filtro=document.getElementById("searchPacchi").value.toLowerCase()

div.innerHTML=""

pacchi.forEach((p,i)=>{

if(!p.nome.toLowerCase().includes(filtro))return

div.innerHTML+=`
<div>
<b>${p.nome}</b>
<button onclick="consegna(${i})">Consegnato</button>
</div>
`

})

grafico()

}

function consegna(i){

let pacchi=safeParse("pacchi")

let storico=safeParse("storico")

storico.unshift(pacchi[i])

pacchi.splice(i,1)

salva("pacchi",pacchi)
salva("storico",storico)

mostraPacchi()

}

function registraRacc(){

let nome=document.getElementById("nomeRacc").value

let r=safeParse("raccomandate")

r.unshift({
nome,
data:new Date().toISOString()
})

salva("raccomandate",r)

mostraRacc()

}

function mostraRacc(){

let r=safeParse("raccomandate")

let div=document.getElementById("racc")

div.innerHTML=""

r.forEach((p,i)=>{

div.innerHTML+=`
<div>
${p.nome}
<button onclick="r.splice(${i},1);salva('raccomandate',r);mostraRacc()">Consegnata</button>
</div>
`

})

}

function aggiungiCondomino(){

let nome=document.getElementById("nomeCondomino").value
let tel=document.getElementById("telefonoCondomino").value

let db=safeParse("condomini")

db.push({nome,telefono:tel})

salva("condomini",db)

mostraRubrica()

}

function mostraRubrica(){

let db=safeParse("condomini")

let filtro=document.getElementById("searchRubrica").value.toLowerCase()

let div=document.getElementById("rubrica")

div.innerHTML=""

db.forEach((c,i)=>{

if(!c.nome.toLowerCase().includes(filtro))return

div.innerHTML+=`
<div>
${c.nome}
<button onclick="db.splice(${i},1);salva('condomini',db);mostraRubrica()">❌</button>
</div>
`

})

}

function avvisaPacchiOggi(){

let pacchi=safeParse("pacchi")

pacchi.forEach(p=>{
alert("Pacco per "+p.nome)
})

}

function esporta(){

let data=JSON.stringify(localStorage)

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_portineria.json"

a.click()

}

function importa(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

for(let k in data){
localStorage.setItem(k,data[k])
}

location.reload()

}

reader.readAsText(file)

}

function grafico(){

let storico=safeParse("storico")

let mesi=new Array(12).fill(0)

storico.forEach(s=>{
let d=new Date(s.data)
mesi[d.getMonth()]++
})

if(chart)chart.destroy()

chart=new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels:["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"],
datasets:[{
label:"Pacchi consegnati",
data:mesi
}]
}
})

}

mostraPacchi()
mostraRubrica()
aggiornaSemaforo()

</script>

</body>
</html>
