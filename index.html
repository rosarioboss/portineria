<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Portineria</title>

<style>
body{font-family:sans-serif;padding:15px;background:#f2f2f7}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,button{width:100%;padding:12px;margin-top:5px}
button{background:#007aff;color:#fff;border:none;border-radius:6px}
.del{background:#ff3b30}
.item{border-bottom:1px solid #ddd;padding:8px}
</style>

</head>

<body>

<div class="card">
<h3>📦 Cerca (Scanner)</h3>
<input id="q" placeholder="Nome o cognome" oninput="cerca()">
<div id="res"></div>
</div>

<div id="manuale" class="card" style="display:none">
<h3>Non trovato</h3>
<input id="nomeM" placeholder="Nome Cognome">
<input id="telM" placeholder="Telefono">
<button onclick="invioManuale('PACCO')">PACCO</button>
<button onclick="invioManuale('RACCOMANDATA')">RACCOMANDATA</button>
</div>

<div class="card">
<h3>📂 Importa rubrica</h3>
<input type="file" onchange="importa(event)">
</div>

<div class="card">
<h3>👥 Condomini</h3>
<div id="lista"></div>
</div>

<div class="card">
<h3>📥 Giacenza</h3>
<div id="g"></div>
</div>

<script>
let rubrica=[]
let giacenza=[]

// NORMALIZZA
function norm(t){
return (t||"").toUpperCase().trim()
}

// CERCA AUTOMATICA
function cerca(){
let val=norm(q.value)

if(!val){
res.innerHTML=""
manuale.style.display="none"
return
}

let trovato=rubrica.find(x=>norm(x.nome).includes(val))

if(trovato){
invia(trovato.nome,trovato.tel,"PACCO")
q.value=""
res.innerHTML=""
manuale.style.display="none"
}else{
res.innerHTML="Non trovato"
manuale.style.display="block"
}
}

// INVIO WHATSAPP
function invia(nome,tel,tipo){
let numero=(tel||"").replace(/\D/g,'')
let pref=numero.startsWith("39")?"":"39"

let msg=`Buongiorno ${nome}, è arrivato un ${tipo} in portineria`
window.open(`https://wa.me/${pref}${numero}?text=${encodeURIComponent(msg)}`)

// SALVA GIACENZA
giacenza.unshift({
nome,
tipo,
data:new Date().toLocaleDateString('it-IT')
})

render()
}

// MANUALE
function invioManuale(tipo){
let n=nomeM.value.trim()
let t=telM.value.trim()

if(!n||!t){
alert("Inserisci nome e telefono")
return
}

invia(n,t,tipo)

nomeM.value=""
telM.value=""
manuale.style.display="none"
}

// RENDER
function render(){
lista.innerHTML=rubrica.map(x=>`
<div class="item">${x.nome}</div>
`).join("")||"Vuota"

g.innerHTML=giacenza.map((x,i)=>`
<div class="item">
<b>${x.nome}</b> - ${x.tipo} (${x.data})
<button class="del" onclick="rimuovi(${i})">CONSEGNATO</button>
</div>
`).join("")||"Nessun pacco"
}

// RIMUOVI
function rimuovi(i){
giacenza.splice(i,1)
render()
}

// IMPORT RUBRICA
function importa(e){
let file=e.target.files[0]
if(!file)return

let reader=new FileReader()

reader.onload=function(ev){
try{
let data=JSON.parse(ev.target.result)

if(!Array.isArray(data)) throw "errore"

rubrica=data
render()

alert("Rubrica caricata")
}catch{
alert("File non valido")
}
}

reader.readAsText(file)
}
</script>

</body>
</html>
