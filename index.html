<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f7;
padding:15px
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
font-weight:bold
}

.btn-red{background:#ff3b30}
.btn-green{background:#34c759}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd
}

.item{
padding:10px;
border-bottom:1px solid #eee
}

#cameraBox{
display:none;
position:relative
}

#scanBox{
position:absolute;
border:3px solid #00ff88;
width:60%;
height:35%;
top:32%;
left:20%;
border-radius:10px;
pointer-events:none
}

</style>

</head>

<body>

<h2>Portineria Digitale</h2>

<div class="card">

<button onclick="startCamera()">📷 Scanner pacco</button>

<div id="cameraBox">

<video id="video" autoplay playsinline muted style="width:100%"></video>

<div id="scanBox"></div>

<button class="btn-red" onclick="stopCamera()">Chiudi scanner</button>

</div>

<input id="nomePacco" placeholder="Destinatario">

<button class="btn-green" onclick="salvaPacco()">Registra pacco</button>

</div>

<div class="card">

<h3>Pacchi registrati</h3>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h3>Rubrica condomini</h3>

<input id="nomeManuale" placeholder="Nome Cognome">

<input id="telManuale" placeholder="Telefono">

<button onclick="aggiungiCondomino()">Aggiungi condomino</button>

<textarea id="fileRubrica" placeholder="MARIO ROSSI,333123456"></textarea>

<button onclick="importaRubrica()">Importa lista</button>

<button onclick="backupRubrica()">Backup rubrica</button>

<input type="file" onchange="ripristinaRubrica(event)">

<div id="listaRubrica"></div>

</div>

<script>

const DB={
get:k=>JSON.parse(localStorage.getItem(k))||[],
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

let stream=null

window.onload=render

function render(){
renderPacchi()
renderRubrica()
}

function beep(){

let audio=new Audio(
"data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="
)

audio.play()

}

function salvaPacco(){

let nome=document.getElementById("nomePacco").value.trim().toUpperCase()

if(!nome)return

let pacchi=DB.get("pacchi")

pacchi.unshift({
id:Date.now(),
nome
})

DB.set("pacchi",pacchi)

document.getElementById("nomePacco").value=""

render()

inviaWhatsApp(nome)

}

function renderPacchi(){

let pacchi=DB.get("pacchi")

let div=document.getElementById("listaPacchi")

div.innerHTML=pacchi.length?

pacchi.map(p=>`
<div class="item">${p.nome}</div>
`).join("")

:"Nessun pacco"

}

function aggiungiCondomino(){

let nome=document.getElementById("nomeManuale").value.trim().toUpperCase()
let tel=document.getElementById("telManuale").value.trim().replace(/\D/g,'')

if(!nome)return

let rubrica=DB.get("rubrica")

if(!rubrica.some(x=>x.nome===nome)){
rubrica.push({nome,tel})
}

DB.set("rubrica",rubrica)

document.getElementById("nomeManuale").value=""
document.getElementById("telManuale").value=""

renderRubrica()

}

function importaRubrica(){

let testo=document.getElementById("fileRubrica").value.trim()

if(!testo)return

let rubrica=DB.get("rubrica")

testo.split("\n").forEach(r=>{

let p=r.split(",")

if(p[0] && p[0].trim()!=""){

let nome=p[0].trim().toUpperCase()
let tel=p[1]?p[1].replace(/\D/g,''):""

if(!rubrica.some(x=>x.nome===nome)){
rubrica.push({nome,tel})
}

}

})

DB.set("rubrica",rubrica)

renderRubrica()

}

function renderRubrica(){

let rubrica=DB.get("rubrica")

let div=document.getElementById("listaRubrica")

div.innerHTML=rubrica.length?

rubrica.map(r=>`
<div class="item">${r.nome} (${r.tel||""})</div>
`).join("")

:"Rubrica vuota"

}

function backupRubrica(){

let rubrica=DB.get("rubrica")

if(!rubrica.length){
alert("Rubrica vuota")
return
}

let blob=new Blob(
[JSON.stringify(rubrica,null,2)],
{type:"application/json"}
)

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="rubrica_condomini.json"

a.click()

}

function ripristinaRubrica(event){

let file=event.target.files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(e){

let dati=JSON.parse(e.target.result)

DB.set("rubrica",dati)

renderRubrica()

}

reader.readAsText(file)

}

function inviaWhatsApp(nome){

let rubrica=DB.get("rubrica")

let nomeMaiuscolo=nome.toUpperCase()

let trovato=rubrica.find(r=>{

let cognome=r.nome.split(" ").pop()

return nomeMaiuscolo.includes(cognome)

})

if(!trovato || !trovato.tel){
alert("Numero non trovato in rubrica")
return
}

let tel=trovato.tel.startsWith("39")?trovato.tel:"39"+trovato.tel

let msg="Ciao "+trovato.nome+", è arrivato un pacco per te 📦"

window.open(
"https://wa.me/"+tel+
"?text="+encodeURIComponent(msg),
"_blank"
)

}

async function startCamera(){

document.getElementById("cameraBox").style.display="block"

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

const video=document.getElementById("video")

video.srcObject=stream

video.onloadedmetadata=()=>{
scan()
}

}

async function scan(){

if(!stream)return

const video=document.getElementById("video")

if(video.videoWidth===0){
setTimeout(scan,1000)
return
}

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(
video,
video.videoWidth*0.2,
video.videoHeight*0.3,
video.videoWidth*0.6,
video.videoHeight*0.4,
0,
0,
canvas.width,
canvas.height
)

const img=canvas.toDataURL("image/png")

const result=await Tesseract.recognize(img,"ita")

const text=result.data.text.toUpperCase()

const rubrica=DB.get("rubrica")

for(let u of rubrica){

let cognome=u.nome.split(" ").pop()

if(text.includes(cognome)){

beep()

document.getElementById("nomePacco").value=u.nome

inviaWhatsApp(u.nome)

stopCamera()

break

}

}

if(stream){
setTimeout(()=>scan(),2000)
}

}

function stopCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
stream=null
}

document.getElementById("cameraBox").style.display="none"

}

</script>

</body>
</html>
