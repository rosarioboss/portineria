<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f7;
padding:15px
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
font-weight:bold
}

.btn-red{background:#ff3b30}
.btn-green{background:#34c759}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd
}

.item{
padding:10px;
border-bottom:1px solid #eee
}

#cameraBox{
display:none;
position:relative
}

#scanBox{
position:absolute;
border:3px solid #00ff88;
width:60%;
height:35%;
top:32%;
left:20%;
border-radius:10px;
pointer-events:none
}

</style>

</head>

<body>

<h2>Portineria Digitale</h2>

<div class="card">

<button onclick="startCamera()">📷 Scanner</button>

<div id="cameraBox">

<video id="video" autoplay playsinline muted style="width:100%"></video>

<div id="scanBox"></div>

<button class="btn-red" onclick="stopCamera()">Chiudi scanner</button>

</div>

<input id="nomePacco" placeholder="Destinatario">

<button class="btn-green" onclick="salvaPacco()">Registra pacco</button>

<button onclick="inviaWhatsApp()">Avvisa con WhatsApp</button>

</div>

<div class="card">

<h3>Pacchi</h3>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h3>Rubrica</h3>

<input id="nomeManuale" placeholder="Nome Cognome">

<input id="telManuale" placeholder="Telefono">

<button onclick="aggiungiCondomino()">Aggiungi</button>

<textarea id="fileRubrica" placeholder="MARIO ROSSI,333123456"></textarea>

<button onclick="importaRubrica()">Importa lista</button>

<button onclick="backupRubrica()">Backup rubrica</button>

<input type="file" onchange="ripristinaRubrica(event)">

<div id="listaRubrica"></div>

</div>

<script>

const DB={
get:k=>JSON.parse(localStorage.getItem(k))||[],
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

let stream=null
let scannerTimer=null

window.onload=render

function render(){
renderPacchi()
renderRubrica()
}

function beep(){
let audio=new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=")
audio.play()
}

function salvaPacco(){

let nome=document.getElementById("nomePacco").value.trim().toUpperCase()

if(!nome)return

let pacchi=DB.get("pacchi")

pacchi.unshift({
id:Date.now(),
nome
})

DB.set("pacchi",pacchi)

render()

}

function renderPacchi(){

let pacchi=DB.get("pacchi")

let div=document.getElementById("listaPacchi")

div.innerHTML=pacchi.length?

pacchi.map(p=>`
<div class="item">${p.nome}</div>
`).join("")

:"Nessun pacco"

}

function aggiungiCondomino(){

let nome=document.getElementById("nomeManuale").value.trim().toUpperCase()
let tel=document.getElementById("telManuale").value.trim()

if(!nome)return

let rubrica=DB.get("rubrica")

if(!rubrica.some(x=>x.nome===nome)){
rubrica.push({nome,tel})
}

DB.set("rubrica",rubrica)

renderRubrica()

}

function importaRubrica(){

let testo=document.getElementById("fileRubrica").value.trim()

if(!testo)return

let rubrica=DB.get("rubrica")

testo.split("\n").forEach(r=>{

let p=r.split(",")

if(p[0]){

let nome=p[0].trim().toUpperCase()
let tel=p[1]?p[1].trim():""

if(!rubrica.some(x=>x.nome===nome)){
rubrica.push({nome,tel})
}

}

})

DB.set("rubrica",rubrica)

renderRubrica()

}

function renderRubrica(){

let rubrica=DB.get("rubrica")

let div=document.getElementById("listaRubrica")

div.innerHTML=rubrica.length?

rubrica.map(r=>`
<div class="item">${r.nome} (${r.tel})</div>
`).join("")

:"Rubrica vuota"

}

function backupRubrica(){

let rubrica=DB.get("rubrica")

let blob=new Blob([JSON.stringify(rubrica)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="rubrica.json"

a.click()

}

function ripristinaRubrica(event){

let file=event.target.files[0]

let reader=new FileReader()

reader.onload=function(e){

let dati=JSON.parse(e.target.result)

DB.set("rubrica",dati)

renderRubrica()

}

reader.readAsText(file)

}

function inviaWhatsApp(){

let nome=document.getElementById("nomePacco").value.trim().toUpperCase()

let rubrica=DB.get("rubrica")

let trovato=rubrica.find(r=>r.nome===nome)

if(!trovato){
alert("Destinatario non trovato")
return
}

let tel=trovato.tel.startsWith("39")?trovato.tel:"39"+trovato.tel

let msg="Ciao "+trovato.nome+", è arrivato un pacco per te 📦"

window.location.href=
"https://wa.me/"+tel+
"?text="+encodeURIComponent(msg)

}

async function startCamera(){

const box=document.getElementById("cameraBox")
const video=document.getElementById("video")

box.style.display="block"

try{

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=stream

video.onloadedmetadata=function(){

video.play()

scannerTimer=setInterval(scan,3000)

}

}catch(e){

alert("Errore apertura camera")

}

}

async function scan(){

if(!stream)return

const video=document.getElementById("video")

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(
video,
video.videoWidth*0.2,
video.videoHeight*0.3,
video.videoWidth*0.6,
video.videoHeight*0.4,
0,
0,
canvas.width,
canvas.height
)

const img=canvas.toDataURL("image/png")

const result=await Tesseract.recognize(img,"ita")

const text=result.data.text.toUpperCase()

let righe=text.split("\n")

let nome=righe.find(r=>r.length>5)

if(nome){

document.getElementById("nomePacco").value=nome

beep()

}

}

function stopCamera(){

if(scannerTimer){
clearInterval(scannerTimer)
}

if(stream){
stream.getTracks().forEach(t=>t.stop())
stream=null
}

document.getElementById("cameraBox").style.display="none"

}

</script>

</body>
</html>
