<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Portineria Pro</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; font-size: 18px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; margin-bottom: 10px; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; text-align: center; }
        .btn-scan { background: #ff9500; }
        .btn-pacco { background: #007aff; }
        .btn-rac { background: #5856d6; }
        .btn-red { background: #ff3b30; width: auto; padding: 8px 12px; font-size: 12px; }
        .item { background: white; padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #video { width: 100%; border-radius: 12px; display: none; margin-bottom: 10px; background: #000; }
        .suggerimento { padding: 15px; border-bottom: 1px solid #eee; background: #fff; font-weight: bold; color: #007aff; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>➕ Arrivo Pacco / Raccomandata</h2>
    <video id="video"></video>
    <button class="btn btn-scan" onclick="avviaScanner()">📷 SCANSIONA CODICE</button>
    
    <input id="nomeInput" placeholder="Cerca Cognome..." oninput="cerca()">
    <div id="suggerimenti"></div>

    <div id="comandi" class="hidden">
        <button class="btn btn-pacco" onclick="salvaEAvvisa('PACCO')">AVVISA PER PACCO ➔</button>
        <button class="btn btn-rac" onclick="salvaEAvvisa('RACCOMANDATA')">AVVISA PER RACCOMANDATA ➔</button>
    </div>
</div>

<div class="card">
    <h2>📥 Giacenza</h2>
    <div id="listaGiacenza"></div>
</div>

<button onclick="document.getElementById('admin').classList.toggle('hidden')" style="width:100%; background:none; border:none; color:gray; padding:10px;">⚙️ Gestisci Rubrica</button>

<div id="admin" class="card hidden">
    <input id="rNome" placeholder="Nome Cognome">
    <input id="rTel" placeholder="3331234567">
    <button class="btn btn-pacco" onclick="salvaRubrica()">SALVA IN RUBRICA</button>
</div>

<script>
const DB = {
    get: k => JSON.parse(localStorage.getItem(k)) || [],
    set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

const codeReader = new ZXing.BrowserMultiFormatReader();
let corrente = null;

function avviaScanner() {
    const v = document.getElementById('video');
    v.style.display = 'block';
    codeReader.decodeFromVideoDevice(null, 'video', (result) => {
        if (result) {
            codeReader.reset();
            v.style.display = 'none';
            alert("Codice: " + result.text);
        }
    });
}

function cerca() {
    let q = document.getElementById("nomeInput").value.toUpperCase();
    let box = document.getElementById("suggerimenti");
    if (q.length < 1) { box.innerHTML = ""; return; }
    let trovati = DB.get("rubrica").filter(u => u.nome.includes(q));
    box.innerHTML = trovati.map(u => `<div class="suggerimento" onclick="seleziona('${u.nome}', '${u.tel}')">${u.nome}</div>`).join("");
}

function seleziona(nome, tel) {
    corrente = { nome, tel };
    document.getElementById("nomeInput").value = nome;
    document.getElementById("suggerimenti").innerHTML = "";
    document.getElementById("comandi").classList.remove("hidden");
}

function salvaEAvvisa(tipo) {
    if (!corrente) return;
    let g = DB.get("giacenza");
    g.unshift({ nome: corrente.nome, tipo: tipo, data: new Date().toLocaleDateString('it-IT') });
    DB.set("giacenza", g);

    let pref = corrente.tel.startsWith("39") ? "" : "39";
    let msg = `Buongiorno ${corrente.nome}, c'è un ${tipo} per te in portineria.`;
    
    document.getElementById("comandi").classList.add("hidden");
    document.getElementById("nomeInput").value = "";
    render();
    
    window.location.href = `https://wa.me/${pref}${corrente.tel}?text=${encodeURIComponent(msg)}`;
}

function render() {
    let g = DB.get("giacenza");
    document.getElementById("listaGiacenza").innerHTML = g.map((x, i) => `
        <div class="item">
            <div><b>${x.nome}</b><br><small>${x.tipo} - ${x.data}</small></div>
            <button class="btn btn-red" onclick="ritira(${i})">OK</button>
        </div>
    `).join("") || "Vuoto";
}

function ritira(i) {
    let g = DB.get("giacenza");
    g.splice(i, 1);
    DB.set("giacenza", g);
    render();
}

function salvaRubrica() {
    let n = document.getElementById("rNome").value.toUpperCase().trim();
    let t = document.getElementById("rTel").value.trim();
    let r = DB.get("rubrica");
    r.push({ nome: n, tel: t });
    DB.set("rubrica", r);
    alert("Salvato!");
}

window.onload = render;
</script>
</body>
</html>
