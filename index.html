<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portineria Digitale PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
padding:10px
}

.dark{
background:#1e1e1e;
color:white
}

.card{
background:white;
padding:14px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,.15)
}

.dark .card{
background:#2a2a2a
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-weight:bold;
margin-top:6px
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:6px
}

video{
width:100%;
border-radius:8px
}

.riga{
padding:6px;
border-bottom:1px solid #eee
}

canvas{
border:1px solid #ccc;
width:100%;
height:160px
}

.counter{
font-weight:bold;
color:#555
}

</style>

</head>

<body>

<div class="card">

<h3>📷 Scanner etichetta</h3>

<button onclick="startScanner()">Avvia scanner</button>

<video id="video" autoplay></video>

<div id="risultato"></div>

</div>

<div class="card">

<h3>📦 Pacchi</h3>

<input id="searchPacchi" placeholder="Cerca pacco" oninput="mostraPacchi()">

<input id="nomePacco" placeholder="Nome condomino">

<input id="corriere" placeholder="Corriere">

<button onclick="registraPacco()">Registra pacco</button>

<div id="pacchi"></div>

</div>

<div class="card">

<h3>📬 Raccomandate</h3>

<input id="nomeRacc" placeholder="Nome">

<input id="numeroRacc" placeholder="Numero raccomandata">

<button onclick="registraRacc()">Registra</button>

<div id="racc"></div>

</div>

<div class="card">

<h3>👥 Rubrica condomini</h3>

<button onclick="sbloccaRubrica()">🔒 Sblocca rubrica</button>

<div id="rubrica" style="display:none">

<input id="nome" placeholder="Nome Cognome">

<input id="telefono" placeholder="Telefono">

<input id="scala" placeholder="Scala">

<input id="interno" placeholder="Interno">

<button onclick="aggiungiCondomino()">Aggiungi</button>

<div id="condomini"></div>

</div>

</div>

<div class="card">

<h3>✍ Firma ritiro</h3>

<canvas id="firma"></canvas>

<button onclick="pulisciFirma()">Pulisci firma</button>

</div>

<div class="card">

<h3>📁 Backup dati</h3>

<button onclick="backup()">Esporta backup</button>

<input type="file" onchange="restore(event)">

</div>

<div class="card">

<button onclick="toggleNight()">🌙 Modalità notte</button>

</div>

<script>

let scanning=false

function beep(){
let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
audio.play()
}

async function startScanner(){

let video=document.getElementById("video")

let stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=stream

scanning=true

scanFrame()

}

async function scanFrame(){

if(!scanning) return

let video=document.getElementById("video")

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let result=await Tesseract.recognize(canvas,'ita')

let testo=result.data.text.toLowerCase()

trovaDestinatario(testo)

setTimeout(scanFrame,2000)

}

function trovaDestinatario(testo){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

for(let c of db){

let nome=c.nome.toLowerCase()
let cognome=nome.split(" ")[1]||""

if(testo.includes(cognome)){

beep()

scanning=false

document.getElementById("risultato").innerHTML=

"Possibile destinatario:<br><b>"+c.nome+"</b><br><br>"+

"<button onclick='mandaPacco(\""+c.telefono+"\",\""+c.nome+"\")'>📦 Pacco</button>"+

"<button onclick='mandaRacc(\""+c.telefono+"\",\""+c.nome+"\")'>📬 Raccomandata</button>"

return

}

}

}

function mandaPacco(tel,nome){

let msg="Salve è arrivato un pacco per "+nome

window.open(
"https://wa.me/"+tel+"?text="+encodeURIComponent(msg)
)

}

function mandaRacc(tel,nome){

let msg="Salve è arrivata una raccomandata per "+nome

window.open(
"https://wa.me/"+tel+"?text="+encodeURIComponent(msg)
)

}

function registraPacco(){

let nome=document.getElementById("nomePacco").value
let corriere=document.getElementById("corriere").value

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome,corriere})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()

}

function mostraPacchi(){

let filtro=document.getElementById("searchPacchi").value.toLowerCase()

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("pacchi")

div.innerHTML=""

pacchi.forEach(p=>{

if(!p.nome.toLowerCase().includes(filtro)) return

let count=pacchi.filter(x=>x.nome===p.nome).length

div.innerHTML+=
"<div class='riga'>"+p.nome+" - "+p.corriere+
" <span class='counter'>("+count+" pacchi)</span></div>"

})

}

function registraRacc(){

let nome=document.getElementById("nomeRacc").value
let numero=document.getElementById("numeroRacc").value

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]

racc.push({nome,numero})

localStorage.setItem("raccomandate",JSON.stringify(racc))

mostraRacc()

}

function mostraRacc(){

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]

let div=document.getElementById("racc")

div.innerHTML=""

racc.forEach(r=>{
div.innerHTML+=r.nome+" - "+r.numero+"<br>"
})

}

function aggiungiCondomino(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({
nome:document.getElementById("nome").value,
telefono:document.getElementById("telefono").value,
scala:document.getElementById("scala").value,
interno:document.getElementById("interno").value
})

localStorage.setItem("condomini",JSON.stringify(db))

caricaCondomini()

}

function caricaCondomini(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let div=document.getElementById("condomini")

div.innerHTML=""

db.forEach(c=>{
div.innerHTML+=c.nome+" - scala "+c.scala+" interno "+c.interno+"<br>"
})

}

function sbloccaRubrica(){

let pin=prompt("PIN")

if(pin=="1234"){
document.getElementById("rubrica").style.display="block"
caricaCondomini()
}

}

function backup(){

let data={
condomini:localStorage.getItem("condomini"),
pacchi:localStorage.getItem("pacchi"),
raccomandate:localStorage.getItem("raccomandate")
}

let blob=new Blob([JSON.stringify(data)])

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="backup_portineria.json"
a.click()

}

function restore(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

for(let k in data){
localStorage.setItem(k,data[k])
}

mostraPacchi()
mostraRacc()
caricaCondomini()

}

reader.readAsText(file)

}

function toggleNight(){
document.body.classList.toggle("dark")
}

/* FIRMA */

let canvas=document.getElementById("firma")
let ctx=canvas.getContext("2d")
let draw=false

canvas.addEventListener("mousedown",()=>draw=true)
canvas.addEventListener("mouseup",()=>draw=false)
canvas.addEventListener("mousemove",drawFirma)

canvas.addEventListener("touchstart",()=>draw=true)
canvas.addEventListener("touchend",()=>draw=false)
canvas.addEventListener("touchmove",drawFirmaTouch)

function drawFirma(e){

if(!draw) return

ctx.lineWidth=2
ctx.lineCap="round"

ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)

}

function drawFirmaTouch(e){

if(!draw) return

let rect=canvas.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left
let y=e.touches[0].clientY-rect.top

ctx.lineTo(x,y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y)

}

function pulisciFirma(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}

mostraPacchi()
mostraRacc()

</script>

</body>
</html>
