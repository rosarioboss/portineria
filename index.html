<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#075e54;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:5px;
}

.btn-add{background:#3498db;color:white;}
.btn-wa{background:#25d366;color:white;}
.btn-mass{background:#e67e22;color:white;}
.btn-rac{background:#9b59b6;color:white;}

.riga{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
border-bottom:1px solid #eee;
}

.verde{background:#b9f6ca}
.giallo{background:#fff59d}
.rosso{background:#ff8a80}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>📦 Nuovo pacco</h2>

<select id="rubrica"></select>

<button class="btn-wa" onclick="inviaPacco()">Avviso pacco</button>

<button class="btn-rac" onclick="inviaRac()">Raccomandata</button>

<button class="btn-add" onclick="scansionaEtichetta()">📷 Scansiona etichetta</button>

<video id="camera" autoplay playsinline style="width:100%;display:none;"></video>

<button id="scattaBtn" onclick="catturaFoto()" style="display:none;">
📸 Scatta foto etichetta
</button>

<canvas id="canvas" style="display:none;"></canvas>

</div>

<div class="card">

<h2>📦 Pacchi in giacenza</h2>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h2>📢 Avviso a tutti</h2>

<textarea id="msg"></textarea>

<div id="invioMassivo"></div>

</div>

<div class="card">

<h2>🏢 Avviso per scala</h2>

<select id="scalaAvviso">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<textarea id="msgScala"></textarea>

<button class="btn-mass" onclick="avvisoScala()">Invia</button>

</div>

<div class="card">

<h2>👥 Gestione condomini</h2>

<input id="cerca" placeholder="Cerca condomino..." onkeyup="cercaCondomino()">

<div id="risultatiRicerca"></div>

<button onclick="toggleCondomini()">Mostra / Nascondi condomini</button>

<div id="lista" style="display:none;"></div>

<h3>Aggiungi condomino</h3>

<input id="nome" placeholder="Nome">
<input id="telefono" placeholder="Telefono">

<select id="scala">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<button onclick="aggiungi()">Salva condomino</button>

<h3>Importa rubrica</h3>

<input type="file" onchange="importaFile(event)">

<button onclick="backup()">Scarica backup</button>

</div>

</div>

<script>

function carica(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let rubrica=document.getElementById("rubrica")
let lista=document.getElementById("lista")
let mass=document.getElementById("invioMassivo")

rubrica.innerHTML=""
lista.innerHTML=""
mass.innerHTML=""

db.forEach(c=>{

rubrica.innerHTML+=`<option value="${c.tel}">${c.nome}</option>`

lista.innerHTML+=`
<div class="riga">
${c.nome} (${c.scala})
</div>
`

mass.innerHTML+=`
<div class="riga">
${c.nome}
<button onclick="inviaMassivo('${c.tel}')">Invia</button>
</div>
`

})

mostraPacchi()

}

function aggiungi(){

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value
let scala=document.getElementById("scala").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({nome:nome,tel:tel,scala:scala})

localStorage.setItem("condomini",JSON.stringify(db))

carica()

}

function importaFile(event){

let file=event.target.files[0]

let reader=new FileReader()

reader.onload=function(e){

let dati=JSON.parse(e.target.result)

localStorage.setItem("condomini",JSON.stringify(dati.condomini))

alert("Rubrica importata")

carica()

}

reader.readAsText(file)

}

function toggleCondomini(){

let lista=document.getElementById("lista")

lista.style.display=(lista.style.display==="none")?"block":"none"

}

function cercaCondomino(){

let testo=document.getElementById("cerca").value.toLowerCase()

let righe=document.querySelectorAll("#lista .riga")

righe.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(testo)?"flex":"none"
})

}

function inviaPacco(){

let sel=document.getElementById("rubrica")

let tel=sel.value

let nome=sel.options[sel.selectedIndex].text

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome:nome,data:new Date().toISOString()})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent("È arrivato un pacco per "+nome))

}

function inviaRac(){

let sel=document.getElementById("rubrica")

let tel=sel.value

let nome=sel.options[sel.selectedIndex].text

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent("È arrivata una raccomandata per "+nome))

}

function mostraPacchi(){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("listaPacchi")

div.innerHTML=""

lista.forEach((p,i)=>{

let giorni=Math.floor((Date.now()-new Date(p.data))/(1000*60*60*24))

let r=document.createElement("div")

r.className="riga"

r.innerHTML=p.nome+" <button onclick='ritirato("+i+")'>Ritirato</button>"

if(giorni==0)r.classList.add("verde")
else if(giorni<=3)r.classList.add("giallo")
else r.classList.add("rosso")

div.appendChild(r)

})

}

function ritirato(i){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

lista.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(lista))

mostraPacchi()

}

function inviaMassivo(tel){

let msg=document.getElementById("msg").value

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg))

}

function avvisoScala(){

let scala=document.getElementById("scalaAvviso").value
let msg=document.getElementById("msgScala").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.forEach(c=>{
if(c.scala===scala){
window.open("https://wa.me/"+c.tel+"?text="+encodeURIComponent(msg))
}
})

}

async function scansionaEtichetta(){

let video=document.getElementById("camera")
let btn=document.getElementById("scattaBtn")

video.style.display="block"
btn.style.display="block"

let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

video.srcObject=stream

}

function catturaFoto(){

let video=document.getElementById("camera")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

video.srcObject.getTracks().forEach(t=>t.stop())

video.style.display="none"
document.getElementById("scattaBtn").style.display="none"

let img=canvas.toDataURL()

leggiTesto(img)

}

async function leggiTesto(img){

let r=await Tesseract.recognize(img,"ita")

trovaCondomino(r.data.text)

}

function trovaCondomino(testo){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

testo=testo.toLowerCase()

let trovato=null

db.forEach(c=>{

let nome=c.nome.toLowerCase()

if(testo.includes(nome)||testo.includes(nome.split(" ")[0])){

trovato=c

}

})

if(trovato){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

audio.play()

window.open("https://wa.me/"+trovato.tel+"?text="+encodeURIComponent("È arrivato un pacco per "+trovato.nome))

}else{

alert("Condomino non trovato")

}

}

window.onload=carica

</script>

</body>
</html>
