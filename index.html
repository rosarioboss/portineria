<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f0f0f0;
margin:0;
padding:10px;
}

.dark{
background:#1e1e1e;
color:white;
}

.card{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
}

.dark .card{
background:#2a2a2a;
}

button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

video{
width:100%;
border-radius:10px;
}

.overlay{
position:absolute;
border:3px solid red;
width:60%;
height:25%;
top:40%;
left:20%;
}

footer{
text-align:center;
font-size:12px;
color:gray;
margin-top:20px;
}

</style>

</head>

<body>

<div id="login">

<h2>🔐 Portineria Digitale</h2>

<input type="password" id="password">

<button onclick="login()">Accedi</button>

</div>

<div id="app" style="display:none">

<div class="card">

<h3>📷 Scanner pacchi</h3>

<button onclick="startScanner()">Avvia scanner</button>

<div style="position:relative">

<video id="video" autoplay playsinline style="display:none"></video>

<div class="overlay"></div>

</div>

</div>

<div class="card">

<h3>📦 Pacchi in giacenza</h3>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h3>👥 Gestione condomini</h3>

<input id="nome" placeholder="Nome">

<input id="telefono" placeholder="Telefono">

<select id="scala">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<button onclick="aggiungi()">Aggiungi condomino</button>

<div id="lista"></div>

</div>

<div class="card">

<button onclick="toggleNight()">🌙 Modalità notte</button>

</div>

<footer>

<hr>
Portineria Digitale<br>
Sviluppata da Rosario Bossis

</footer>

</div>
<script>

let password="portiere123"

function login(){

let p=document.getElementById("password").value

if(p===password){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

carica()

}else{

alert("Password errata")

}

}

function toggleNight(){

document.body.classList.toggle("dark")

}

function carica(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let lista=document.getElementById("lista")

lista.innerHTML=""

db.forEach(c=>{

lista.innerHTML+=`<div>${c.nome} - Scala ${c.scala}</div>`

})

mostraPacchi()

}

function aggiungi(){

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value
let scala=document.getElementById("scala").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({nome:nome,tel:tel,scala:scala})

localStorage.setItem("condomini",JSON.stringify(db))

carica()

}

</script>
<script>

let stream=null
let scanning=false

async function startScanner(){

let video=document.getElementById("video")

video.style.display="block"

stream=await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

})

video.srcObject=stream

scanning=true

scanLoop()

}

async function scanLoop(){

if(!scanning)return

let video=document.getElementById("video")

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let img=canvas.toDataURL()

let result=await Tesseract.recognize(img,"ita")

let text=result.data.text.toLowerCase()

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.forEach(c=>{

if(text.includes(c.nome.toLowerCase())){

new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()

window.open("https://wa.me/"+c.tel+"?text=È arrivato un pacco per lei")

}

})

setTimeout(scanLoop,2000)

}

</script>

</body>
</html>
<script>

function registraPacco(nome,corriere){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({
nome:nome,
corriere:corriere,
data:new Date().toISOString()
})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()

}

function mostraPacchi(){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("listaPacchi")

div.innerHTML=""

lista.forEach((p,i)=>{

let giorni=Math.floor((Date.now()-new Date(p.data))/(86400000))

let colore=""

if(giorni<=1)colore="verde"
else if(giorni<=3)colore="giallo"
else colore="rosso"

div.innerHTML+=`
<div class="${colore}">
${p.nome} - ${p.corriere}
</div>
`

})

}

</script>
<script>

function riconosciCorriere(testo){

let corriere="Altro"

if(testo.includes("amazon"))corriere="Amazon"
if(testo.includes("gls"))corriere="GLS"
if(testo.includes("poste"))corriere="Poste"
if(testo.includes("dhl"))corriere="DHL"
if(testo.includes("ups"))corriere="UPS"
if(testo.includes("bartolini"))corriere="Bartolini"

return corriere

}

</script>
<script>

function avvisoTutti(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let messaggio=prompt("Scrivi avviso per tutti")

if(!messaggio)return

db.forEach(c=>{

window.open(
"https://wa.me/"+c.tel+
"?text="+encodeURIComponent(messaggio)
)

})

}

</script>
<script>

function avvisoScala(){

let scala=prompt("Inserisci scala A B C")

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let messaggio=prompt("Messaggio")

db.forEach(c=>{

if(c.scala===scala){

window.open(
"https://wa.me/"+c.tel+
"?text="+encodeURIComponent(messaggio)
)

}

})

}

</script>
<script>

function cercaPacco(){

let nome=prompt("Nome da cercare")

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

let risultati=pacchi.filter(p=>
p.nome.toLowerCase().includes(nome.toLowerCase())
)

alert(JSON.stringify(risultati,null,2))

}

</script>
<script>

function salvaRegistro(tipo,nome){

let registro=JSON.parse(localStorage.getItem("registro"))||[]

registro.push({
tipo:tipo,
nome:nome,
data:new Date().toLocaleString()
})

localStorage.setItem("registro",JSON.stringify(registro))

</script>

let registro=JSON.parse(localStorage.getItem("registro"))||[]

console.log("Pacchi:",pacchi.length)
console.log("Operazioni:",registro.length)

</script>
<script>

function scanOttimizzato(video){

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let w=canvas.width
let h=canvas.height

let cropW=w*0.6
let cropH=h*0.25
let cropX=w*0.2
let cropY=h*0.4

let imageData=ctx.getImageData(cropX,cropY,cropW,cropH)

let cropCanvas=document.createElement("canvas")
cropCanvas.width=cropW
cropCanvas.height=cropH

cropCanvas.getContext("2d").putImageData(imageData,0,0)

return cropCanvas.toDataURL()

}

</script>
<script>

function accendiTorcia(){

let track=stream.getVideoTracks()[0]

let capabilities=track.getCapabilities()

if(capabilities.torch){

track.applyConstraints({
advanced:[{torch:true}]
})

}

}

</script>
<script>

function rafficaPacchi(){

scanning=true

scanLoop()

}

</script>
<script>

function salvaFirma(){

let canvas=document.getElementById("firma")

let img=canvas.toDataURL()

localStorage.setItem("firma",img)

}

</script>
<script>

let deferredPrompt

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

})

function installaApp(){

if(deferredPrompt){

deferredPrompt.prompt()

}

}

</script>
<script>

function trovaNome(testo){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

for(let i=0;i<db.length;i++){

let nome=db[i].nome.toLowerCase()

let parti=nome.split(" ")

if(
testo.includes(nome) ||
testo.includes(parti[0]) ||
testo.includes(parti[1])
){

return db[i]

}

}

return null

}

</script>
<script>

function beep(){

new Audio(
"https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
).play()

}

</script>
<script>

function pausaScanner(){

scanning=false

setTimeout(()=>{

scanning=true
scanLoop()

},3000)

}

</script>
<script>

function mostraRegistro(){

let registro=JSON.parse(localStorage.getItem("registro"))||[]

let html=""

registro.slice().reverse().forEach(r=>{

html+=`
<div>
${r.tipo} - ${r.nome} - ${r.data}
</div>
`

})

document.getElementById("registro").innerHTML=html

}

</script>
<script>

function backupAuto(){

let db=localStorage.getItem("condomini")

if(!db)return

let blob=new Blob([db],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="rubrica.json"

}

</script>
<script>

function ritaglioEtichetta(video){

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let w=canvas.width
let h=canvas.height

let cropW=w*0.6
let cropH=h*0.25

let cropX=w*0.2
let cropY=h*0.35

let data=ctx.getImageData(cropX,cropY,cropW,cropH)

let cropCanvas=document.createElement("canvas")

cropCanvas.width=cropW
cropCanvas.height=cropH

cropCanvas.getContext("2d").putImageData(data,0,0)

return cropCanvas.toDataURL()

}

</script>
<script>

function pulisciTestoOCR(testo){

return testo
.toLowerCase()
.replace(/0/g,"o")
.replace(/1/g,"i")
.replace(/5/g,"s")
.replace(/[^a-z\s]/g," ")

}

</script>
<script>

async function scanLoop(){

if(!scanning)return

let video=document.getElementById("video")

let img=ritaglioEtichetta(video)

let result=await Tesseract.recognize(img,"ita")

let text=pulisciTestoOCR(result.data.text)

let condomino=trovaNome(text)

if(condomino){

beep()

let corriere=riconosciCorriere(text)

registraPacco(condomino.nome,corriere)

window.open(
"https://wa.me/"+condomino.tel+
"?text=Buongiorno è arrivato un pacco "+corriere+" per lei"
)

pausaScanner()

}

setTimeout(scanLoop,1200)

}

</script>
<script>

async function startScanner(){

let video=document.getElementById("video")

video.style.display="block"

stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:1280},
height:{ideal:720}
}
})

video.srcObject=stream

scanning=true

scanLoop()

}

</script>
<script>

function paccoDuplicato(nome){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

return pacchi.some(p=>p.nome===nome)

}

</script>
