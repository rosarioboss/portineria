<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#075e54;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:5px;
}

.riga{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #eee;
}

.verde{background:#b9f6ca}
.giallo{background:#fff59d}
.rosso{background:#ff8a80}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>📦 Nuovo pacco</h2>

<textarea id="msgPacco">Buongiorno, è arrivato un pacco per</textarea>

<select id="rubrica"></select>

<button onclick="inviaPacco()">Avviso pacco</button>

<button onclick="scansionaEtichetta()">📷 Scansiona etichetta</button>

<video id="camera" autoplay playsinline style="width:100%;display:none;"></video>

<canvas id="canvas" style="display:none;"></canvas>

</div>

<div class="card">

<h2>📦 Pacchi in giacenza</h2>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h2>👥 Gestione condomini</h2>

<button onclick="toggleCondomini()">Mostra / Nascondi condomini</button>

<div id="lista" style="display:none;"></div>

<input id="nome" placeholder="Nome">
<input id="telefono" placeholder="Telefono">

<button onclick="aggiungi()">Aggiungi condomino</button>

<input type="file" onchange="importaFile(event)">

</div>

</div>

<script>

function carica(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let rubrica=document.getElementById("rubrica")
let lista=document.getElementById("lista")

rubrica.innerHTML=""
lista.innerHTML=""

db.forEach(c=>{

rubrica.innerHTML+=`<option value="${c.tel}">${c.nome}</option>`

lista.innerHTML+=`<div class="riga">${c.nome}</div>`

})

mostraPacchi()

}

function toggleCondomini(){

let lista=document.getElementById("lista")

lista.style.display=(lista.style.display==="none")?"block":"none"

}

function aggiungi(){

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({nome:nome,tel:tel})

localStorage.setItem("condomini",JSON.stringify(db))

carica()

}

function importaFile(event){

let file=event.target.files[0]

let reader=new FileReader()

reader.onload=function(e){

let dati=JSON.parse(e.target.result)

localStorage.setItem("condomini",JSON.stringify(dati.condomini))

alert("Rubrica importata")

carica()

}

reader.readAsText(file)

}

function inviaPacco(){

let sel=document.getElementById("rubrica")

let tel=sel.value
let nome=sel.options[sel.selectedIndex].text

let msgBase=document.getElementById("msgPacco").value
let msg=msgBase+" "+nome

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome:nome,data:new Date().toISOString()})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg))

}

function mostraPacchi(){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("listaPacchi")

div.innerHTML=""

lista.forEach((p,i)=>{

let giorni=Math.floor((Date.now()-new Date(p.data))/(1000*60*60*24))

let r=document.createElement("div")

r.className="riga"

r.innerHTML=p.nome+" <button onclick='ritirato("+i+")'>Ritirato</button>"

if(giorni==0)r.classList.add("verde")
else if(giorni<=3)r.classList.add("giallo")
else r.classList.add("rosso")

div.appendChild(r)

})

}

function ritirato(i){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

lista.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(lista))

mostraPacchi()

}

async function scansionaEtichetta(){

let video=document.getElementById("camera")

video.style.display="block"

let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

video.srcObject=stream

setTimeout(catturaFoto,2000)

}

function catturaFoto(){

let video=document.getElementById("camera")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

video.srcObject.getTracks().forEach(t=>t.stop())

video.style.display="none"

let img=canvas.toDataURL()

leggiTesto(img)

}

async function leggiTesto(img){

let r=await Tesseract.recognize(img,"ita")

trovaCondomino(r.data.text)

}

function trovaCondomino(testo){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

testo=testo.toLowerCase()

testo=testo.replace(/0/g,"o")
testo=testo.replace(/1/g,"i")
testo=testo.replace(/5/g,"s")

let trovato=null

db.forEach(c=>{

let nomeCompleto=c.nome.toLowerCase()

let parti=nomeCompleto.split(" ")

let nome=parti[0]
let cognome=parti[parti.length-1]

if(
testo.includes(nomeCompleto)||
testo.includes(nome)||
testo.includes(cognome)||
testo.includes(nome.substring(0,3))||
testo.includes(cognome.substring(0,3))
){
trovato=c
}

})

if(trovato){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
audio.play()

let msgBase=document.getElementById("msgPacco").value

let msg=msgBase+" "+trovato.nome

window.open("https://wa.me/"+trovato.tel+"?text="+encodeURIComponent(msg))

}else{

alert("Condomino non trovato")

}

}

window.onload=carica

</script>

</body>
</html>
