<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portineria Scanner PRO</title>

<style>
body{font-family:sans-serif;background:#f2f2f7;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
input{width:100%;padding:15px;margin:5px 0;font-size:16px}
button{padding:15px;border:none;border-radius:10px;margin-top:5px;color:#fff;font-weight:bold;width:100%}
.pacco{background:#007aff}
.rac{background:#5856d6}
.del{background:#ff3b30}
.hidden{display:none}
.item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}
</style>

</head>

<body>

<div class="card">
<h3>📦 Scanner / Nome Pacco</h3>
<input id="scan" placeholder="Scansiona o scrivi nome..." oninput="cercaScan()">
<div id="risScan"></div>
</div>

<div class="card">
<h3>✉️ Raccomandata (manuale)</h3>
<input id="cerca" placeholder="Cerca condomino..." oninput="cercaManuale()">
<div id="risManuale"></div>
</div>

<div id="azioni" class="card hidden">
<h3 id="nomeSel"></h3>
<button class="pacco" onclick="avvisa('PACCO')">AVVISA PACCO</button>
<button class="rac" onclick="avvisa('RACCOMANDATA')">AVVISA RACCOMANDATA</button>
</div>

<div class="card">
<h3>📥 Giacenza</h3>
<div id="lista"></div>
</div>

<div class="card">
<h3>👤 Aggiungi Condomino</h3>
<input id="nome" placeholder="Nome Cognome">
<input id="tel" placeholder="Telefono">
<button class="pacco" onclick="salva()">SALVA</button>
</div>

<div class="card">
<h3>📂 Importa Lista</h3>
<input type="file" onchange="importa(event)">
</div>

<div class="card">
<button class="pacco" onclick="backup()">📤 Backup</button>
<button class="rac" onclick="location.reload()">🔄 Aggiorna</button>
<button class="del" onclick="reset()">🗑️ Reset</button>
</div>

<script>
const DB={
get:k=>JSON.parse(localStorage.getItem(k))||[],
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

let attuale=null

function cercaScan(){
let q=scan.value.toUpperCase()
if(!q)return risScan.innerHTML=""
let r=DB.get("rubrica").filter(x=>x.nome.includes(q))
risScan.innerHTML=r.map(x=>`<div onclick="sel('${x.nome}','${x.tel}')">${x.nome}</div>`).join("")
}

function cercaManuale(){
let q=cerca.value.toUpperCase()
if(!q)return risManuale.innerHTML=""
let r=DB.get("rubrica").filter(x=>x.nome.includes(q))
risManuale.innerHTML=r.map(x=>`<div onclick="sel('${x.nome}','${x.tel}')">${x.nome}</div>`).join("")
}

function sel(n,t){
attuale={n,t}
nomeSel.innerText=n
azioni.classList.remove("hidden")
}

function avvisa(tipo){
if(!attuale)return
let tel=attuale.t.replace(/\D/g,'')
let p=tel.startsWith("39")?"":"39"
let msg=`Buongiorno ${attuale.n}, è arrivato un ${tipo} in portineria.`
window.open(`https://wa.me/${p}${tel}?text=${encodeURIComponent(msg)}`)

let g=DB.get("giacenza")
g.unshift({n:attuale.n,tipo,data:new Date().toLocaleDateString()})
DB.set("giacenza",g)

azioni.classList.add("hidden")
render()
}

function render(){
let g=DB.get("giacenza")
lista.innerHTML=g.map((x,i)=>`
<div class="item">
<div>${x.n} - ${x.tipo}</div>
<button class="del" onclick="ritira(${i})">OK</button>
</div>`).join("")||"Vuoto"
}

function ritira(i){
let g=DB.get("giacenza")
g.splice(i,1)
DB.set("giacenza",g)
render()
}

function salva(){
let n=nome.value.toUpperCase()
let t=tel.value
if(!n||!t)return alert("Dati mancanti")
let r=DB.get("rubrica")
r.push({nome:n,tel:t})
DB.set("rubrica",r)
alert("Salvato")
nome.value=""
tel.value=""
}

function importa(e){
let f=e.target.files[0]
let r=new FileReader()
r.onload=x=>{
let data=JSON.parse(x.target.result)
DB.set("rubrica",data)
alert("Importato")
}
r.readAsText(f)
}

function backup(){
let data=DB.get("rubrica")
let b=new Blob([JSON.stringify(data)],{type:"application/json"})
let a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download="rubrica.json"
a.click()
}

function reset(){
if(confirm("Cancello tutto?")){
localStorage.clear()
render()
}
}

window.onload=render
</script>

</body>
</html>
