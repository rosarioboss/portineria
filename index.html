<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portineria</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{font-family:sans-serif;background:#f2f2f7;margin:0;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px}
h2{margin:0 0 10px}
input{width:100%;padding:14px;margin:6px 0;font-size:18px;border-radius:10px;border:1px solid #ccc}
button{width:100%;padding:14px;margin-top:6px;border:none;border-radius:10px;color:#fff;font-weight:bold}
.row{display:flex;gap:10px}
.row button{flex:1}
.pacco{background:#007aff}
.rac{background:#5856d6}
.gray{background:#8e8e93}
.del{background:#ff3b30}
.item{padding:10px;border-bottom:1px solid #eee}
.small{font-size:12px;color:#666}
.mode{display:flex;gap:10px;margin-bottom:10px}
.mode button{flex:1;opacity:.5}
.active{opacity:1}
video{width:100%;margin-top:10px;border-radius:10px}

/* MIRINO */
.wrap{position:relative}
.mirino{
position:absolute;
top:30%;
left:10%;
width:80%;
height:20%;
border:3px solid red;
border-radius:10px;
pointer-events:none;
}
</style>
</head>

<body>

<div class="card">
  <h2>⚡ Ricerca</h2>

  <div class="mode">
    <button id="btnPacco" class="pacco active" onclick="setMode('PACCO')">PACCO</button>
    <button id="btnRac" class="rac" onclick="setMode('RACCOMANDATA')">RACCOMANDATA</button>
  </div>

  <input id="q" placeholder="Scrivi nome..." oninput="cerca()">
  
  <button class="pacco" onclick="startOCR()">📷 SCANNER NOME</button>

  <!-- MIRINO -->
  <div class="wrap">
    <video id="video" autoplay></video>
    <div class="mirino"></div>
  </div>

  <div id="res"></div>
</div>

<!-- resto IDENTICO -->
<div class="card">
  <h2>✉️ Invio manuale</h2>
  <input id="nomeManuale" placeholder="Nome Cognome">
  <input id="telManuale" placeholder="Telefono">
  <button class="pacco" onclick="inviaManuale()">INVIA</button>
</div>

<div class="card">
  <h2 onclick="toggleRubrica()" style="cursor:pointer">
👥 Rubrica (tocca per aprire/chiudere)
</h2>
  <input id="nomeNew" placeholder="Nome Cognome">
  <input id="telNew" placeholder="Telefono">
  <button class="pacco" onclick="aggiungi()">AGGIUNGI</button>

  <div class="row">
    <button class="gray" onclick="esporta()">📤 Backup</button>
    <input type="file" id="fileImport" style="display:none" onchange="importa(event)">
    <button class="gray" onclick="document.getElementById('fileImport').click()">📥 Import</button>
  </div>

  <div id="lista" style="display:none"></div>
</div>

<div class="card">
  <h2>📥 Giacenza</h2>
  <div id="g"></div>
</div>

<script>

// ===== OCR MIGLIORATO =====
let stream

async function startOCR(){
const video=document.getElementById("video")

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=stream

setTimeout(scanFrame,2000)
}

function scanFrame(){

const video=document.getElementById("video")
const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

let w=video.videoWidth
let h=video.videoHeight

// 🎯 SOLO MIRINO
let x=w*0.1
let y=h*0.3
let cw=w*0.8
let ch=h*0.2

canvas.width=cw
canvas.height=ch

ctx.drawImage(video,x,y,cw,ch,0,0,cw,ch)

Tesseract.recognize(canvas,'ita').then(({data:{text}})=>{

let testo=text.toUpperCase().replace(/[^A-Z\s]/g," ")

console.log("OCR:",testo)

// 🧠 MATCH INTELLIGENTE
let trovato=null
let punteggioMax=0

rubrica.forEach(x=>{
let parole=x.nome.split(" ")
let match=parole.filter(p=>testo.includes(p)).length
if(match>punteggioMax){
punteggioMax=match
trovato=x
}
})

if(trovato && punteggioMax>0){
invia(trovato.nome,trovato.tel)
}else{
if(confirm("Testo letto:\n\n"+testo+"\n\nUsarlo?")){
document.getElementById("q").value=testo
cerca()
}
}

stream.getTracks().forEach(t=>t.stop())

})
}

// ===== RESTO TUO CODICE IDENTICO =====
let rubrica = load('rubrica') || [
  {nome:"ROSSI MARIO",tel:"3331234567"}
];
let giacenza = load('giacenza') || [];
let mode = "PACCO";

function norm(t){ return (t||"").toUpperCase().trim(); }
function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function load(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }

function setMode(m){
  mode = m;
  document.getElementById("btnPacco").classList.toggle("active", m==="PACCO");
  document.getElementById("btnRac").classList.toggle("active", m==="RACCOMANDATA");
}

function cerca(){
  const q = document.getElementById("q");
  const res = document.getElementById("res");
  const val = norm(q.value);

  if(!val){ res.innerHTML=""; return; }

  const trovati = rubrica.filter(x => norm(x.nome).includes(val));

  res.innerHTML = trovati.map(x =>
    `<div class="item" onclick="invia('${x.nome}','${x.tel}')">${x.nome}</div>`
  ).join("") || "<div class='small'>Nessun risultato</div>";
}

function invia(nome,tel){
  const numero = (tel||"").replace(/\D/g,'');
  if(numero.length < 8){ alert("Numero non valido"); return; }

  const pref = numero.startsWith("39") ? "" : "39";

  const msg = (mode==="PACCO")
    ? `Buongiorno ${nome}, è arrivato un pacco in portineria`
    : `Buongiorno ${nome}, è arrivata una raccomandata in portineria`;

  window.location.href = `https://wa.me/${pref}${numero}?text=${encodeURIComponent(msg)}`;

  giacenza.unshift({nome, tipo:mode, data:new Date().toLocaleDateString('it-IT')});
  save('giacenza', giacenza);

  render();
}

function inviaManuale(){
  const n = document.getElementById("nomeManuale").value.trim();
  const t = document.getElementById("telManuale").value.trim();
  if(!n || !t){ alert("Inserisci dati"); return; }

  invia(n, t);

  document.getElementById("nomeManuale").value="";
  document.getElementById("telManuale").value="";
}

function aggiungi(){
  const n = document.getElementById("nomeNew").value.trim();
  const t = document.getElementById("telNew").value.trim();
  if(!n || !t){ alert("Inserisci dati"); return; }

  rubrica.push({nome:n.toUpperCase(), tel:t});
  save('rubrica', rubrica);

  document.getElementById("nomeNew").value="";
  document.getElementById("telNew").value="";

  render();
}

function esporta(){
  const blob = new Blob([JSON.stringify(rubrica,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rubrica.json";
  a.click();
}

function importa(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      rubrica = JSON.parse(ev.target.result);
      save('rubrica', rubrica);
      render();
    }catch{
      alert("File non valido");
    }
  };
  reader.readAsText(file);
}

function rimuovi(i){
  giacenza.splice(i,1);
  save('giacenza', giacenza);
  render();
}

function toggleRubrica(){
  let el = document.getElementById("lista")
  el.style.display = el.style.display==="none" ? "block" : "none"
}

function render(){
  lista.innerHTML=rubrica.map((x,i)=>
  `<div class="item">
  <b onclick="invia('${x.nome}','${x.tel}')">${x.nome}</b>
  <button class="del" onclick="event.stopPropagation();rimuovi(${i})">ELIMINA</button>
  </div>`).join("")

  g.innerHTML=giacenza.map((x,i)=>
  `<div class="item">
  <b>${x.nome}</b><br>
  <span class="small">${x.tipo}</span>
  <button class="del" onclick="event.stopPropagation();rimuovi(${i})">OK</button>
  </div>`).join("")
}

window.onload=render

</script>

</body>
</html>
