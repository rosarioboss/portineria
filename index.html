<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>App del Portiere</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#075e54;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:5px;
background:#25d366;
color:white;
}

.riga{
display:flex;
justify-content:space-between;
padding:6px;
border-bottom:1px solid #eee;
}

.verde{background:#b9f6ca}
.giallo{background:#fff59d}
.rosso{background:#ff8a80}

.counter{
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="card">
<h2>📊 Stato consegne</h2>
<div class="counter">
📦 Pacchi: <span id="countPacchi">0</span><br>
✉️ Raccomandate: <span id="countRacc">0</span>
</div>
</div>

<div class="card">

<h2>📦 Nuovo pacco</h2>

<textarea id="msgPacco">Buongiorno, è arrivato un pacco per</textarea>

<select id="rubrica"></select>

<button onclick="inviaPacco()">Invia avviso pacco</button>

<button onclick="scansiona('pacco')">📷 Scansiona pacco</button>

<button onclick="inviaRacc()">✉️ Raccomandata</button>

<button onclick="scansiona('racc')">📷 Scansiona raccomandata</button>

<video id="camera" autoplay playsinline style="width:100%;display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

</div>

<div class="card">

<h2>📦 Pacchi in giacenza</h2>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h2>✉️ Raccomandate in giacenza</h2>

<div id="listaRacc"></div>

</div>

<div class="card">

<h2>📜 Registro consegne</h2>

<div id="registro"></div>

</div>

<div class="card">

<h2>📢 Avviso a tutti</h2>

<textarea id="msgAll"></textarea>

<button onclick="avvisoTutti()">Invia messaggio</button>

<input type="file" accept="image/*" onchange="fotoAvviso(event)">

</div>

<div class="card">

<h2>🏢 Avviso per scala</h2>

<select id="scalaAvviso">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<textarea id="msgScala"></textarea>

<button onclick="avvisoScala()">Invia</button>

</div>

<div class="card">

<h2>👥 Gestione condomini</h2>

<input id="cerca" placeholder="Cerca condomino..." onkeyup="cercaCondomino()">

<div id="lista"></div>

<h3>Aggiungi</h3>

<input id="nome" placeholder="Nome">
<input id="telefono" placeholder="Telefono">

<select id="scala">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<button onclick="aggiungi()">Salva</button>

<input type="file" onchange="importaFile(event)">

</div>

<div class="card">

<h2>📄 Contratto portieri</h2>

<button onclick="window.open('https://www.confedilizia.it/wp-content/uploads/CCNL-Portieri.pdf')">Apri contratto</button>

</div>

</div>

<script>

function carica(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let rubrica=document.getElementById("rubrica")
let lista=document.getElementById("lista")

rubrica.innerHTML=""
lista.innerHTML=""

db.forEach(c=>{

rubrica.innerHTML+=`<option value="${c.tel}">${c.nome}</option>`

lista.innerHTML+=`<div class="riga">${c.nome}</div>`

})

mostraPacchi()
mostraRacc()
mostraRegistro()

}

function aggiornaContatori(){

let p=JSON.parse(localStorage.getItem("pacchi"))||[]
let r=JSON.parse(localStorage.getItem("racc"))||[]

document.getElementById("countPacchi").innerText=p.length
document.getElementById("countRacc").innerText=r.length

}

function aggiungi(){

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value
let scala=document.getElementById("scala").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({nome:nome,tel:tel,scala:scala})

localStorage.setItem("condomini",JSON.stringify(db))

carica()

}

function inviaPacco(){

let sel=document.getElementById("rubrica")

let tel=sel.value
let nome=sel.options[sel.selectedIndex].text

let msg=document.getElementById("msgPacco").value+" "+nome

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg))

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome:nome,data:new Date().toISOString()})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

salvaRegistro("Pacco",nome)

mostraPacchi()

}

function inviaRacc(){

let sel=document.getElementById("rubrica")

let tel=sel.value
let nome=sel.options[sel.selectedIndex].text

let msg="Buongiorno, è arrivata una raccomandata per "+nome

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg))

let r=JSON.parse(localStorage.getItem("racc"))||[]

r.push({nome:nome,data:new Date().toISOString()})

localStorage.setItem("racc",JSON.stringify(r))

salvaRegistro("Raccomandata",nome)

mostraRacc()

}

function mostraPacchi(){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("listaPacchi")

div.innerHTML=""

lista.forEach((p,i)=>{

let giorni=Math.floor((Date.now()-new Date(p.data))/(1000*60*60*24))

let r=document.createElement("div")

r.className="riga"

r.innerHTML=p.nome+" <button onclick='ritiraPacco("+i+")'>Ritirato</button>"

if(giorni==0)r.classList.add("verde")
else if(giorni<=3)r.classList.add("giallo")
else r.classList.add("rosso")

div.appendChild(r)

})

aggiornaContatori()

}

function mostraRacc(){

let lista=JSON.parse(localStorage.getItem("racc"))||[]

let div=document.getElementById("listaRacc")

div.innerHTML=""

lista.forEach((p,i)=>{

let r=document.createElement("div")

r.className="riga"

r.innerHTML=p.nome+" <button onclick='ritiraRacc("+i+")'>Ritirata</button>"

div.appendChild(r)

})

aggiornaContatori()

}

function ritiraPacco(i){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

lista.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(lista))

mostraPacchi()

}

function ritiraRacc(i){

let lista=JSON.parse(localStorage.getItem("racc"))||[]

lista.splice(i,1)

localStorage.setItem("racc",JSON.stringify(lista))

mostraRacc()

}

function salvaRegistro(tipo,nome){

let reg=JSON.parse(localStorage.getItem("registro"))||[]

reg.push({tipo:tipo,nome:nome,data:new Date().toLocaleString()})

localStorage.setItem("registro",JSON.stringify(reg))

mostraRegistro()

}

function mostraRegistro(){

let reg=JSON.parse(localStorage.getItem("registro"))||[]

let div=document.getElementById("registro")

div.innerHTML=""

reg.slice().reverse().forEach(p=>{

div.innerHTML+=`<div class="riga">${p.tipo} - ${p.nome} - ${p.data}</div>`

})

}

function cercaCondomino(){

let testo=document.getElementById("cerca").value.toLowerCase()

let righe=document.querySelectorAll("#lista .riga")

righe.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(testo)?"flex":"none"
})

}

function avvisoTutti(){

let msg=document.getElementById("msgAll").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.forEach(c=>{
window.open("https://wa.me/"+c.tel+"?text="+encodeURIComponent(msg))
})

}

function avvisoScala(){

let scala=document.getElementById("scalaAvviso").value
let msg=document.getElementById("msgScala").value

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.forEach(c=>{
if(c.scala===scala){
window.open("https://wa.me/"+c.tel+"?text="+encodeURIComponent(msg))
}
})

}

function fotoAvviso(e){

let file=e.target.files[0]

let url=URL.createObjectURL(file)

window.open(url)

}

async function scansiona(tipo){

let video=document.getElementById("camera")

video.style.display="block"

let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

video.srcObject=stream

setTimeout(()=>cattura(tipo),2000)

}

function cattura(tipo){

let video=document.getElementById("camera")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

video.srcObject.getTracks().forEach(t=>t.stop())

video.style.display="none"

let img=canvas.toDataURL()

leggiTesto(img,tipo)

}

async function leggiTesto(img,tipo){

let r=await Tesseract.recognize(img,"ita")

trovaCondomino(r.data.text,tipo)

}

function trovaCondomino(testo,tipo){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

testo=testo.toLowerCase()

testo=testo.replace(/0/g,"o")
testo=testo.replace(/1/g,"i")
testo=testo.replace(/5/g,"s")
testo=testo.replace(/8/g,"b")

let trovato=null

db.forEach(c=>{

let nome=c.nome.toLowerCase()

if(
testo.includes(nome)||
testo.includes(nome.substring(0,3))
){
trovato=c
}

})

if(trovato){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")
audio.play()

if(tipo==="pacco"){

let msg=document.getElementById("msgPacco").value+" "+trovato.nome

window.open("https://wa.me/"+trovato.tel+"?text="+encodeURIComponent(msg))

}else{

let msg="Buongiorno, è arrivata una raccomandata per "+trovato.nome

window.open("https://wa.me/"+trovato.tel+"?text="+encodeURIComponent(msg))

}

}else{

alert("Condomino non trovato")

}

}

window.onload=carica

</script>

</body>
</html>
