<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portineria Digitale ULTRA v4.0</title>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
        :root {
            --primary: #007aff; --success: #34c759; --danger: #ff3b30;
            --dark: #1c1c1e; --light: #f2f2f7; --white: #ffffff; --gray: #8e8e93;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--light); margin: 0; padding: 15px; color: var(--dark);
        }

        .card {
            background: var(--white); padding: 20px; border-radius: 24px;
            margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.1);
        }

        h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 20px; letter-spacing: -1px; }
        h3 { margin-top: 0; font-size: 18px; color: var(--gray); display: flex; align-items: center; gap: 8px; }

        button {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            background-color: var(--primary); color: var(--white);
            font-size: 17px; font-weight: 700; cursor: pointer;
            margin-top: 10px; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.96); }
        .btn-wa { background-color: var(--success) !important; }
        .btn-dark { background-color: var(--dark) !important; }
        .btn-outline { background: none; border: 2px solid var(--primary); color: var(--primary); }
        .btn-ritiro { background-color: var(--danger) !important; width: auto; padding: 10px 20px; font-size: 14px; margin: 0; }

        input, textarea {
            width: 100%; padding: 16px; margin-top: 10px; border: 2px solid #e5e5ea;
            border-radius: 14px; font-size: 16px; box-sizing: border-box; background: var(--light);
        }

        .video-container {
            position: relative; width: 100%; display: none; border-radius: 20px;
            overflow: hidden; background: #000; margin-top: 15px; aspect-ratio: 4/3;
        }
        .video-container.active { display: block; border: 3px solid var(--success); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .pacco-item {
            padding: 15px; background: var(--light); border-radius: 18px;
            margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px;
        }

        .status-box {
            text-align: center; padding: 15px; border-radius: 18px;
            font-weight: 800; color: white; margin-bottom: 20px;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .img-preview { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; }
        .flex-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Lavoro in corso...</p></div>

<div class="container">
    <h1>Portineria PRO v4.0</h1>

    <div class="card">
        <div id="semaforo" class="status-box" style="background: var(--primary);">SISTEMA OK</div>
        <div class="flex-row" style="text-align: center;">
            <div style="flex:1;"><small>OGGI</small><br><b id="count-oggi" style="font-size: 24px;">0</b></div>
            <div style="flex:1;"><small>GIACENZA</small><br><b id="count-totale" style="font-size: 24px;">0</b></div>
        </div>
        <button onclick="sollecitoMassivo()" class="btn-wa">📢 AVVISA TUTTI I SOSPESI</button>
    </div>

    <div class="card">
        <h3>📷 Acquisizione Automatica</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="avviaScanner('ocr')" class="btn-dark">📄 Leggi Nome</button>
            <button onclick="avviaScanner('barcode')" style="background:#5856d6">🔍 Barcode</button>
        </div>
        <div id="videoContainer" class="video-container">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        <button id="btnStop" style="display:none; background: var(--gray);" onclick="stopCamera()">Spegni Camera</button>
    </div>

    <div class="card">
        <h3>📦 Entrata Merce</h3>
        <label style="font-size: 12px; font-weight: bold;">FOTO (FACOLTATIVA)</label>
        <input type="file" id="fotoPacco" accept="image/*" capture="environment">
        <input type="text" id="inputNome" placeholder="Chi è il destinatario?">
        <button onclick="salvaTutto()" class="btn-wa">REGISTRA E INVIA WHATSAPP</button>
    </div>

    <div class="card">
        <h3>📋 Pacchi da Consegnare</h3>
        <input type="text" id="filtro" placeholder="Cerca condomino..." oninput="renderPacchi()">
        <div id="lista-pacchi" style="margin-top: 15px;"></div>
    </div>

    <div class="card">
        <h3>👥 Rubrica Residenti</h3>
        <input type="file" id="fileImport" style="display:none" onchange="importaFile(this)">
        <button onclick="document.getElementById('fileImport').click()" class="btn-dark">📥 Carica File (JSON/TXT)</button>
        
        <textarea id="boxNote" placeholder="Incolla qui: Nome, Telefono (es: Mario Rossi, 3331234567)"></textarea>
        <button onclick="caricaDaTesto()" class="btn-outline">Aggiungi Nomi da Testo</button>
        
        <div id="elenco-rubrica" style="max-height: 200px; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 12px;"></div>
    </div>

    <div class="card">
        <h3>📊 Rendimento Settimanale</h3>
        <canvas id="graficoConsegne"></canvas>
        <button onclick="scaricaBackup()" style="background:#444; margin-top: 20px;">💾 Salva Backup Database</button>
        <button onclick="resetTotale()" style="background:none; color:red; font-size:11px; border:none; margin-top:30px;">⚠️ RESET DI FABBRICA</button>
    </div>
</div>

<script>
/* ============================================================
   DATABASE E LOGICA CORE
   ============================================================ */
let stream = null;
let chart = null;

const Storage = {
    get: (key) => JSON.parse(localStorage.getItem(key)) || [],
    set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
};

window.onload = () => {
    initGrafico();
    renderTutto();
};

function renderTutto() {
    renderPacchi();
    renderRubrica();
    aggiornaDash();
}

/* --- WHATSAPP --- */
function avvisoWA(nome, sollecito = false) {
    const rubrica = Storage.get('rubrica');
    const cerca = nome.toLowerCase().trim();
    const c = rubrica.find(u => cerca.includes(u.nome.toLowerCase()) || u.nome.toLowerCase().includes(cerca));

    if (c) {
        let tel = c.telefono.replace(/\D/g, '');
        if (tel.length === 10) tel = "39" + tel;
        const msg = sollecito ? `Reminder: hai un pacco in attesa! 📦` : `Ciao ${c.nome}, è arrivato un pacco per te! 📦`;
        window.location.href = `https://wa.me/${tel}?text=${encodeURIComponent(msg)}`;
    } else if (!sollecito) {
        alert("Pacco salvato, ma il nome non è in rubrica. WhatsApp non inviato.");
    }
}

/* --- GESTIONE PACCHI --- */
async function salvaTutto() {
    const nome = document.getElementById('inputNome').value.trim();
    if (!nome) return alert("Metti un nome!");

    mostraLoader(true);
    const file = document.getElementById('fotoPacco').files[0];
    let fotoBase64 = null;
    if (file) fotoBase64 = await comprimiFoto(file);

    const pacchi = Storage.get('pacchi');
    pacchi.unshift({ id: Date.now(), nome: nome, data: new Date().toISOString(), foto: fotoBase64 });
    Storage.set('pacchi', pacchi);

    document.getElementById('inputNome').value = "";
    document.getElementById('fotoPacco').value = "";
    mostraLoader(false);
    renderTutto();
    avvisoWA(nome);
}

function ritiraPacco(idx) {
    let p = Storage.get('pacchi');
    let s = Storage.get('storico');
    let rimosso = p.splice(idx, 1)[0];
    rimosso.ritiro = new Date().toISOString();
    s.push(rimosso);
    Storage.set('pacchi', p);
    Storage.set('storico', s);
    renderTutto();
    aggiornaGrafico();
}

/* --- RUBRICA E IMPORT --- */
function caricaDaTesto() {
    const testo = document.getElementById('boxNote').value;
    const righe = testo.split('\n');
    let r = Storage.get('rubrica');
    let count = 0;

    righe.forEach(l => {
        const p = l.split(/[,;\t\-]/);
        if (p.length >= 2) {
            const nome = p[0].trim();
            const tel = p[1].trim().replace(/\D/g, '');
            if (nome.length > 2 && tel.length > 7) {
                r.push({ nome, telefono: tel });
                count++;
            }
        }
    });

    Storage.set('rubrica', r);
    document.getElementById('boxNote').value = "";
    renderTutto();
    alert("Aggiunti " + count + " condomini.");
}

function importaFile(input) {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const json = JSON.parse(e.target.result);
            Storage.set('rubrica', json.rubrica || json);
        } catch {
            document.getElementById('boxNote').value = e.target.result;
            caricaDaTesto();
        }
        renderTutto();
    };
    reader.readAsText(input.files[0]);
}

/* --- SCANNER --- */
async function avviaScanner(modo) {
    stopCamera();
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('webcam').srcObject = stream;
        document.getElementById('videoContainer').classList.add('active');
        document.getElementById('btnStop').style.display = "block";

        if(modo === 'ocr') {
            const intervallo = setInterval(async () => {
                if(!stream) return clearInterval(intervallo);
                const cvs = document.createElement('canvas');
                const v = document.getElementById('webcam');
                cvs.width = v.videoWidth; cvs.height = v.videoHeight;
                cvs.getContext('2d').drawImage(v, 0, 0);
                const res = await Tesseract.recognize(cvs, 'ita');
                Storage.get('rubrica').forEach(c => {
                    if(res.data.text.toLowerCase().includes(c.nome.toLowerCase())) {
                        document.getElementById('inputNome').value = c.nome;
                        stopCamera();
                        clearInterval(intervallo);
                    }
                });
            }, 2000);
        } else {
            const codeReader = new ZXing.BrowserBarcodeReader();
            codeReader.decodeFromVideoDevice(null, 'webcam', (res) => {
                if (res) { document.getElementById('inputNome').value = res.text; stopCamera(); }
            });
        }
    } catch (e) { alert("Permessi fotocamera negati."); }
}

function stopCamera() {
    if(stream) stream.getTracks().forEach(t => t.stop());
    stream = null;
    document.getElementById('videoContainer').classList.remove('active');
    document.getElementById('btnStop').style.display = "none";
}

/* --- INTERFACCIA --- */
function renderPacchi() {
    const list = document.getElementById('lista-pacchi');
    const f = document.getElementById('filtro').value.toLowerCase();
    const p = Storage.get('pacchi');
    list.innerHTML = p.filter(x => x.nome.toLowerCase().includes(f)).map((x, i) => `
        <div class="pacco-item">
            <div class="flex-row">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="${x.foto || 'https://via.placeholder.com/70?text=PACCO'}" class="img-preview">
                    <div><b>${x.nome.toUpperCase()}</b><br><small>${new Date(x.data).toLocaleTimeString()}</small></div>
                </div>
                <button class="btn-ritiro" onclick="ritiraPacco(${i})">CONSEGNA</button>
            </div>
            <button onclick="avvisoWA('${x.nome}')" style="padding:10px; font-size:13px; background:#f0f0f0; color:black;">📲 Invia Sollecito</button>
        </div>
    `).join('');
}

function renderRubrica() {
    const r = Storage.get('rubrica');
    document.getElementById('elenco-rubrica').innerHTML = r.sort((a,b)=>a.nome.localeCompare(b.nome)).map((c, i) => `
        <div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <span>${c.nome} <small>(${c.telefono})</small></span>
            <button onclick="eliminaC(${i})" style="width:auto; padding:5px; background:none; color:red; margin:0; font-size:12px;">Elimina</button>
        </div>
    `).join('');
}

function aggiornaDash() {
    const p = Storage.get('pacchi');
    document.getElementById('count-totale').innerText = p.length;
    document.getElementById('count-oggi').innerText = p.filter(x => new Date(x.data).toDateString() === new Date().toDateString()).length;
    const s = document.getElementById('semaforo');
    s.style.background = p.length > 10 ? "var(--danger)" : (p.length > 0 ? "var(--primary)" : "var(--success)");
    s.innerText = p.length > 0 ? p.length + " PACCHI IN ATTESA" : "TUTTO CONSEGNATO";
}

/* --- GRAFICO --- */
function initGrafico() {
    const ctx = document.getElementById('graficoConsegne').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Consegne', data: [], borderColor: '#007aff', tension: 0.3 }] },
        options: { plugins: { legend: { display: false } } }
    });
    aggiornaGrafico();
}

function aggiornaGrafico() {
    const s = Storage.get('storico');
    const counts = {};
    s.slice(-30).forEach(x => {
        const d = new Date(x.ritiro).toLocaleDateString();
        counts[d] = (counts[d] || 0) + 1;
    });
    chart.data.labels = Object.keys(counts);
    chart.data.datasets[0].data = Object.values(counts);
    chart.update();
}

/* --- UTILS --- */
function comprimiFoto(file) {
    return new Promise(res => {
        const r = new FileReader(); r.readAsDataURL(file);
        r.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const cvs = document.createElement('canvas');
                const scale = 500 / img.width;
                cvs.width = 500; cvs.height = img.height * scale;
                cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                res(cvs.toDataURL('image/jpeg', 0.7));
            }
        }
    });
}

function scaricaBackup() {
    const b = new Blob([JSON.stringify(localStorage)], {type:'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "backup_portineria.json"; a.click();
}

function eliminaC(i) { let r = Storage.get('rubrica'); r.splice(i,1); Storage.set('rubrica', r); renderTutto(); }
function mostraLoader(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
function sollecitoMassivo() { Storage.get('pacchi').forEach((p, i) => setTimeout(() => avvisoWA(p.nome, true), i * 1500)); }
function resetTotale() { if(confirm("CANCELLARE TUTTO?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
