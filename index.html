<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Portineria Digitale PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --blue: #007aff; --red: #ff3b30; --green: #34c759; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f2f2f7; padding: 15px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2, h3 { margin: 0 0 10px 0; color: #1c1c1e; }
        button { width: 100%; padding: 14px; margin-top: 8px; border: none; border-radius: 10px; background: var(--blue); color: white; font-weight: bold; font-size: 16px; }
        button:active { opacity: 0.7; }
        .btn-red { background: var(--red); }
        .btn-green { background: var(--green); }
        .btn-gray { background: #8e8e93; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #d1d1d6; box-sizing: border-box; font-size: 16px; }
        #cameraBox { display: none; position: relative; background: #000; border-radius: 15px; overflow: hidden; margin-top: 10px; }
        #video { width: 100%; height: auto; display: block; transform: scaleX(1); }
        #scanArea { position: absolute; border: 3px solid var(--green); width: 70%; height: 25%; top: 37.5%; left: 15%; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; }
        #status { position: absolute; top: 10px; left: 10px; color: var(--green); font-weight: bold; font-size: 12px; text-shadow: 1px 1px 2px #000; }
        .item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #ff9500; color: white; padding: 2px 6px; border-radius: 6px; font-size: 11px; margin-left: 5px; vertical-align: middle; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 Portineria</h2>
    <button onclick="startScanner()">📷 SCANSIONA PACCO</button>
    <div id="cameraBox">
        <div id="status">INIZIALIZZAZIONE...</div>
        <video id="video" autoplay playsinline muted></video>
        <div id="scanArea"></div>
        <button class="btn-red" onclick="stopScanner()">CHIUDI</button>
    </div>
    <input id="search" placeholder="Cerca o inserisci nome..." oninput="filtra()">
    <div id="risultati"></div>
</div>

<div class="card">
    <h3>📥 IN GIACENZA</h3>
    <div id="listaGiacenza"></div>
</div>

<div class="card">
    <h3>✉️ REGISTRA MANUALE</h3>
    <input id="manualNome" placeholder="Nome destinatario...">
    <button class="btn-green" onclick="aggiungiManuale('RACCOMANDATA')">REGISTRA RACCOMANDATA</button>
    <button class="btn-gray" onclick="aggiungiManuale('PACCO')">REGISTRA PACCO</button>
</div>

<button onclick="toggleAdmin()" class="btn-gray" style="margin-bottom: 30px;">⚙️ GESTISCI RUBRICA</button>

<div class="card hidden" id="admin">
    <h3>📇 RUBRICA</h3>
    <input id="nome" placeholder="NOME COGNOME">
    <input id="tel" placeholder="3331234567">
    <button onclick="salvaContatto()">SALVA</button>
    <textarea id="importa" placeholder="NOME COGNOME,393330000000 (uno per riga)"></textarea>
    <button onclick="importaRubrica()">IMPORTA LISTA</button>
    <div id="listaRubrica" style="margin-top:10px; font-size:12px; max-height:150px; overflow-y:auto"></div>
</div>

<script>
const DB = {
    get: k => JSON.parse(localStorage.getItem(k)) || [],
    set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

let stream = null;
let isScanning = false;
let worker = null;
let audioCtx = null;

// Sblocca l'audio Context dell'iPhone
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

// --- LOGICA DI INVIO ---
function elaboraArrivo(nome, tipo) {
    let rubrica = DB.get("rubrica");
    let u = rubrica.find(x => x.nome === nome);
    
    if (u) {
        let tel = u.tel.startsWith("39") ? u.tel : "39" + u.tel;
        let msg = `Ciao ${nome}, c'è un ${tipo} per te in portineria! 📦`;
        window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    let giacenza = DB.get("giacenza");
    giacenza.unshift({nome, tipo, data: new Date().toLocaleString('it-IT', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'})});
    DB.set("giacenza", giacenza);
    
    renderGiacenza();
    document.getElementById("search").value = "";
    document.getElementById("risultati").innerHTML = "";
    document.getElementById("manualNome").value = "";
}

// --- SCANNER OCR ---
async function startScanner() {
    initAudio();
    document.getElementById("cameraBox").style.display = "block";
    isScanning = true;

    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        const v = document.getElementById("video");
        v.srcObject = stream;
        v.play();

        // Inizializza Tesseract solo se serve
        if (!worker) {
            document.getElementById("status").innerText = "CARICAMENTO MOTORE OCR...";
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('ita');
            await worker.initialize('ita');
        }
        
        v.onloadedmetadata = () => setTimeout(scan, 1000);
    } catch (e) {
        alert("Errore camera: Assicurati di usare HTTPS e Safari.");
        stopScanner();
    }
}

function stopScanner() {
    isScanning = false;
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById("cameraBox").style.display = "none";
}

async function scan() {
    if (!isScanning) return;
    document.getElementById("status").innerText = "ANALISI IN CORSO...";
    
    const v = document.getElementById("video");
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    
    // Ritaglio centrato dell'immagine
    canvas.width = 640; canvas.height = 480;
    ctx.filter = 'grayscale(1) contrast(1.5)';
    ctx.drawImage(v, v.videoWidth*0.15, v.videoHeight*0.35, v.videoWidth*0.7, v.videoHeight*0.3, 0, 0, 640, 480);
    
    try {
        const { data: { text } } = await worker.recognize(canvas);
        const textUpper = text.toUpperCase();
        console.log("Letto:", textUpper);

        let rubrica = DB.get("rubrica");
        for (let u of rubrica) {
            let cognome = u.nome.split(" ").pop();
            if (cognome.length > 2 && textUpper.includes(cognome)) {
                beep();
                stopScanner();
                if (confirm("Trovato: " + u.nome + "?")) {
                    elaboraArrivo(u.nome, 'PACCO');
                }
                return;
            }
        }
    } catch (e) { console.error(e); }

    document.getElementById("status").innerText = "IN ATTESA...";
    if (isScanning) setTimeout(scan, 2000);
}

// --- UI & AMMINISTRAZIONE ---
function filtra() {
    let q = document.getElementById("search").value.toUpperCase();
    if (q.length < 2) { document.getElementById("risultati").innerHTML = ""; return; }
    let res = DB.get("rubrica").filter(x => x.nome.includes(q));
    document.getElementById("risultati").innerHTML = res.map(x => `
        <div class="item" onclick="elaboraArrivo('${x.nome}', 'PACCO')">${x.nome} ➔</div>
    `).join("");
}

function aggiungiManuale(tipo) {
    let n = document.getElementById("manualNome").value.toUpperCase().trim();
    if (!n) return;
    elaboraArrivo(n, tipo);
}

function renderGiacenza() {
    let g = DB.get("giacenza");
    document.getElementById("listaGiacenza").innerHTML = g.map((x, i) => `
        <div class="item">
            <span><b>${x.nome}</b> <span class="badge">${x.tipo}</span><br><small>${x.data}</small></span>
            <button class="btn-red" style="width:auto; padding:8px 15px" onclick="ritira(${i})">OK</button>
        </div>
    `).join("");
}

function ritira(i) {
    let g = DB.get("giacenza"); g.splice(i, 1); DB.set("giacenza", g); renderGiacenza();
}

function salvaContatto() {
    let n = document.getElementById("nome").value.toUpperCase().trim();
    let t = document.getElementById("tel").value.replace(/\D/g,'');
    if(!n || !t) return;
    let r = DB.get("rubrica"); r.push({nome: n, tel: t}); DB.set("rubrica", r);
    document.getElementById("nome").value=""; document.getElementById("tel").value="";
    renderRubricaAdmin();
}

function importaRubrica() {
    let text = document.getElementById("importa").value;
    let r = DB.get("rubrica");
    text.split("\n").forEach(line => {
        let parts = line.split(",");
        if(parts[0] && parts[1]) r.push({nome: parts[0].toUpperCase().trim(), tel: parts[1].trim()});
    });
    DB.set("rubrica", r); renderRubricaAdmin(); alert("Importati!");
}

function renderRubricaAdmin() {
    let r = DB.get("rubrica");
    document.getElementById("listaRubrica").innerHTML = r.map(x => `<div>${x.nome} (${x.tel})</div>`).join("");
}

function toggleAdmin() { document.getElementById("admin").classList.toggle("hidden"); renderRubricaAdmin(); }

function beep() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.value = 880; g.gain.value = 0.1;
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

window.onload = renderGiacenza;
</script>
</body>
</html>
