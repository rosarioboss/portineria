<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{font-family:Arial;margin:0;background:#f2f2f2;padding:10px}

.card{
background:white;
padding:14px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,.15)
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-weight:bold;
margin-top:6px
}

input{
width:100%;
padding:10px;
margin-top:6px
}

video{width:100%}

.green{color:green;font-weight:bold}
.yellow{color:orange;font-weight:bold}
.red{color:red;font-weight:bold}

canvas{
border:1px solid #ccc;
width:100%;
height:160px
}

</style>
</head>

<body>

<div class="card">
<h3>📊 Dashboard</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📦 Scanner Pacchi</h3>
<button onclick="startScanner('pacco')">Avvia scanner pacchi</button>
</div>

<div class="card">
<h3>📬 Scanner Raccomandate</h3>
<button onclick="startScanner('raccomandata')">Avvia scanner raccomandate</button>
</div>

<video id="video" autoplay></video>

<div class="card">
<h3>📦 Registra pacco manuale</h3>
<input id="nomePacco">
<input id="corriere">
<button onclick="registraPaccoManuale()">Registra</button>
</div>

<div class="card">
<h3>📬 Registra raccomandata manuale</h3>
<input id="nomeRacc">
<input id="numeroRacc">
<button onclick="registraRaccManuale()">Registra</button>
</div>

<div class="card">
<h3>📦 Pacchi</h3>
<input id="searchPacchi" placeholder="Cerca pacco" oninput="mostraPacchi()">
<div id="pacchi"></div>
</div>

<div class="card">
<h3>📬 Raccomandate</h3>
<div id="racc"></div>
</div>

<div class="card">
<h3>📜 Storico</h3>
<div id="storico"></div>
</div>

<div class="card">
<h3>👥 Rubrica</h3>
<button onclick="sbloccaRubrica()">Apri rubrica</button>

<div id="rubrica" style="display:none">

<input id="nome">
<input id="telefono">

<button onclick="aggiungiCondomino()">Aggiungi</button>

<div id="condomini"></div>

</div>
</div>

<div class="card">
<h3>✍ Firma ritiro</h3>
<canvas id="firma"></canvas>
<button onclick="pulisciFirma()">Pulisci</button>
</div>

<div class="card">
<h3>💾 Backup</h3>
<button onclick="backup()">Esporta dati</button>
<input type="file" onchange="restore(event)">
</div>

<script>

let tipoScanner="pacco"
let scannerAttivo=false
let streamCamera=null

function beep(){
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play()
}

async function startScanner(tipo){

tipoScanner=tipo
scannerAttivo=true

let video=document.getElementById("video")

streamCamera=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=streamCamera

scanLoop()

}

async function scanLoop(){

if(!scannerAttivo)return

let video=document.getElementById("video")

let canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

let ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

let result=await Tesseract.recognize(canvas,'ita')

let testo=result.data.text.toLowerCase()

trovaDestinatario(testo)

setTimeout(scanLoop,1000)

}

function stopScanner(){

scannerAttivo=false

if(streamCamera){
streamCamera.getTracks().forEach(track=>track.stop())
}

}

function trovaDestinatario(testo){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

for(let c of db){

let cognome=c.nome.toLowerCase().split(" ")[1]

if(!cognome)continue

if(testo.includes(cognome)){

beep()

stopScanner()

if(tipoScanner=="pacco"){

registraPaccoAuto(c.nome)

window.open("https://wa.me/"+c.telefono+"?text="+encodeURIComponent("Salve è arrivato un pacco per "+c.nome))

}else{

registraRaccAuto(c.nome)

window.open("https://wa.me/"+c.telefono+"?text="+encodeURIComponent("Salve è arrivata una raccomandata per "+c.nome))

}

return

}

}

}

function registraPaccoAuto(nome){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome:nome,data:new Date().toISOString()})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()
stats()

}

function registraRaccAuto(nome){

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]

racc.push({nome:nome})

localStorage.setItem("raccomandate",JSON.stringify(racc))

mostraRacc()
stats()

}

function registraPaccoManuale(){

let nome=document.getElementById("nomePacco").value
let corriere=document.getElementById("corriere").value

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({nome:nome,corriere:corriere,data:new Date().toISOString()})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()
stats()

}

function registraRaccManuale(){

let nome=document.getElementById("nomeRacc").value
let numero=document.getElementById("numeroRacc").value

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]

racc.push({nome:nome,numero:numero})

localStorage.setItem("raccomandate",JSON.stringify(racc))

mostraRacc()
stats()

}

function giacenza(data){

let giorni=(Date.now()-new Date(data))/86400000

if(giorni<3)return"green"
if(giorni<6)return"yellow"
return"red"

}

function mostraPacchi(){

let filtro=document.getElementById("searchPacchi").value.toLowerCase()

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

let div=document.getElementById("pacchi")

div.innerHTML=""

pacchi.forEach((p,i)=>{

if(!p.nome.toLowerCase().includes(filtro))return

let colore=giacenza(p.data)

div.innerHTML+=
"<div class='"+colore+"'>"+
p.nome+
"<button onclick='consegna("+i+")'>Consegnato</button>"+
"</div>"

})

}

function consegna(i){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]
let storico=JSON.parse(localStorage.getItem("storico"))||[]

storico.push(pacchi[i])

pacchi.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(pacchi))
localStorage.setItem("storico",JSON.stringify(storico))

mostraPacchi()
mostraStorico()
stats()

}

function mostraRacc(){

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]

let div=document.getElementById("racc")

div.innerHTML=""

racc.forEach(r=>{
div.innerHTML+=r.nome+"<br>"
})

}

function mostraStorico(){

let storico=JSON.parse(localStorage.getItem("storico"))||[]

let div=document.getElementById("storico")

div.innerHTML=""

storico.forEach(s=>{
div.innerHTML+=s.nome+"<br>"
})

}

function stats(){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]
let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]
let storico=JSON.parse(localStorage.getItem("storico"))||[]

document.getElementById("stats").innerHTML=
"Pacchi: "+pacchi.length+"<br>"+
"Raccomandate: "+racc.length+"<br>"+
"Consegnati: "+storico.length

}

function aggiungiCondomino(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({
nome:document.getElementById("nome").value,
telefono:document.getElementById("telefono").value
})

localStorage.setItem("condomini",JSON.stringify(db))

caricaCondomini()

}

function caricaCondomini(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

let div=document.getElementById("condomini")

div.innerHTML=""

db.forEach(c=>{
div.innerHTML+=c.nome+" "+c.telefono+"<br>"
})

}

function sbloccaRubrica(){

let pin=prompt("PIN")

if(pin=="1234"){
document.getElementById("rubrica").style.display="block"
caricaCondomini()
}

}

function backup(){

let data={
pacchi:localStorage.getItem("pacchi"),
raccomandate:localStorage.getItem("raccomandate"),
condomini:localStorage.getItem("condomini"),
storico:localStorage.getItem("storico")
}

let blob=new Blob([JSON.stringify(data)])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_portineria.json"

a.click()

}

function restore(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

for(let k in data){
localStorage.setItem(k,data[k])
}

mostraPacchi()
mostraRacc()
mostraStorico()
stats()

}

reader.readAsText(file)

}

let canvas=document.getElementById("firma")
let ctx=canvas.getContext("2d")
let draw=false

canvas.addEventListener("mousedown",()=>draw=true)
canvas.addEventListener("mouseup",()=>draw=false)
canvas.addEventListener("mousemove",e=>{

if(!draw)return

ctx.lineWidth=2
ctx.lineCap="round"

ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)

})

function pulisciFirma(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}

mostraPacchi()
mostraRacc()
mostraStorico()
stats()

</script>

</body>
</html>
