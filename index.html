<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portineria Digitale</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;padding:10px}
.dark{background:#1e1e1e;color:white}
.card{background:white;padding:14px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.dark .card{background:#2a2a2a}
button{width:100%;padding:12px;border:none;border-radius:8px;background:#25D366;color:white;font-weight:bold;margin-top:6px}
input{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;margin-top:6px}
.small{background:#555}
.delete{background:#e53935}
.riga{padding:8px;border-bottom:1px solid #eee}
img{width:100%;border-radius:8px;margin-top:6px}
canvas{border:1px solid #ccc;width:100%;height:160px}
</style>
</head>

<body>

<div class="card">
<h3>📊 Dashboard</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>📦 Registra pacco</h3>
<input id="nomePacco" placeholder="Nome condomino">
<input id="corriere" placeholder="Corriere">
<input type="file" accept="image/*" capture="environment" id="fotoPacco">
<button onclick="registraPacco()">Registra pacco</button>
</div>

<div class="card">
<h3>📦 Pacchi presenti</h3>
<input id="searchPacchi" placeholder="Cerca" oninput="mostraPacchi()">
<div id="listaPacchi"></div>
</div>

<div class="card">
<h3>📬 Raccomandate</h3>
<input id="nomeRacc" placeholder="Nome">
<input id="numeroRacc" placeholder="Numero raccomandata">
<button onclick="registraRacc()">Registra</button>
<div id="listaRacc"></div>
</div>

<div class="card">
<h3>👥 Rubrica Condomini</h3>
<input id="nome" placeholder="Nome">
<input id="telefono" placeholder="Telefono">
<input id="scala" placeholder="Scala">
<input id="interno" placeholder="Interno">
<button onclick="aggiungiCondomino()">Aggiungi</button>
<button class="small" onclick="sbloccaRubrica()">🔒 Sblocca rubrica</button>
<div id="listaCondomini" style="display:none"></div>
</div>

<div class="card">
<h3>✍ Firma ritiro</h3>
<canvas id="firma"></canvas>
<button onclick="pulisciFirma()">Pulisci</button>
</div>

<div class="card">
<h3>📜 Storico consegne</h3>
<button onclick="mostraStorico()">Apri storico</button>
<div id="storico"></div>
</div>

<div class="card">
<h3>📁 Backup dati</h3>
<button onclick="backup()">Esporta backup</button>
<input type="file" onchange="restore(event)">
</div>

<div class="card">
<button onclick="toggleNight()">🌙 Modalità notte</button>
</div>

<script>

const PIN="1234"

function oggi(){
return new Date().toISOString().slice(0,10)
}

function stats(){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]
let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]
let storico=JSON.parse(localStorage.getItem("storico"))||[]

let oggiCount=storico.filter(s=>s.data.slice(0,10)==oggi()).length

document.getElementById("stats").innerHTML=
"Pacchi presenti: "+pacchi.length+"<br>"+
"Raccomandate: "+racc.length+"<br>"+
"Consegnati oggi: "+oggiCount

}

function registraPacco(){

let nome=document.getElementById("nomePacco").value
let corriere=document.getElementById("corriere").value
let foto=document.getElementById("fotoPacco").files[0]

if(!nome) return alert("Inserisci nome")

let reader=new FileReader()

reader.onload=function(){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({
nome:nome,
corriere:corriere,
foto:reader.result,
data:new Date().toISOString(),
firma:firmaCanvas.toDataURL()
})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()
stats()

}

if(foto) reader.readAsDataURL(foto)

}

function mostraPacchi(){

let filtro=document.getElementById("searchPacchi").value.toLowerCase()
let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]
let div=document.getElementById("listaPacchi")

div.innerHTML=""

pacchi.forEach((p,i)=>{

if(!p.nome.toLowerCase().includes(filtro)) return

div.innerHTML+=`
<div class="riga">
<b>${p.nome}</b> - ${p.corriere}<br>
${new Date(p.data).toLocaleString()}
<img src="${p.foto}">
<button onclick="whatsapp('${p.nome}')">📲 Avvisa WhatsApp</button>
<button onclick="consegna(${i})">Consegnato</button>
<button class="delete" onclick="eliminaPacco(${i})">Elimina</button>
</div>`

})

}

function consegna(i){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]
let storico=JSON.parse(localStorage.getItem("storico"))||[]

storico.push(pacchi[i])
pacchi.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(pacchi))
localStorage.setItem("storico",JSON.stringify(storico))

mostraPacchi()
stats()

}

function eliminaPacco(i){

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]
pacchi.splice(i,1)
localStorage.setItem("pacchi",JSON.stringify(pacchi))
mostraPacchi()
stats()

}

function whatsapp(nome){

let db=JSON.parse(localStorage.getItem("condomini"))||[]
let c=db.find(x=>x.nome.toLowerCase()==nome.toLowerCase())

if(!c) return alert("Telefono non trovato")

let msg="Portineria: è arrivato un pacco per te."

window.open("https://wa.me/"+c.telefono+"?text="+encodeURIComponent(msg))

}

function registraRacc(){

let nome=document.getElementById("nomeRacc").value
let numero=document.getElementById("numeroRacc").value

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]

racc.push({
nome:nome,
numero:numero,
data:new Date().toISOString()
})

localStorage.setItem("raccomandate",JSON.stringify(racc))

mostraRacc()
stats()

}

function mostraRacc(){

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]
let div=document.getElementById("listaRacc")

div.innerHTML=""

racc.forEach((r,i)=>{

div.innerHTML+=`
<div class="riga">
<b>${r.nome}</b><br>
Raccomandata: ${r.numero}
<button onclick="ritiraR(${i})">Ritirata</button>
</div>`

})

}

function ritiraR(i){

let racc=JSON.parse(localStorage.getItem("raccomandate"))||[]
let storico=JSON.parse(localStorage.getItem("storico"))||[]

storico.push(racc[i])
racc.splice(i,1)

localStorage.setItem("raccomandate",JSON.stringify(racc))
localStorage.setItem("storico",JSON.stringify(storico))

mostraRacc()
stats()

}

function aggiungiCondomino(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]

db.push({
nome:document.getElementById("nome").value,
telefono:document.getElementById("telefono").value,
scala:document.getElementById("scala").value,
interno:document.getElementById("interno").value
})

localStorage.setItem("condomini",JSON.stringify(db))

caricaCondomini()

}

function sbloccaRubrica(){

let p=prompt("PIN")

if(p==PIN){

document.getElementById("listaCondomini").style.display="block"
caricaCondomini()

}

}

function caricaCondomini(){

let db=JSON.parse(localStorage.getItem("condomini"))||[]
let div=document.getElementById("listaCondomini")

div.innerHTML=""

db.forEach((c,i)=>{

div.innerHTML+=`
<div class="riga">
${c.nome} - scala ${c.scala} interno ${c.interno}
<button class="delete" onclick="eliminaCondomino(${i})">Elimina</button>
</div>`

})

}

function eliminaCondomino(i){

let db=JSON.parse(localStorage.getItem("condomini"))||[]
db.splice(i,1)
localStorage.setItem("condomini",JSON.stringify(db))
caricaCondomini()

}

function mostraStorico(){

let storico=JSON.parse(localStorage.getItem("storico"))||[]
let div=document.getElementById("storico")

div.innerHTML=""

storico.forEach(s=>{

div.innerHTML+=`
<div class="riga">
${s.nome} - ${s.corriere||""}<br>
${new Date(s.data).toLocaleString()}
</div>`

})

}

function backup(){

let data={
condomini:localStorage.getItem("condomini"),
pacchi:localStorage.getItem("pacchi"),
raccomandate:localStorage.getItem("raccomandate"),
storico:localStorage.getItem("storico")
}

let blob=new Blob([JSON.stringify(data)],{type:"application/json"})
let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="backup_portineria.json"
a.click()

}

function restore(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

for(let k in data){
localStorage.setItem(k,data[k])
}

mostraPacchi()
mostraRacc()
stats()

}

reader.readAsText(file)

}

function toggleNight(){
document.body.classList.toggle("dark")
}

/* FIRMA */

let firmaCanvas=document.getElementById("firma")
let ctx=firmaCanvas.getContext("2d")

firmaCanvas.width=firmaCanvas.offsetWidth
firmaCanvas.height=firmaCanvas.offsetHeight

let draw=false

firmaCanvas.addEventListener("mousedown",()=>draw=true)
firmaCanvas.addEventListener("mouseup",()=>draw=false)
firmaCanvas.addEventListener("mousemove",drawFirma)

firmaCanvas.addEventListener("touchstart",()=>draw=true)
firmaCanvas.addEventListener("touchend",()=>draw=false)
firmaCanvas.addEventListener("touchmove",drawFirmaTouch)

function drawFirma(e){

if(!draw) return

ctx.lineWidth=2
ctx.lineCap="round"

ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)

}

function drawFirmaTouch(e){

if(!draw) return

let rect=firmaCanvas.getBoundingClientRect()
let x=e.touches[0].clientX-rect.left
let y=e.touches[0].clientY-rect.top

ctx.lineWidth=2
ctx.lineCap="round"

ctx.lineTo(x,y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y)

}

function pulisciFirma(){
ctx.clearRect(0,0,firmaCanvas.width,firmaCanvas.height)
}

stats()
mostraPacchi()
mostraRacc()

</script>

</body>
</html>
