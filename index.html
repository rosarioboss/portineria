<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#075e54;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:5px;
}

.btn-add{background:#3498db;color:white;}
.btn-wa{background:#25d366;color:white;}
.btn-mass{background:#e67e22;color:white;}
.btn-rac{background:#9b59b6;color:white;}

.riga{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
border-bottom:1px solid #eee;
}

.verde{background:#b9f6ca}
.giallo{background:#fff59d}
.rosso{background:#ff8a80}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>👥 Condomini</h2>

<input id="nome" placeholder="Nome o interno">
<input id="telefono" placeholder="Telefono">

<select id="scala">
<option value="A">Scala A</option>
<option value="B">Scala B</option>
<option value="C">Scala C</option>
</select>

<button class="btn-add" onclick="aggiungi()">Salva condomino</button>

<h3>Importa condomini</h3>

<input type="file" onchange="importaFile(event)">

<button onclick="backup()">Scarica backup</button>

<h3>Cerca condomino</h3>

<input id="cerca" placeholder="Scrivi 2 lettere..." onkeyup="cercaCondomino()">

<div id="risultatiRicerca"></div>

<div id="lista"></div>

</div>

<div class="card">

<h2>📦 Pacchi</h2>

<select id="rubrica"></select>

<button class="btn-wa" onclick="inviaPacco()">Avviso pacco</button>

<button class="btn-rac" onclick="inviaRac()">Raccomandata</button>

<button class="btn-add" onclick="scansionaEtichetta()">📷 Scansiona etichetta</button>

<video id="camera" autoplay playsinline style="width:100%;display:none;"></video>

<canvas id="canvas" style="display:none;"></canvas>

<h3 id="contatore"></h3>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h2>📢 Avviso a tutti</h2>

<textarea id="msg" placeholder="Scrivi avviso..."></textarea>

<div id="invioMassivo"></div>

</div>

<div class="card">

<h2>🏢 Avviso per scala</h2>

<select id="scalaAvviso">
<option value="A">Scala A</option>
<option value="B">Scala B</option>
<option value="C">Scala C</option>
</select>

<textarea id="msgScala"></textarea>

<button class="btn-mass" onclick="avvisoScala()">Invia</button>

</div>

</div>

<script>

function carica(){

let db=JSON.parse(localStorage.getItem("portineria"))||[]

let lista=document.getElementById("lista")
let rubrica=document.getElementById("rubrica")
let mass=document.getElementById("invioMassivo")

lista.innerHTML=""
rubrica.innerHTML=""
mass.innerHTML=""

db.forEach(c=>{

lista.innerHTML+=`
<div class="riga">
${c.nome} (Scala ${c.scala})
<button onclick="elimina(${c.id})">X</button>
</div>
`

rubrica.innerHTML+=`<option value="${c.tel}">${c.nome}</option>`

mass.innerHTML+=`
<div class="riga">
${c.nome}
<button onclick="inviaMassivo('${c.tel}')">Invia</button>
</div>
`

})

}

function aggiungi(){

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value
let scala=document.getElementById("scala").value

if(!nome||!tel)return

let db=JSON.parse(localStorage.getItem("portineria"))||[]

db.push({
id:Date.now(),
nome:nome,
tel:tel,
scala:scala
})

localStorage.setItem("portineria",JSON.stringify(db))

document.getElementById("nome").value=""
document.getElementById("telefono").value=""

carica()

}

function elimina(id){

if(!confirm("Cancellare condomino?"))return

let db=JSON.parse(localStorage.getItem("portineria"))||[]

db=db.filter(c=>c.id!==id)

localStorage.setItem("portineria",JSON.stringify(db))

carica()

}

function importaFile(event){

let file=event.target.files[0]

let reader=new FileReader()

reader.onload=function(e){

try{

let dati=JSON.parse(e.target.result)

if(dati.condomini){
localStorage.setItem("portineria",JSON.stringify(dati.condomini))
}

if(dati.pacchi){
localStorage.setItem("pacchi",JSON.stringify(dati.pacchi))
}

alert("Importazione completata")

carica()
mostraPacchi()

}catch{
alert("File non valido")
}

}

reader.readAsText(file)

}

function backup(){

let data=localStorage.getItem("portineria")

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_condomini.json"

a.click()

}

function cercaCondomino(){

let testo=document.getElementById("cerca").value.toLowerCase()

let db=JSON.parse(localStorage.getItem("portineria"))||[]

let risultati=document.getElementById("risultatiRicerca")

risultati.innerHTML=""

if(testo.length<2)return

db.forEach(c=>{

if(c.nome.toLowerCase().includes(testo)){

let div=document.createElement("div")

div.className="riga"

div.innerHTML=c.nome

div.onclick=()=>{

document.getElementById("rubrica").value=c.tel

}

risultati.appendChild(div)

}

})

}

function inviaPacco(){

let sel=document.getElementById("rubrica")

let tel=sel.value

let nome=sel.options[sel.selectedIndex].text

let msg="Buongiorno, è arrivato un pacco per "+nome+" in portineria."

let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

pacchi.push({
nome:nome,
data:new Date().toISOString()
})

localStorage.setItem("pacchi",JSON.stringify(pacchi))

mostraPacchi()

window.location.href="https://wa.me/"+tel+"?text="+encodeURIComponent(msg)

}

function inviaRac(){

let sel=document.getElementById("rubrica")

let tel=sel.value

let nome=sel.options[sel.selectedIndex].text

let msg="Buongiorno, è arrivata una raccomandata per "+nome+" in portineria."

window.location.href="https://wa.me/"+tel+"?text="+encodeURIComponent(msg)

}

function mostraPacchi(){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

lista.sort((a,b)=>new Date(a.data)-new Date(b.data))

let div=document.getElementById("listaPacchi")

div.innerHTML=""

lista.forEach((p,i)=>{

let data=new Date(p.data)

let giorni=Math.floor((new Date()-data)/(1000*60*60*24))

let riga=document.createElement("div")

riga.className="riga"

riga.innerHTML=p.nome+" <button onclick='ritirato("+i+")'>Ritirato</button>"

if(giorni==0)riga.classList.add("verde")
else if(giorni<=3)riga.classList.add("giallo")
else riga.classList.add("rosso")

div.appendChild(riga)

})

}

function ritirato(i){

let lista=JSON.parse(localStorage.getItem("pacchi"))||[]

lista.splice(i,1)

localStorage.setItem("pacchi",JSON.stringify(lista))

mostraPacchi()

}

function inviaMassivo(tel){

let msg=document.getElementById("msg").value

if(!msg)return

window.location.href="https://wa.me/"+tel+"?text="+encodeURIComponent(msg)

}

function avvisoScala(){

let scala=document.getElementById("scalaAvviso").value
let msg=document.getElementById("msgScala").value

let db=JSON.parse(localStorage.getItem("portineria"))||[]

db.forEach(c=>{

if(c.scala===scala){

window.open("https://wa.me/"+c.tel+"?text="+encodeURIComponent(msg))

}

})

}

async function scansionaEtichetta(){

try{

let video=document.getElementById("camera")

video.style.display="block"

let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

video.srcObject=stream

video.setAttribute("playsinline",true)

await video.play()

setTimeout(catturaFoto,2500)

}catch{

alert("Fotocamera non disponibile")

}

}

function catturaFoto(){

let video=document.getElementById("camera")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let stream=video.srcObject
if(stream)stream.getTracks().forEach(t=>t.stop())

video.style.display="none"

let img=canvas.toDataURL("image/png")

leggiTesto(img)

}

async function leggiTesto(img){

let result=await Tesseract.recognize(img,"ita")

let testo=result.data.text.toLowerCase()

trovaCondomino(testo)

}

function trovaCondomino(testo){

let db=JSON.parse(localStorage.getItem("portineria"))||[]

let trovato=db.find(c=>testo.includes(c.nome.toLowerCase()))

if(trovato){

let msg="Buongiorno, è arrivato un pacco per "+trovato.nome+" in portineria."

window.open("https://wa.me/"+trovato.tel+"?text="+encodeURIComponent(msg))

}else{

alert("Condomino non trovato")

}

}

window.onload=function(){

carica()
mostraPacchi()

}

</script>

</body>

</html>
