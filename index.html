<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portineria Digitale</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#075e54;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:5px;
}

.btn-add{background:#3498db;color:white;}
.btn-wa{background:#25d366;color:white;}
.btn-mass{background:#e67e22;color:white;}
.btn-rac{background:#9b59b6;color:white;}

.riga{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
border-bottom:1px solid #eee;
}

.verde{background:#b9f6ca}
.giallo{background:#fff59d}
.rosso{background:#ff8a80}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>📦 Nuovo pacco</h2>

<select id="rubrica"></select>

<button class="btn-wa" onclick="inviaPacco()">Avviso pacco</button>

<button class="btn-rac" onclick="inviaRac()">Raccomandata</button>

<button class="btn-add" onclick="scansionaEtichetta()">📷 Scansiona etichetta</button>

<video id="camera" autoplay playsinline style="width:100%;display:none;"></video>

<button id="scattaBtn" onclick="catturaFoto()" style="display:none;">
📸 Scatta foto etichetta
</button>

<canvas id="canvas" style="display:none;"></canvas>

</div>

<div class="card">

<h2>📦 Pacchi in giacenza</h2>

<div id="listaPacchi"></div>

</div>

<div class="card">

<h2>📢 Avviso a tutti</h2>

<textarea id="msg"></textarea>

<div id="invioMassivo"></div>

</div>

<div class="card">

<h2>🏢 Avviso per scala</h2>

<select id="scalaAvviso">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<textarea id="msgScala"></textarea>

<button class="btn-mass" onclick="avvisoScala()">Invia</button>

</div>

<div class="card">

<h2>👥 Gestione condomini</h2>

<input id="cerca" placeholder="Cerca condomino..." onkeyup="cercaCondomino()">

<div id="risultatiRicerca"></div>

<button onclick="toggleCondomini()">Mostra / Nascondi condomini</button>

<div id="lista" style="display:none;"></div>

<h3>Aggiungi condomino</h3>

<input id="nome" placeholder="Nome">
<input id="telefono" placeholder="Telefono">

<select id="scala">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<button onclick="aggiungi()">Salva condomino</button>

<input type="file" onchange="importaFile(event)">

<button onclick="backup()">Scarica backup</button>

</div>

</div>

<script>

const BIN="69b4356999b15f1d78363448"

const KEY="$2a$10$MSOOYNTStKR/vC9S87mPo.Kg6g35ImWKUEIO60Hxl6Qj9zUAeujoK"

async function caricaDB(){

let r=await fetch("https://api.jsonbin.io/v3/b/"+BIN+"/latest",{headers:{"X-Master-Key":KEY}})

let d=await r.json()

return d.record

}

async function salvaDB(data){

await fetch("https://api.jsonbin.io/v3/b/"+BIN,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":KEY
},
body:JSON.stringify(data)
})

}

async function carica(){

let db=await caricaDB()

let rubrica=document.getElementById("rubrica")

rubrica.innerHTML=""

db.condomini.forEach(c=>{
rubrica.innerHTML+=`<option value="${c.tel}">${c.nome}</option>`
})

mostraPacchi(db.pacchi)

caricaLista(db.condomini)

}

function caricaLista(db){

let lista=document.getElementById("lista")

lista.innerHTML=""

db.forEach(c=>{
lista.innerHTML+=`<div class="riga">${c.nome} (${c.scala})</div>`
})

}

function toggleCondomini(){

let lista=document.getElementById("lista")

lista.style.display=(lista.style.display==="none")?"block":"none"

}

function mostraPacchi(lista){

let div=document.getElementById("listaPacchi")

div.innerHTML=""

lista.forEach((p,i)=>{

let giorni=Math.floor((Date.now()-new Date(p.data))/(1000*60*60*24))

let r=document.createElement("div")

r.className="riga"

r.innerHTML=p.nome+" <button onclick='ritirato("+i+")'>Ritirato</button>"

if(giorni==0)r.classList.add("verde")
else if(giorni<=3)r.classList.add("giallo")
else r.classList.add("rosso")

div.appendChild(r)

})

}

async function inviaPacco(){

let db=await caricaDB()

let sel=document.getElementById("rubrica")

let tel=sel.value

let nome=sel.options[sel.selectedIndex].text

db.pacchi.push({nome:nome,data:new Date().toISOString()})

await salvaDB(db)

carica()

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent("È arrivato un pacco per "+nome))

}

async function ritirato(i){

let db=await caricaDB()

db.pacchi.splice(i,1)

await salvaDB(db)

carica()

}

async function aggiungi(){

let db=await caricaDB()

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value
let scala=document.getElementById("scala").value

db.condomini.push({nome:nome,tel:tel,scala:scala})

await salvaDB(db)

carica()

}

async function importaFile(event){

let file = event.target.files[0]

if(!file) return

let reader = new FileReader()

reader.onload = async function(e){

let dati = JSON.parse(e.target.result)

let db = await caricaDB()

if(Array.isArray(dati)){
db.condomini = dati
}

if(dati.condomini){
db.condomini = dati.condomini
}

await salvaDB(db)

alert("Rubrica importata")

carica()

}

reader.readAsText(file)

}

function cercaCondomino(){

let testo=document.getElementById("cerca").value.toLowerCase()

let righe=document.querySelectorAll("#lista .riga")

righe.forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(testo)?"flex":"none"
})

}

function backup(){

let data=localStorage.getItem("portineria")

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_condomini.json"

a.click()

}

async function scansionaEtichetta(){

let video=document.getElementById("camera")
let btn=document.getElementById("scattaBtn")

video.style.display="block"
btn.style.display="block"

let stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

video.srcObject=stream

}

function catturaFoto(){

let video=document.getElementById("camera")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let w=video.videoWidth
let h=video.videoHeight

let cw=w*0.7
let ch=h*0.3

let x=(w-cw)/2
let y=(h-ch)/2

canvas.width=cw
canvas.height=ch

ctx.drawImage(video,x,y,cw,ch,0,0,cw,ch)

video.srcObject.getTracks().forEach(t=>t.stop())

video.style.display="none"
document.getElementById("scattaBtn").style.display="none"

let img=canvas.toDataURL()

leggiTesto(img)

}

async function leggiTesto(img){

let r=await Tesseract.recognize(img,"ita")

trovaCondomino(r.data.text)

}

async function trovaCondomino(testo){

let db=await caricaDB()

testo=testo.toLowerCase()

testo=testo.replace(/0/g,"o")
testo=testo.replace(/5/g,"s")

let trovato=null

db.condomini.forEach(c=>{

let n=c.nome.toLowerCase()

let parti=n.split(" ")

let nome=parti[0]
let cognome=parti[parti.length-1]

if(
testo.includes(nome)||
testo.includes(cognome)||
testo.includes(nome.substring(0,3))||
testo.includes(cognome.substring(0,3))
){

trovato=c

}

})

if(trovato){

let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

audio.play()

window.open("https://wa.me/"+trovato.tel+"?text="+encodeURIComponent("È arrivato un pacco per "+trovato.nome))

}else{

alert("Condomino non trovato")

}

}

window.onload=carica

</script>

</body>
</html>
