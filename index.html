<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Portineria Digitale PRO</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:-apple-system,Arial;
background:#f2f2f7;
padding:15px
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.05)
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
font-weight:bold;
margin-top:10px
}

.btn-red{background:#ff3b30}
.btn-green{background:#34c759}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd
}

.item{
padding:10px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between
}

#cameraBox{
display:none;
position:relative
}

#scanBox{
position:absolute;
border:3px solid #00ff88;
width:65%;
height:35%;
top:32%;
left:18%;
border-radius:12px
}

</style>

</head>

<body>

<h2>Portineria Digitale PRO</h2>

<div class="card">

<button onclick="startCamera()">Scanner pacco</button>

<div id="cameraBox">

<video id="video" autoplay playsinline style="width:100%"></video>

<div id="scanBox"></div>

<button class="btn-red" onclick="stopCamera()">Chiudi scanner</button>

</div>

<input id="nomePacco" placeholder="Destinatario">

<button class="btn-green" onclick="salvaPacco()">Registra pacco</button>

</div>

<div class="card">

<h3>Pacchi</h3>

<input id="searchPacchi" placeholder="Cerca..." oninput="filtraPacchi()">

<div id="listaPacchi"></div>

</div>

<div class="card">

<h3>Raccomandate</h3>

<input id="nomeRacc" placeholder="Destinatario">

<button onclick="salvaRacc()">Registra</button>

<div id="listaRacc"></div>

</div>

<div class="card">

<h3>Rubrica</h3>

<input id="nomeManuale" placeholder="Nome">
<input id="telManuale" placeholder="Telefono">

<button onclick="aggiungiManuale()">Aggiungi residente</button>

<textarea id="inputRubrica" placeholder="Mario Rossi,333123456"></textarea>

<button onclick="importaRubrica()">Importa lista</button>

<input id="searchRubrica" placeholder="Cerca residente..." oninput="filtraRubrica()">

<div id="listaRubrica"></div>

</div>

<script> 
  const DB={
get:k=>JSON.parse(localStorage.getItem(k))||[],
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

let stream=null

window.onload=render

function render(){
renderPacchi()
renderRubrica()
renderRacc()
}

function salvaPacco(){

let nome=document.getElementById("nomePacco").value.trim()

if(!nome){
alert("Inserisci destinatario")
return
}

let pacchi=DB.get("pacchi")

pacchi.unshift({
id:Date.now(),
nome:nome
})

DB.set("pacchi",pacchi)

document.getElementById("nomePacco").value=""

render()

inviaWA(nome)

}

function renderPacchi(){

let pacchi=DB.get("pacchi")

let div=document.getElementById("listaPacchi")

div.innerHTML=pacchi.length?

pacchi.map(p=>`

<div class="item">

<span>${p.nome}</span>

<button onclick="ritira(${p.id})">Ritirato</button>

</div>

`).join("")

:"Nessun pacco"

}

function ritira(id){

let pacchi=DB.get("pacchi")

pacchi=pacchi.filter(p=>p.id!=id)

DB.set("pacchi",pacchi)

render()

}

function filtraPacchi(){

let f=document.getElementById("searchPacchi").value.toLowerCase()

document.querySelectorAll("#listaPacchi .item").forEach(i=>{

i.style.display=i.innerText.toLowerCase().includes(f)?"flex":"none"

})

} 
  function inviaWA(nome){

let rubrica=DB.get("rubrica")

let c=rubrica.find(x=>x.nome.toLowerCase()==nome.toLowerCase())

if(c && c.tel){

let tel=c.tel.startsWith("39")?c.tel:"39"+c.tel

window.open(
"https://wa.me/"+tel+
"?text="+encodeURIComponent("Ciao "+c.nome+", è arrivato un pacco per te 📦")
)

}

}

async function startCamera(){

document.getElementById("cameraBox").style.display="block"

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

const video=document.getElementById("video")

video.srcObject=stream

video.onloadedmetadata=()=>scan()

}

async function scan(){

if(!stream)return

const video=document.getElementById("video")

if(video.videoWidth===0){
setTimeout(scan,1000)
return
}

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

canvas.getContext("2d").drawImage(video,0,0)

const img=canvas.toDataURL("image/png")

const result=await Tesseract.recognize(img,"ita")

const text=result.data.text.toLowerCase()

const rubrica=DB.get("rubrica")

rubrica.forEach(u=>{

if(text.includes(u.nome.toLowerCase())){

document.getElementById("nomePacco").value=u.nome

inviaWA(u.nome)

stopCamera()

}

})

setTimeout(scan,2500)

}

function stopCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
stream=null
}

document.getElementById("cameraBox").style.display="none"

}

function aggiungiManuale(){

let nome=document.getElementById("nomeManuale").value.trim()
let tel=document.getElementById("telManuale").value.trim()

if(!nome)return

let r=DB.get("rubrica")

if(!r.some(x=>x.nome.toLowerCase()==nome.toLowerCase())){
r.push({nome,tel})
}

DB.set("rubrica",r)

document.getElementById("nomeManuale").value=""
document.getElementById("telManuale").value=""

renderRubrica()

}

function importaRubrica(){

let testo=document.getElementById("inputRubrica").value.trim()

if(!testo)return

let r=DB.get("rubrica")

testo.split("\n").forEach(l=>{

let p=l.split(",")

if(p[0]){
r.push({nome:p[0].trim(),tel:p[1]?p[1].trim():""})
}

})

DB.set("rubrica",r)

renderRubrica()

}

function renderRubrica(){

let r=DB.get("rubrica")

let div=document.getElementById("listaRubrica")

div.innerHTML=r.length?

r.map(x=>`
<div class="item">
<span>${x.nome} (${x.tel||""})</span>
</div>
`).join("")

:"Rubrica vuota"

}

function filtraRubrica(){

let f=document.getElementById("searchRubrica").value.toLowerCase()

document.querySelectorAll("#listaRubrica .item").forEach(i=>{
i.style.display=i.innerText.toLowerCase().includes(f)?"flex":"none"
})

}

function salvaRacc(){

let nome=document.getElementById("nomeRacc").value.trim()

if(!nome)return

let r=DB.get("raccomandate")||[]

r.unshift({nome})

DB.set("raccomandate",r)

renderRacc()

}

function renderRacc(){

let r=DB.get("raccomandate")

let div=document.getElementById("listaRacc")

div.innerHTML=r.length?

r.map(x=>`<div class="item">${x.nome}</div>`).join("")

:"Nessuna raccomandata"

}

</script>

</body>
</html>
