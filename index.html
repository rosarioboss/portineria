<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<title>Portineria PRO</title>

<style>
body{font-family:-apple-system,sans-serif;background:#f2f2f7;margin:0;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
h2{margin:0 0 10px;font-size:18px}
input{width:100%;padding:15px;font-size:18px;border-radius:10px;border:1px solid #ccc}

.suggerimento{padding:15px;border-bottom:1px solid #eee;font-weight:bold;color:#007aff}

.btn-container{display:flex;gap:10px;margin-top:10px}
.btn{flex:1;padding:18px;border:none;border-radius:12px;color:#fff;font-weight:bold;cursor:pointer}
.btn-pacco{background:#007aff}
.btn-rac{background:#5856d6}
.btn-ritiro{background:#ff3b30;padding:10px;font-size:12px;flex:none}

.item{padding:12px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.hidden{display:none}
</style>

</head>

<body>

<div class="card">
<h2>📦 Cerca Condomino</h2>
<input id="cercaInput" placeholder="Scrivi cognome..." oninput="cerca()">
<div id="risultati"></div>
</div>

<div id="azioni" class="card hidden">
<h2 id="nomeSel"></h2>
<div class="btn-container">
<button class="btn btn-pacco" onclick="avvisa('PACCO')">PACCO</button>
<button class="btn btn-rac" onclick="avvisa('RACCOMANDATA')">RACCOMANDATA</button>
</div>
</div>

<div class="card">
<h2>📥 Giacenza</h2>
<div id="lista"></div>
</div>

<button onclick="admin()" style="width:100%;background:none;border:none;color:gray;padding:20px">
⚙️ Rubrica
</button>

<div id="admin" class="card hidden">
<input id="nome" placeholder="Nome Cognome">
<input id="tel" placeholder="Telefono">
<button class="btn btn-pacco" style="width:100%" onclick="salva()">SALVA</button>
</div>

<div class="card">
<button class="btn btn-pacco" style="width:100%;margin-bottom:10px" onclick="backup()">📤 Backup</button>
<input type="file" id="file" style="display:none" onchange="restore(event)">
<button class="btn btn-rac" style="width:100%;margin-bottom:10px" onclick="file.click()">📥 Ripristina</button>
<button class="btn btn-ritiro" style="width:100%;background:#000" onclick="reset()">🗑️ Reset</button>
</div>

<script>
const DB={
get:k=>JSON.parse(localStorage.getItem(k))||[],
set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
}

let attuale=null

function cerca(){
let q=cercaInput.value.toUpperCase()
if(!q)return risultati.innerHTML=""
let r=DB.get("rubrica").filter(x=>x.nome.toUpperCase().includes(q)).sort((a,b)=>a.nome.localeCompare(b.nome))
risultati.innerHTML=r.map(x=>`<div class="suggerimento" onclick="sel(\`${x.nome}\`,\`${x.tel}\`)">${x.nome}</div>`).join("")
}

function sel(n,t){
attuale={n,t}
nomeSel.innerText=n
azioni.classList.remove("hidden")
risultati.innerHTML=""
cercaInput.value=""
}

function avvisa(tipo){
if(!attuale)return
let tel=attuale.t.replace(/\D/g,'')
let p=tel.startsWith("39")?"":"39"
let msg=`Buongiorno ${attuale.n}, è arrivato un ${tipo} per te.`
window.open(`https://wa.me/${p}${tel}?text=${encodeURIComponent(msg)}`)
let g=DB.get("giacenza")
g.unshift({n:attuale.n,tipo,data:new Date().toLocaleDateString('it-IT')})
DB.set("giacenza",g)
attuale=null
azioni.classList.add("hidden")
render()
}

function render(){
let g=DB.get("giacenza")
lista.innerHTML=g.map((x,i)=>`
<div class="item">
<div><b>${x.n}</b><br>${x.tipo} - ${x.data}</div>
<button class="btn btn-ritiro" onclick="ritira(${i})">OK</button>
</div>`).join("")||"Vuoto"
}

function ritira(i){
let g=DB.get("giacenza")
g.splice(i,1)
DB.set("giacenza",g)
render()
}

function salva(){
let n=nome.value.toUpperCase().trim()
let t=tel.value.trim()
if(!n||!t)return alert("Dati mancanti")
if(!/^\d{9,}$/.test(t))return alert("Numero non valido")
let r=DB.get("rubrica")
if(r.some(x=>x.nome===n))return alert("Già esiste")
r.push({nome:n,tel:t})
DB.set("rubrica",r)
nome.value=""
tel.value=""
alert("Salvato")
}

function admin(){
document.getElementById("admin").classList.toggle("hidden")
}

function backup(){
let data={rubrica:DB.get("rubrica"),giacenza:DB.get("giacenza")}
let b=new Blob([JSON.stringify(data)],{type:"application/json"})
let a=document.createElement("a")
a.href=URL.createObjectURL(b)
a.download="backup.json"
a.click()
}

function restore(e){
let f=e.target.files[0]
let r=new FileReader()
r.onload=x=>{
let d=JSON.parse(x.target.result)
DB.set("rubrica",d.rubrica||[])
DB.set("giacenza",d.giacenza||[])
render()
alert("Ripristinato")
}
r.readAsText(f)
}

function reset(){
if(confirm("Cancello tutto?")){
localStorage.clear()
render()
}
}

window.onload=render
</script>

</body>
</html>
