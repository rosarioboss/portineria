<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portineria Digitale</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#075e54;
}

input,select,textarea{

width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:5px;

}

.btn-add{background:#3498db;color:white;}
.btn-wa{background:#25d366;color:white;}
.btn-mass{background:#e67e22;color:white;}
.btn-rac{background:#9b59b6;color:white;}

.riga{

display:flex;
justify-content:space-between;
align-items:center;
padding:6px 0;
border-bottom:1px solid #eee;

}

.btn-mini{

background:#25d366;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>👥 Aggiungi condomino</h2>

<input id="nome" placeholder="Nome o interno">

<input id="telefono" placeholder="Telefono 3933...">

<select id="scala">

<option value="A">Scala A</option>
<option value="B">Scala B</option>
<option value="C">Scala C</option>

</select>

<button class="btn-add" onclick="aggiungi()">Salva</button>

<div id="lista"></div>

</div>

<div class="card">

<h2>📦 Pacchi</h2>

<select id="rubrica"></select>

<button class="btn-wa" onclick="inviaPacco()">Avviso pacco</button>

<button class="btn-rac" onclick="inviaRac()">Raccomandata</button>

</div>

<div class="card">

<h2>📢 Avviso a tutti</h2>

<textarea id="msg" placeholder="Scrivi avviso..."></textarea>

<div id="invioMassivo"></div>

</div>

<div class="card">

<h2>🏢 Avviso per scala</h2>

<select id="scalaAvviso">

<option value="A">Scala A</option>
<option value="B">Scala B</option>
<option value="C">Scala C</option>

</select>

<textarea id="msgScala" placeholder="Messaggio scala"></textarea>

<button class="btn-mass" onclick="avvisoScala()">Invia avviso scala</button>

</div>

</div>

<script>

function carica(){

let db = JSON.parse(localStorage.getItem("portineria")) || []

let lista=document.getElementById("lista")
let rubrica=document.getElementById("rubrica")
let mass=document.getElementById("invioMassivo")

lista.innerHTML=""
rubrica.innerHTML=""
mass.innerHTML=""

db.forEach(c=>{

lista.innerHTML+=`
<div class="riga">
${c.nome} (Scala ${c.scala})
<button onclick="elimina(${c.id})">X</button>
</div>
`

rubrica.innerHTML+=`<option value="${c.tel}">${c.nome}</option>`

mass.innerHTML+=`
<div class="riga">
${c.nome}
<button class="btn-mini" onclick="inviaMassivo('${c.tel}')">Invia</button>
</div>
`

})

}

function aggiungi(){

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value
let scala=document.getElementById("scala").value

if(!nome||!tel) return

let db=JSON.parse(localStorage.getItem("portineria"))||[]

db.push({

id:Date.now(),
nome:nome,
tel:tel,
scala:scala

})

localStorage.setItem("portineria",JSON.stringify(db))

document.getElementById("nome").value=""
document.getElementById("telefono").value=""

carica()

}

function elimina(id){

let db=JSON.parse(localStorage.getItem("portineria"))||[]

db=db.filter(c=>c.id!==id)

localStorage.setItem("portineria",JSON.stringify(db))

carica()

}

function inviaPacco(){

let sel=document.getElementById("rubrica")
let tel=sel.value
let nome=sel.options[sel.selectedIndex].text

let msg="Buongiorno, è arrivato un pacco per "+nome+" in portineria."

window.location.href="https://wa.me/"+tel+"?text="+encodeURIComponent(msg)

}

function inviaRac(){

let sel=document.getElementById("rubrica")
let tel=sel.value
let nome=sel.options[sel.selectedIndex].text

let msg="Buongiorno, è arrivata una raccomandata per "+nome+" in portineria."

window.location.href="https://wa.me/"+tel+"?text="+encodeURIComponent(msg)

}

function inviaMassivo(tel){

let msg=document.getElementById("msg").value

if(!msg) return alert("Scrivi il messaggio")

window.location.href="https://wa.me/"+tel+"?text="+encodeURIComponent(msg)

}

function avvisoScala(){

let scala=document.getElementById("scalaAvviso").value
let msg=document.getElementById("msgScala").value

let db=JSON.parse(localStorage.getItem("portineria"))||[]

db.forEach(c=>{

if(c.scala===scala){

let url="https://wa.me/"+c.tel+"?text="+encodeURIComponent(msg)

window.open(url)

}

})

}

window.onload=carica

</script>

</body>
</html>
