<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portineria Digitale</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:10px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
color:#075e54;
}

input,select,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
margin-top:5px;
}

.btn{
background:#25d366;
color:white;
}

.btn2{
background:#f39c12;
color:white;
}

.btn3{
background:#3498db;
color:white;
}

.btn4{
background:#e74c3c;
color:white;
}

.riga{
display:flex;
justify-content:space-between;
align-items:center;
padding:6px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="card">

<h2>➕ Nuovo condomino</h2>

<input id="nome" placeholder="Nome">

<input id="telefono" placeholder="Telefono">

<select id="scalaAdd">
<option>A</option>
<option>B</option>
<option>C</option>
</select>

<button class="btn" onclick="aggiungi()">Salva</button>

</div>

<div class="card">

<h2>🔎 Cerca condomino</h2>

<input id="cerca" onkeyup="filtra()" placeholder="Nome condomino">

</div>

<div class="card">

<h2>👥 Condomini</h2>

<div id="lista"></div>

</div>

<div class="card">

<h2>📦 Pacco arrivato</h2>

<select id="rubrica"></select>

<input id="corriere" placeholder="Corriere">

<input type="file" accept="image/*" capture="camera">

<button class="btn3" onclick="pacco()">Registra pacco</button>

</div>

<div class="card">

<h2>📜 Pacchi in portineria</h2>

<div id="storico"></div>

</div>

<div class="card">

<h2>📢 Avviso a tutti</h2>

<textarea id="msg"></textarea>

<button class="btn2" onclick="tutti()">Invia</button>

</div>

<div class="card">

<h2>🏢 Avviso scala</h2>

<select id="scala">

<option>A</option>
<option>B</option>
<option>C</option>

</select>

<textarea id="msgScala"></textarea>

<button class="btn2" onclick="scala()">Invia</button>

</div>

<div class="card">

<h2>💾 Backup dati</h2>

<button onclick="backup()">Esporta dati</button>

<input type="file" id="ripristina">

<button onclick="importa()">Importa dati</button>

</div>

<script>

let condomini=JSON.parse(localStorage.getItem("condomini"))||[]
let pacchi=JSON.parse(localStorage.getItem("pacchi"))||[]

function salva(){

localStorage.setItem("condomini",JSON.stringify(condomini))
localStorage.setItem("pacchi",JSON.stringify(pacchi))

}

function aggiungi(){

let nome=document.getElementById("nome").value
let tel=document.getElementById("telefono").value
let scala=document.getElementById("scalaAdd").value

condomini.push({nome,tel,scala})

salva()
render()

}

function elimina(i){

condomini.splice(i,1)

salva()
render()

}

function render(){

let lista=document.getElementById("lista")
let rubrica=document.getElementById("rubrica")

lista.innerHTML=""
rubrica.innerHTML=""

condomini.forEach((c,i)=>{

lista.innerHTML+=`
<div class="riga">
${c.nome} (${c.scala})
<button class="btn4" onclick="elimina(${i})">X</button>
</div>
`

rubrica.innerHTML+=`
<option value="${c.tel}">
${c.nome}
</option>
`

})

storico()

}

function filtra(){

let q=document.getElementById("cerca").value.toLowerCase()

let lista=document.getElementById("lista")

lista.innerHTML=""

condomini.forEach((c,i)=>{

if(c.nome.toLowerCase().includes(q)){

lista.innerHTML+=`
<div class="riga">
${c.nome} (${c.scala})
<button class="btn4" onclick="elimina(${i})">X</button>
</div>
`

}

})

}

function pacco(){

let sel=document.getElementById("rubrica")

let nome=sel.options[sel.selectedIndex].text
let tel=sel.value

let corriere=document.getElementById("corriere").value

let ora=new Date().toLocaleTimeString()

pacchi.push({
nome,
corriere,
ora
})

salva()
storico()

let msg="Buongiorno, è arrivato un pacco ("+corriere+") in portineria."

window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg))

}

function ritirato(i){

pacchi.splice(i,1)

salva()
storico()

}

function storico(){

let s=document.getElementById("storico")

s.innerHTML=""

pacchi.forEach((p,i)=>{

s.innerHTML+=`
<div class="riga">
${p.ora} - ${p.nome} (${p.corriere})
<button class="btn3" onclick="ritirato(${i})">Ritirato</button>
</div>
`

})

}

function tutti(){

let msg=document.getElementById("msg").value

condomini.forEach(c=>{

window.open("https://wa.me/"+c.tel+"?text="+encodeURIComponent(msg))

})

}

function scala(){

let sc=document.getElementById("scala").value
let msg=document.getElementById("msgScala").value

condomini.forEach(c=>{

if(c.scala==sc){

window.open("https://wa.me/"+c.tel+"?text="+encodeURIComponent(msg))

}

})

}

function backup(){

let dati={
condomini:condomini,
pacchi:pacchi
}

let blob=new Blob([JSON.stringify(dati)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="backup_portineria.json"

a.click()

}

function importa(){

let file=document.getElementById("ripristina").files[0]

let reader=new FileReader()

reader.onload=function(){

let dati=JSON.parse(reader.result)

condomini=dati.condomini
pacchi=dati.pacchi

salva()
render()

}

reader.readAsText(file)

}

render()

</script>

</body>
</html>
